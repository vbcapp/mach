<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Edit Card - iPas AI應用規劃師考證班</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,700;1,900&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FACC15", // Bright Yellow
                        danger: "#EF4444", // Red
                        "background-light": "#F4F4F1",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        display: ["Inter", "system-ui", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1.5rem",
                    },
                    boxShadow: {
                        'neo': '8px 8px 0px 0px rgba(0, 0, 0, 1)',
                        'neo-sm': '4px 4px 0px 0px rgba(0, 0, 0, 1)',
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .neo-border {
            border: 3px solid black;
        }
        .neo-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1);
        }
        .neo-shadow-sm {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input, textarea, select {
            @apply neo-border rounded-xl px-3 py-2 w-full bg-white dark:bg-zinc-800 text-black dark:text-white font-bold focus:outline-none;
        }
        label {
            @apply block text-xs font-black mb-1 text-black dark:text-white;
        }
    </style>
    <style>
        body {
            min-height: 100dvh;
        }

        /* Custom scrollbar for textareas */
        textarea {
            max-height: 9em;
            /* Approx 4 lines with padding/line-height */
            overflow-y: auto;
            resize: vertical;
            /* Allow vertical resize */
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center overflow-x-hidden transition-colors duration-300">
    <header
        class="w-full bg-primary neo-border border-t-0 border-x-0 py-4 px-6 flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-xl font-black text-black tracking-tight">編輯卡片</h1>
        <button onclick="history.back()"
            class="w-10 h-10 flex items-center justify-center rounded-full bg-white neo-border neo-shadow-sm active:translate-y-0.5 active:translate-x-0.5 active:shadow-none transition-all">
            <span class="material-symbols-outlined text-black font-black">close</span>
        </button>
    </header>
    <main class="w-full max-w-md px-6 py-4 flex flex-col space-y-3 flex-grow">
        <div>
            <label>難度等級 (1-5):</label>
            <div class="relative">
                <select id="input-level" class="appearance-none bg-none">

                    <option value="1">Lv. 1</option>
                    <option value="2" selected="">Lv. 2</option>
                    <option value="3">Lv. 3</option>
                    <option value="4">Lv. 4</option>
                    <option value="5">Lv. 5</option>
                </select>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
                    <span class="material-symbols-outlined">expand_more</span>
                </div>
            </div>
        </div>
        <div>
            <label>分類:</label>
            <input id="input-category" type="text" value="" />
        </div>
        <div>
            <label>英文原文:</label>
            <input id="input-english" type="text" value="" />
        </div>
        <div>
            <label>中文翻譯:</label>
            <input id="input-chinese" type="text" value="" />
        </div>
        <div>
            <label>代號或縮寫:</label>
            <input id="input-abbreviation" type="text" value="" />
        </div>
        <div>
            <label>內容說明:</label>
            <textarea id="input-description" rows="3" placeholder="載入中..."></textarea>
        </div>
        <div>
            <label>生活化比喻:</label>
            <textarea id="input-analogy" rows="3" placeholder="載入中..."></textarea>
        </div>
        <div
            class="mt-4 mb-4 p-3 bg-red-50 dark:bg-red-900/20 border-2 border-red-500 rounded-2xl flex items-center justify-between">
            <div class="flex items-center space-x-2 text-red-600 dark:text-red-400">
                <span class="material-symbols-outlined">delete_sweep</span>
                <span class="font-black text-base">危險區域</span>
            </div>
            <button id="delete-btn" onclick="deleteCard()"
                class="px-3 py-1.5 bg-red-500 text-white font-black rounded-lg neo-border neo-shadow-sm active:translate-y-0.5 active:translate-x-0.5 active:shadow-none transition-all text-sm">
                刪除卡片
            </button>
        </div>
    </main>
    <footer class="w-full max-w-md px-6 pb-8">
        <div class="pt-4 border-t-2 border-black dark:border-zinc-700 flex gap-4">
            <button onclick="history.back()"
                class="flex-1 py-3 bg-white dark:bg-zinc-800 text-black dark:text-white font-black italic text-lg rounded-xl neo-border neo-shadow-sm active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                取消
            </button>
            <button id="save-btn" onclick="saveCard()"
                class="flex-1 py-3 bg-primary text-black font-black italic text-lg rounded-xl neo-border neo-shadow-sm active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                儲存變更
            </button>
        </div>
    </footer>
    <div class="fixed bottom-4 right-4 z-50">
        <button class="p-3 bg-zinc-800 dark:bg-white text-white dark:text-black rounded-full shadow-lg"
            onclick="document.documentElement.classList.toggle('dark')">
            <span class="material-symbols-outlined text-sm block dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined text-sm hidden dark:block">light_mode</span>
        </button>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        let currentCard = null;
        let cardId = null;

        // 從 sessionStorage 讀取快取
        function getCachedCard(id) {
            const cached = sessionStorage.getItem(`card_${id}`);
            return cached ? JSON.parse(cached) : null;
        }

        document.addEventListener('DOMContentLoaded', async function () {
            // 從 URL 取得卡片 ID
            const urlParams = new URLSearchParams(window.location.search);
            cardId = urlParams.get('id');

            if (!cardId) {
                alert('找不到卡片 ID');
                window.location.href = 'index.html';
                return;
            }

            // 先檢查快取，立即填入表單
            const cachedCard = getCachedCard(cardId);
            if (cachedCard) {
                currentCard = cachedCard;
                fillForm(cachedCard);
            }

            // 初始化 API 並載入最新資料
            await apiService.initialize();
            await loadCard(cardId);
        });

        async function loadCard(id) {
            const userId = apiService.currentUser?.id;

            if (!userId) {
                alert('請先登入');
                window.location.href = 'login.html';
                return;
            }

            const result = await apiService.getCardWithProgress(id, userId);

            if (result.success && result.data.card) {
                currentCard = result.data.card;
                // 更新快取
                sessionStorage.setItem(`card_${id}`, JSON.stringify(currentCard));
                fillForm(currentCard);
            } else if (!currentCard) {
                // 只有在沒有快取資料時才顯示錯誤
                alert('載入卡片失敗');
                window.location.href = 'index.html';
            }
        }

        function fillForm(card) {
            document.getElementById('input-level').value = card.level || 1;
            document.getElementById('input-category').value = card.category || '';
            document.getElementById('input-english').value = card.english_term || '';
            document.getElementById('input-chinese').value = card.chinese_translation || '';
            document.getElementById('input-abbreviation').value = card.abbreviation || '';
            document.getElementById('input-description').value = card.description || '';
            document.getElementById('input-analogy').value = card.analogy || '';
        }

        async function saveCard() {
            if (!currentCard) {
                alert('卡片資料尚未載入');
                return;
            }

            const updates = {
                level: parseInt(document.getElementById('input-level').value) || 1,
                category: document.getElementById('input-category').value.trim(),
                english_term: document.getElementById('input-english').value.trim(),
                chinese_translation: document.getElementById('input-chinese').value.trim(),
                abbreviation: document.getElementById('input-abbreviation').value.trim(),
                description: document.getElementById('input-description').value.trim(),
                analogy: document.getElementById('input-analogy').value.trim()
            };

            // 驗證必填欄位
            if (!updates.english_term || !updates.chinese_translation || !updates.description) {
                alert('請填寫英文原文、中文翻譯和內容說明');
                return;
            }

            const result = await apiService.updateCard(cardId, updates);

            if (result.success) {
                alert('儲存成功！');
                window.location.href = `cardi.html?id=${cardId}`;
            } else {
                alert('儲存失敗: ' + result.error.message);
            }
        }

        async function deleteCard() {
            if (!currentCard) {
                alert('卡片資料尚未載入');
                return;
            }

            if (!confirm('確定要刪除這張卡片嗎？此操作無法復原。')) {
                return;
            }

            const userId = apiService.currentUser?.id;
            const result = await apiService.deleteCard(cardId, userId);

            if (result.success) {
                alert('卡片已刪除');
                window.location.href = 'index.html';
            } else {
                alert('刪除失敗: ' + result.error.message);
            }
        }
    </script>

</body>

</html>
