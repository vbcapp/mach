<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>小測驗</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FACC15",
                        secondary: "#FB7185",
                        "background-light": "#FFFFFF",
                        "background-dark": "#121212",
                        "accent-orange": "#F97316",
                        "electric-green": "#22C55E",
                        "correct-green": "#F0FDF4",
                        "correct-border": "#22C55E",
                        "incorrect-red": "#FEF2F2",
                        "incorrect-border": "#EF4444",
                        "neo-indigo": "#3730A3",
                        "note-yellow": "#FEFCE8"
                    },
                    fontFamily: {
                        display: ["Lexend", "Noto Sans TC", "sans-serif"],
                        sans: ["Lexend", "Noto Sans TC", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "16px",
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px #3730A3',
                        'neo-lg': '8px 8px 0px 0px #3730A3',
                        'neo-yellow': '4px 4px 0px 0px #CA8A04',
                        'correct-glow': '0 0 15px rgba(34, 197, 94, 0.2)',
                        'incorrect-glow': '0 0 15px rgba(239, 68, 68, 0.2)',
                    }
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Lexend', 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #ffffff;
            background-image: radial-gradient(#00000015 1px, transparent 0);
            background-size: 20px 20px;
        }

        .dark body {
            background-color: #121212;
            background-image: radial-gradient(#ffffff10 1px, transparent 0);
        }

        .neo-border {
            border: 3px solid #000000;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .overflow-y-auto::-webkit-scrollbar {
            width: 0px;
        }

        .option-btn {
            transition: all 0.2s ease;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-correct {
            background-color: #F0FDF4;
            border-color: #22C55E;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        .option-correct p {
            color: #166534;
        }

        .option-incorrect {
            background-color: #FEF2F2;
            border-color: #EF4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .option-incorrect p {
            color: #991B1B;
        }

        .option-disabled {
            opacity: 0.4;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-black dark:text-white min-h-screen flex flex-col overflow-x-hidden">
    <header class="pt-6 px-6 pb-2 flex flex-col shrink-0">
        <div class="flex items-center w-full mb-4 relative">
            <button onclick="window.history.back()"
                class="w-11 h-11 flex items-center justify-center bg-white dark:bg-zinc-800 neo-border rounded-full shadow-neo active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all z-10 shrink-0">
                <span class="material-symbols-outlined text-2xl font-bold">chevron_left</span>
            </button>
            <div class="absolute inset-x-0 flex justify-center pointer-events-none">
                <div
                    class="bg-primary text-black px-4 py-1.5 neo-border flex items-center gap-1.5 rounded-full shadow-neo-yellow font-black text-sm uppercase tracking-tight pointer-events-auto">
                    <span class="material-symbols-outlined text-base">psychology</span>
                    小測驗
                </div>
            </div>
        </div>
        <div class="w-full px-2">
            <div class="w-full h-3 bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden neo-border">
                <div id="progress-bar" class="h-full bg-electric-green transition-all duration-300" style="width: 33%;">
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto px-6 py-4">
        <!-- 題目卡 -->
        <div class="bg-white dark:bg-zinc-900 neo-border rounded-2xl shadow-neo overflow-hidden mb-4">
            <div class="h-4 bg-primary border-b-[3px] border-black"></div>
            <div class="p-6">
                <h3 id="question-text" class="text-2xl font-black text-center leading-tight">
                    載入中...
                </h3>
            </div>
        </div>

        <!-- 選項區 -->
        <div id="options-container" class="space-y-3">
            <!-- 選項由 JavaScript 動態生成 -->
        </div>

        <!-- 解析區 (使用 details 標籤) -->
        <details id="explanation-details"
            class="group mt-4 bg-note-yellow dark:bg-zinc-800 border-[3px] border-dashed border-zinc-400 dark:border-zinc-600 rounded-2xl overflow-hidden transition-all hidden">
            <summary class="flex items-center justify-between p-3 cursor-pointer list-none select-none">
                <div class="flex items-center gap-2">
                    <span class="text-base">💡</span>
                    <span class="font-black text-base text-zinc-800 dark:text-zinc-100">解析：</span>
                </div>
                <span
                    class="material-symbols-outlined transition-transform duration-200 group-open:rotate-180">expand_more</span>
            </summary>
            <div class="px-4 pb-4">
                <p id="explanation-text" class="text-zinc-700 dark:text-zinc-300 font-medium leading-relaxed text-sm">
                </p>
            </div>
        </details>
    </main>

    <footer class="px-6 pb-8 pt-4 shrink-0 bg-transparent flex gap-4">
        <button id="prev-btn"
            class="hidden flex-1 bg-white text-black neo-border rounded-2xl py-4 font-black text-xl shadow-neo active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all items-center justify-center gap-2">
            <span class="material-symbols-outlined font-black">arrow_back</span>
            <span>上一題</span>
        </button>
        <button id="next-btn"
            class="group flex-1 bg-primary text-black neo-border rounded-2xl py-4 font-black text-xl shadow-neo-lg hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[10px_10px_0px_0px_#3730A3] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
            <span id="next-btn-text">下一題</span>
            <span
                class="material-symbols-outlined font-black group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
    </footer>

    <script>
        // 題目資料
        let quizQuestions = [
            {
                question: "為什麼開發者要使用 API？",
                options: [
                    "為了增加程式碼的行數",
                    "為了讓電腦運行速度變慢",
                    "為了重複使用現有的功能，節省開發時間"
                ],
                correctAnswer: 3,
                explanation: "透過 API，開發者可以直接呼叫別人寫好的功能（如 Google Maps 或金流支付），不需要從零開始開發，大幅提升效率。"
            },
            {
                question: "下列哪一個比喻最能精確描述 API 的功能？",
                options: [
                    "存儲資料的硬碟機",
                    "負責傳遞請求與結果的服務生",
                    "撰寫程式碼的編輯器"
                ],
                correctAnswer: 2,
                explanation: "API 扮演中介者的角色，負責接收請求並回傳結果，就像服務生在客人與廚房之間傳遞訊息。"
            },
            {
                question: "API 的全稱是什麼？",
                options: [
                    "Application Programming Interface",
                    "Advanced Program Integration",
                    "Automated Protocol Instruction"
                ],
                correctAnswer: 1,
                explanation: "API 代表 Application Programming Interface，即應用程式介面，用於不同軟體組件間的溝通。"
            }
        ];

        // 狀態變數
        let currentQuestionIndex = 0;
        let userAnswers = new Array(quizQuestions.length).fill(null);
        let autoNextTimeout = null;
        // 從 localStorage 讀取解析展開狀態，若無則預設為 false
        let isExplanationExpanded = localStorage.getItem('isExplanationExpanded') === 'true';

        // DOM 元素
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const explanationDetails = document.getElementById('explanation-details');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-bar');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const nextBtnText = document.getElementById('next-btn-text');

        let isInternalUpdate = false; // 標記是否為程式內部更新

        // 初始化
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            const reviewIndex = urlParams.get('index');

            if (mode === 'review') {
                if (!loadReviewState()) {
                    // 若讀取失敗 (例如無資料)，則退回一般模式
                    localStorage.removeItem('quizReviewState');
                    randomizeQuiz();
                } else if (reviewIndex !== null) {
                    currentQuestionIndex = parseInt(reviewIndex, 10);
                }
            } else {
                // 清除舊的 review state，確保是全新的開始
                localStorage.removeItem('quizReviewState');
                randomizeQuiz();
            }

            renderQuestion();
            prevBtn.addEventListener('click', handlePrevClick);
            nextBtn.addEventListener('click', handleNextClick);

            // 監聽 summary 點擊事件，記錄使用者的操作行為
            const summaryEl = explanationDetails.querySelector('summary');
            if (summaryEl) {
                summaryEl.addEventListener('click', (e) => {
                    // 手動點擊切換狀態，延遲記錄最終狀態
                    setTimeout(() => {
                        isExplanationExpanded = explanationDetails.open;
                        localStorage.setItem('isExplanationExpanded', isExplanationExpanded);
                    }, 0);
                });
            }
        }

        // 隨機打亂題目與選項
        function randomizeQuiz() {
            // 1. 打亂題目順序
            shuffleArray(quizQuestions);

            // 2. 打亂每個題目的選項，並更新正確答案索引
            quizQuestions.forEach(q => {
                const correctOptionText = q.options[q.correctAnswer - 1]; // 先暫存正確答案的文字
                shuffleArray(q.options); // 打亂選項
                q.correctAnswer = q.options.indexOf(correctOptionText) + 1; // 重新找出正確答案的新位置 (1-based)
            });

            // 重置使用者答案，確保長度正確 (雖然長度沒變，但習慣上重置一下)
            userAnswers = new Array(quizQuestions.length).fill(null);
        }

        // Fisher-Yates 洗牌演算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 渲染題目
        function renderQuestion() {
            const question = quizQuestions[currentQuestionIndex];
            const answerState = userAnswers[currentQuestionIndex];
            const hasAnswered = !!answerState;

            // 更新題目
            questionText.textContent = question.question;

            // 更新進度條
            const progress = ((currentQuestionIndex + 1) / quizQuestions.length) * 100;
            progressBar.style.width = `${progress}%`;

            // 渲染選項
            optionsContainer.innerHTML = question.options.map((option, index) => {
                const btnIndex = index + 1;
                let btnClass = "option-btn w-full text-left bg-white dark:bg-zinc-800/50 neo-border p-3.5 rounded-2xl shadow-neo relative";
                let btnContent = `<p class="font-bold text-lg leading-snug">${String.fromCharCode(65 + index)}. ${option}</p>`;
                let isDisabled = false;

                if (hasAnswered) {
                    isDisabled = true;
                    if (btnIndex === question.correctAnswer) {
                        // 正確答案樣式
                        btnClass += " option-correct shadow-none";
                        btnClass = btnClass.replace("shadow-neo", "");
                        btnContent = `
                            <p class="font-bold text-lg leading-snug text-green-800 dark:text-green-400">
                                ${String.fromCharCode(64 + btnIndex)}. ${option}
                            </p>
                            <div class="absolute -top-3 -right-3 bg-electric-green text-white rounded-full w-8 h-8 flex items-center justify-center shadow-neo border-2 border-black">
                                <span class="material-symbols-outlined text-xl">check</span>
                            </div>
                        `;
                    } else if (btnIndex === answerState.selectedIndex && !answerState.isCorrect) {
                        // 選錯的樣式
                        btnClass += " option-incorrect shadow-none";
                        btnClass = btnClass.replace("shadow-neo", "");
                        btnContent = `
                            <p class="font-bold text-lg leading-snug text-red-800 dark:text-red-400">
                                ${String.fromCharCode(64 + btnIndex)}. ${option}
                            </p>
                            <div class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-neo border-2 border-black">
                                <span class="material-symbols-outlined text-xl">close</span>
                            </div>
                        `;
                    } else {
                        // 其他選項
                        btnClass += " option-disabled";
                    }
                }

                return `
                    <button class="${btnClass}"
                            data-index="${btnIndex}"
                            ${isDisabled ? 'disabled' : ''}
                            onclick="handleOptionClick(${btnIndex})">
                        ${btnContent}
                    </button>
                `;
            }).join('');

            // 解析區域狀態
            explanationText.textContent = question.explanation;
            if (hasAnswered) {
                explanationDetails.classList.remove('hidden');
                // 根據全域狀態這定展開/收合
                isInternalUpdate = true;
                explanationDetails.open = isExplanationExpanded;
                isInternalUpdate = false;
            } else {
                explanationDetails.classList.add('hidden');
                isInternalUpdate = true;
                explanationDetails.open = false; // 重置為關閉
                isInternalUpdate = false;
            }

            // 更新按鈕狀態
            updateButtons(hasAnswered);
        }

        // 處理選項點擊
        function handleOptionClick(selectedIndex) {
            if (userAnswers[currentQuestionIndex]) return; // 已作答則忽略

            const question = quizQuestions[currentQuestionIndex];
            const isCorrect = selectedIndex === question.correctAnswer;

            // 記錄狀態
            userAnswers[currentQuestionIndex] = { selectedIndex, isCorrect };

            // 重新渲染當前題目以顯示結果選擇
            renderQuestion();

            // 最後一題不自動跳轉
            if (currentQuestionIndex < quizQuestions.length - 1) {
                autoNextTimeout = setTimeout(() => {
                    goToNextQuestion();
                }, 5000); // 改為 5 秒
            }
        }

        // 更新按鈕顯示
        function updateButtons(hasAnswered) {
            // 上一題按鈕：第一題不顯示
            if (currentQuestionIndex === 0) {
                prevBtn.classList.add('hidden');
                prevBtn.classList.remove('flex');
            } else {
                prevBtn.classList.remove('hidden');
                prevBtn.classList.add('flex');
            }

            // 下一題按鈕
            nextBtn.disabled = !hasAnswered;

            const isLastQuestion = currentQuestionIndex === quizQuestions.length - 1;
            if (isLastQuestion) {
                nextBtnText.textContent = '查看結果';
                nextBtn.querySelector('.material-symbols-outlined').textContent = 'emoji_events';
            } else {
                nextBtnText.textContent = '下一題';
                nextBtn.querySelector('.material-symbols-outlined').textContent = 'arrow_forward';
            }
        }

        // 上一題
        function handlePrevClick() {
            if (autoNextTimeout) clearTimeout(autoNextTimeout);
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        // 下一題
        function handleNextClick() {
            if (autoNextTimeout) clearTimeout(autoNextTimeout);

            if (currentQuestionIndex === quizQuestions.length - 1) {
                saveResultsAndRedirect();
            } else {
                goToNextQuestion();
            }
        }

        function goToNextQuestion() {
            if (autoNextTimeout) clearTimeout(autoNextTimeout);

            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        }

        // 儲存結果並跳轉
        function saveResultsAndRedirect() {
            // 轉換 userAnswers 為結果陣列
            const resultsBoolean = userAnswers.map(ans => ans ? ans.isCorrect : false);
            const isPerfect = resultsBoolean.every(r => r === true);
            const correctCount = resultsBoolean.filter(r => r === true).length;
            const timestamp = new Date().toISOString();

            // 儲存簡單結果供結果頁顯示
            localStorage.setItem('quizResults', JSON.stringify({
                results: resultsBoolean,
                isPerfect: isPerfect,
                correctCount: correctCount,
                totalQuestions: quizQuestions.length,
                timestamp: timestamp
            }));

            // 儲存完整狀態供回顧使用 (包含隨機後的題目順序和使用者答案)
            localStorage.setItem('quizReviewState', JSON.stringify({
                questions: quizQuestions,
                answers: userAnswers,
                timestamp: timestamp
            }));

            window.location.href = 'result.html';
        }

        function loadReviewState() {
            try {
                const savedState = localStorage.getItem('quizReviewState');
                if (savedState) {
                    const data = JSON.parse(savedState);
                    if (data.questions && data.answers) {
                        quizQuestions = data.questions;
                        userAnswers = data.answers;
                        return true;
                    }
                }
            } catch (e) {
                console.error('Error loading review state:', e);
            }
            return false;
        }

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
