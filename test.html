<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>小測驗</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

</head>

<body class="text-black dark:text-white min-h-screen flex flex-col overflow-x-hidden">
    <header class="pt-6 px-6 pb-2 flex flex-col shrink-0">
        <div class="flex items-center w-full mb-4 relative">
            <button id="back-btn"
                class="w-11 h-11 flex items-center justify-center bg-white dark:bg-zinc-800 neo-border rounded-full shadow-neo active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all z-10 shrink-0">
                <span class="material-symbols-outlined text-2xl font-bold">chevron_left</span>
            </button>
            <div class="absolute inset-x-0 flex justify-center pointer-events-none">
                <div
                    class="bg-primary text-black px-4 py-1.5 neo-border flex items-center gap-1.5 rounded-full shadow-neo-yellow font-black text-sm uppercase tracking-tight pointer-events-auto">
                    <span class="material-symbols-outlined text-base">psychology</span>
                    小測驗
                </div>
            </div>
        </div>
        <!-- 卡片資訊 -->
        <div class="w-full px-2 mb-0 flex gap-2 flex-wrap justify-center">
            <div class="bg-white dark:bg-zinc-800 neo-border px-3 py-1.5 rounded-lg shadow-neo-yellow">
                <span class="text-xs font-bold text-zinc-600 dark:text-zinc-400">類別：</span>
                <span id="card-category" class="text-xs font-black">--</span>
            </div>
            <div class="bg-white dark:bg-zinc-800 neo-border px-3 py-1.5 rounded-lg shadow-neo-yellow">
                <span class="text-xs font-bold text-zinc-600 dark:text-zinc-400">章節：</span>
                <span id="card-chapter" class="text-xs font-black">--</span>
            </div>
            <div class="bg-white dark:bg-zinc-800 neo-border px-3 py-1.5 rounded-lg shadow-neo-yellow hidden">
                <span class="text-xs font-bold text-zinc-600 dark:text-zinc-400">題型：</span>
                <span id="question-type" class="text-xs font-black">--</span>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto px-6 py-4 flex flex-col">
        <!-- 題目卡 -->
        <div class="bg-white dark:bg-zinc-900 neo-border rounded-2xl shadow-neo overflow-hidden mb-4 relative">
            <div class="h-4 bg-primary border-b-[3px] border-black"></div>
            <div class="px-6 py-1 relative">
                <div id="stats-badge-container" class="flex justify-end mb-1 empty:hidden"></div>
                <h3 id="question-text" class="text-2xl font-black text-left leading-tight">
                    載入中...
                </h3>
            </div>
        </div>

        <!-- 選項區 -->
        <div id="options-container" class="space-y-3">
            <!-- 選項由 JavaScript 動態生成 -->
        </div>

        <!-- 解析區 (使用 details 標籤) -->
        <details id="explanation-details"
            class="group mt-4 bg-note-yellow dark:bg-zinc-800 border-[3px] border-dashed border-zinc-400 dark:border-zinc-600 rounded-2xl overflow-hidden transition-all hidden">
            <summary class="flex items-center justify-between p-3 cursor-pointer list-none select-none">
                <div class="flex items-center gap-2">
                    <span class="text-base">💡</span>
                    <span class="font-black text-base text-zinc-800 dark:text-zinc-100">解析：</span>
                </div>
                <span
                    class="material-symbols-outlined transition-transform duration-200 group-open:rotate-180">expand_more</span>
            </summary>
            <div class="px-4 pb-4">
                <p id="explanation-text" class="text-zinc-700 dark:text-zinc-300 font-medium leading-relaxed text-sm">
                </p>
            </div>
        </details>

        <!-- 按鈕區 -->
        <div class="flex gap-4 mt-4 mb-8">
            <button id="prev-btn"
                class="hidden flex-1 bg-white text-black neo-border rounded-2xl py-4 font-black text-xl shadow-neo hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_0px_#374151] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all items-center justify-center gap-2">
                <span class="material-symbols-outlined font-black">arrow_back</span>
                <span>上一題</span>
            </button>
            <button id="next-btn"
                class="group flex-1 bg-primary text-black neo-border rounded-2xl py-4 font-black text-xl shadow-neo-lg hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[10px_10px_0px_0px_#3730A3] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                disabled>
                <span id="next-btn-text">下一題</span>
                <span
                    class="material-symbols-outlined font-black group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>
        </div>
    </main>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/level-system.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        // 題目資料 (將從資料庫載入)
        let quizQuestions = [];
        let currentCardData = null; // 儲存完整卡片資料

        // 預設題目 (無法載入時使用)
        const defaultQuizQuestions = [
            {
                question: "題目載入失敗",
                options: ["請返回重試", "請返回重試", "請返回重試", "請返回重試"],
                correctAnswer: 1,
                explanation: "無法載入此卡片的測驗題目，請返回卡片頁面重新進入。"
            }
        ];

        // 狀態變數
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let autoNextTimeout = null;
        let isExplanationExpanded = localStorage.getItem('isExplanationExpanded') === 'true';

        // DOM 元素
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const explanationDetails = document.getElementById('explanation-details');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-bar');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const nextBtnText = document.getElementById('next-btn-text');

        let isInternalUpdate = false;

        // 移除：複習模式和隨機化功能已不需要

        // 從資料庫載入題目（新架構：questions 資料表）
        async function loadCardQuestions(cardId) {
            try {
                let data = null;
                let progress = null;

                // 若已登入，使用 API 取得題目和答題進度
                if (apiService.currentUser) {
                    const result = await apiService.getQuestionWithProgress(cardId, apiService.currentUser.id);
                    if (result.success && result.data.question) {
                        data = result.data.question;
                        progress = result.data.progress;
                    }
                } else {
                    // 若未登入，僅查詢題目
                    const { data: qData, error } = await apiService.supabase
                        .from('questions')
                        .select('*')
                        .eq('id', cardId)
                        .single();
                    if (!error) data = qData;
                }

                if (!data) {
                    console.error('載入題目失敗');
                    quizQuestions = defaultQuizQuestions;
                    return;
                }

                // 儲存完整題目資料
                currentCardData = data;

                if (data) {
                    // 儲存題目名稱供 result.html 使用
                    if (data.question) {
                        sessionStorage.setItem('currentCardName', data.question);
                    }

                    // 處理選項：確保是陣列格式
                    let options = [];
                    if (Array.isArray(data.options)) {
                        options = [...data.options];
                    } else if (typeof data.options === 'object' && data.options !== null) {
                        // 如果是物件，轉換為陣列
                        options = Object.values(data.options);
                    }

                    // 確保選項有4個，如果不足則補充
                    while (options.length < 4) {
                        options.push(`選項 ${options.length + 1}`);
                    }
                    // 如果超過4個，只取前4個
                    options = options.slice(0, 4);

                    // 處理正確答案：轉換為數字索引（1-based）
                    let correctAnswer = 1;
                    if (typeof data.correct_answer === 'number') {
                        correctAnswer = data.correct_answer;
                    } else if (typeof data.correct_answer === 'string') {
                        // 如果是字母 (A, B, C, D)，轉換為數字
                        const answerMap = { 'A': 1, 'B': 2, 'C': 3, 'D': 4 };
                        correctAnswer = answerMap[data.correct_answer.toUpperCase()] || 1;
                    }

                    // 建立單一題目（questions 資料表本身就是單題制）
                    quizQuestions = [{
                        question: data.question,
                        options: options,
                        correctAnswer: correctAnswer,
                        explanation: data.explanation || '此題目尚無解析',
                        originalIndex: 0,
                        questionType: data.question_type || '單選',
                        progress: progress
                    }];

                    console.log(`成功載入題目: ${data.question}`);

                    // 顯示卡片資訊
                    updateCardInfo();
                } else {
                    console.warn('找不到此題目');
                    quizQuestions = defaultQuizQuestions;
                }
            } catch (err) {
                console.error('載入題目時發生錯誤:', err);
                quizQuestions = defaultQuizQuestions;
            }
        }

        // 題型代碼轉換為中文
        function getQuestionTypeDisplay(typeCode) {
            const typeMap = {
                'single': '單選',
                'multiple': '複選',
                'true_false': '是非',
                'fill_in': '填空',
                'short_answer': '簡答'
            };
            return typeMap[typeCode] || typeCode || '單選';
        }

        // 更新卡片資訊顯示
        function updateCardInfo() {
            if (!currentCardData) return;

            const categoryEl = document.getElementById('card-category');
            const chapterEl = document.getElementById('card-chapter');
            const questionTypeEl = document.getElementById('question-type');

            if (categoryEl) categoryEl.textContent = currentCardData.subject || '未分類';
            if (chapterEl) chapterEl.textContent = currentCardData.chapter || '通用';
            if (questionTypeEl && quizQuestions[0]) {
                const rawType = quizQuestions[0].questionType || currentCardData.question_type || 'single';
                questionTypeEl.textContent = getQuestionTypeDisplay(rawType);
            }
        }

        // 初始化
        async function init() {
            // 初始化 API Service
            await apiService.initialize();

            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            // 清除上次的結果，避免返回時顯示舊資料
            sessionStorage.removeItem('quizApiResult');
            sessionStorage.removeItem('levelUpProcessed');
            sessionStorage.removeItem('bonusCelebrationProcessed');

            if (cardId) {
                // 儲存 cardId 供之後使用（結果頁、重測）
                sessionStorage.setItem('currentCardId', cardId);
                await loadCardQuestions(cardId);
            } else {
                // 沒有 cardId，使用預設題目
                console.warn('無卡片 ID，無法載入題目');
                quizQuestions = defaultQuizQuestions;
            }

            // 初始化 userAnswers 陣列（固定只有1題）
            userAnswers = new Array(quizQuestions.length).fill(null);

            renderQuestion();
            prevBtn.addEventListener('click', handlePrevClick);
            nextBtn.addEventListener('click', handleNextClick);

            // 返回按鈕 - 返回到首頁
            const backBtn = document.getElementById('back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
            }

            const summaryEl = explanationDetails.querySelector('summary');
            if (summaryEl) {
                summaryEl.addEventListener('click', (e) => {
                    setTimeout(() => {
                        isExplanationExpanded = explanationDetails.open;
                        localStorage.setItem('isExplanationExpanded', isExplanationExpanded);
                    }, 0);
                });
            }
        }

        // 移除：shuffleArray 已不需要

        function renderQuestion() {
            const question = quizQuestions[currentQuestionIndex];
            const answerState = userAnswers[currentQuestionIndex];
            const hasAnswered = !!answerState;

            questionText.textContent = question.question;

            // 渲染統計標籤 (Badge)
            const badgeContainer = document.getElementById('stats-badge-container');
            if (badgeContainer && question.progress !== undefined) {
                const progress = question.progress;
                let badgeHTML = '';
                if (!progress || progress.times_reviewed === 0) {
                    badgeHTML = `<span class="bg-zinc-100 text-zinc-500 dark:bg-zinc-800 dark:text-zinc-400 px-2 py-1 rounded text-xs font-bold border border-zinc-200 dark:border-zinc-700 shadow-sm">尚無作答紀錄</span>`;
                } else {
                    const timesReviewed = progress.times_reviewed || 0;
                    const timesCorrect = progress.times_correct || 0;

                    let accuracy = Math.round((timesCorrect / timesReviewed) * 100);
                    // 滿分控成就：達7次以上答對直接顯示 100%
                    if (timesCorrect >= 7) {
                        accuracy = 100;
                    }

                    if (accuracy >= 80) {
                        badgeHTML = `<span class="bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300 px-2 py-1 rounded text-xs font-bold border border-green-200 dark:border-green-800 shadow-sm">精熟 (${accuracy}%) - 作答 ${timesReviewed} 次</span>`;
                    } else if (accuracy >= 50) {
                        badgeHTML = `<span class="bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300 px-2 py-1 rounded text-xs font-bold border border-yellow-200 dark:border-yellow-800 shadow-sm">學習中 (${accuracy}%) - 作答 ${timesReviewed} 次</span>`;
                    } else {
                        badgeHTML = `<span class="bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300 px-2 py-1 rounded text-xs font-bold border border-red-200 dark:border-red-800 shadow-sm">需加強 (${accuracy}%) - 作答 ${timesReviewed} 次</span>`;
                    }
                }
                badgeContainer.innerHTML = badgeHTML;
            }

            optionsContainer.innerHTML = question.options.map((option, index) => {
                const btnIndex = index + 1;
                // HTML Escape helper
                const escapeHtml = (unsafe) => {
                    return unsafe
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;")
                        .replace(/'/g, "&#039;");
                };

                // 移除選項中的 （A）（B）（C）（D） 標記
                const cleanOption = option.replace(/^[（(][A-D][）)]\s*/, '');
                const safeOption = escapeHtml(cleanOption);

                let btnClass = "option-btn w-full text-left bg-white dark:bg-zinc-800/50 neo-border p-3.5 rounded-2xl shadow-neo relative";
                let btnContent = `<p class="font-bold text-lg leading-snug">${String.fromCharCode(65 + index)}. ${safeOption}</p>`;
                let isDisabled = false;

                if (hasAnswered) {
                    isDisabled = true;
                    if (btnIndex === question.correctAnswer) {
                        btnClass += " option-correct shadow-none";
                        btnContent = `
        <div class="flex items-center justify-between gap-4">
            <p class="font-bold text-lg leading-snug text-green-800 dark:text-green-400 text-left">
                ${String.fromCharCode(64 + btnIndex)}. ${safeOption}
            </p>
            <div class="bg-green-500 text-white rounded-full w-8 h-8 flex items-center justify-center border-2 border-black shrink-0 shadow-sm relative z-10 block">
                <span class="material-symbols-outlined text-xl w-6 h-6 flex flex-col items-center justify-center -ml-[2px] mt-[1px]">check</span>
            </div>
        </div>
        `;
                    } else if (btnIndex === answerState.selectedIndex && !answerState.isCorrect) {
                        btnClass += " option-incorrect shadow-none";
                        btnContent = `
        <div class="flex items-center justify-between gap-4">
            <p class="font-bold text-lg leading-snug text-red-800 dark:text-red-400 text-left">
                ${String.fromCharCode(64 + btnIndex)}. ${safeOption}
            </p>
            <div class="bg-red-500 text-white rounded-full w-8 h-8 flex items-center justify-center border-2 border-black shrink-0 shadow-sm relative z-10 block">
                <span class="material-symbols-outlined text-xl w-6 h-6 flex flex-col items-center justify-center mt-[1px]">close</span>
            </div>
        </div>
        `;
                    } else {
                        btnClass += " option-disabled";
                    }
                }

                return `
        <button class="${btnClass}"
            data-index="${btnIndex}"
            ${isDisabled ? 'disabled' : ''}
            onclick="handleOptionClick(${btnIndex})">
            ${btnContent}
        </button>
                `;
            }).join('');

            explanationText.textContent = question.explanation;
            if (hasAnswered) {
                explanationDetails.classList.remove('hidden');
                isInternalUpdate = true;
                explanationDetails.open = isExplanationExpanded;
                isInternalUpdate = false;
            } else {
                explanationDetails.classList.add('hidden');
                isInternalUpdate = true;
                explanationDetails.open = false;
                isInternalUpdate = false;
            }

            updateButtons(hasAnswered);
        }

        async function handleOptionClick(selectedIndex) {
            if (userAnswers[currentQuestionIndex]) return;

            const question = quizQuestions[currentQuestionIndex];
            const isCorrect = selectedIndex === question.correctAnswer;

            userAnswers[currentQuestionIndex] = { selectedIndex, isCorrect };

            // 如果答對，檢查爆擊並顯示 XP 動畫
            if (isCorrect) {
                const criticalResult = checkCriticalHit();
                if (criticalResult) {
                    showCriticalAnimation(criticalResult);
                } else {
                    showXPAnimation(100);
                }
            }

            renderQuestion();

            // 立即呼叫 API 儲存結果（不等待「下一題」按鈕）
            const cardId = sessionStorage.getItem('currentCardId');
            if (apiService.currentUser && cardId) {
                const userAnswer = String.fromCharCode(64 + selectedIndex); // 1 -> A, 2 -> B, etc.
                try {
                    const apiResult = await apiService.submitAnswer({
                        userId: apiService.currentUser.id,
                        questionId: cardId,
                        userAnswer: userAnswer,
                        isCorrect: isCorrect
                    });

                    if (apiResult.success) {
                        console.log('答題結果已儲存:', apiResult);
                        if (apiResult.newUserData) {
                            sessionStorage.setItem('userData', JSON.stringify(apiResult.newUserData));
                        }
                        // 儲存結果供 result.html 使用
                        sessionStorage.setItem('quizApiResult', JSON.stringify(apiResult));
                    }
                } catch (err) {
                    console.error('儲存答題結果失敗:', err);
                }
            }

            if (currentQuestionIndex < quizQuestions.length - 1) {
                autoNextTimeout = setTimeout(() => {
                    goToNextQuestion();
                }, 5000);
            }
        }

        // 顯示 XP 飄動動畫
        function showXPAnimation(xp) {
            const xpElement = document.createElement('div');
            xpElement.className = 'xp-float';
            xpElement.textContent = `+${xp} XP`;

            // 定位在畫面中央
            xpElement.style.left = '50%';
            xpElement.style.top = '50%';
            xpElement.style.transform = 'translateX(-50%)';

            document.body.appendChild(xpElement);

            // 1秒後移除元素
            setTimeout(() => {
                xpElement.remove();
            }, 1000);
        }

        // 爆擊機率檢查
        function checkCriticalHit() {
            const roll = Math.random() * 100; // 0-100 的隨機數

            // 按照機率從低到高檢查（先檢查稀有的）
            if (roll < 1) {
                // 1% - 5階爆擊
                return { level: 5, xpList: [1000] };
            } else if (roll < 3) {
                // 2% - 4階爆擊
                return { level: 4, xpList: [500] };
            } else if (roll < 8) {
                // 5% - 3階爆擊
                return { level: 3, xpList: [100, 100, 100, 100] };
            } else if (roll < 18) {
                // 10% - 2階爆擊
                return { level: 2, xpList: [100, 100, 100] };
            } else if (roll < 38) {
                // 20% - 1階爆擊
                return { level: 1, xpList: [100, 100] };
            }

            return null; // 沒有觸發爆擊
        }

        // 顯示爆擊動畫
        function showCriticalAnimation(criticalResult) {
            // 顯示「爆擊！！！」橫幅
            const banner = document.createElement('div');
            banner.className = 'critical-banner';
            banner.textContent = '爆擊！！！';
            document.body.appendChild(banner);

            // 依序顯示 XP 獎勵
            const baseTop = 55; // 起始位置（百分比）
            const spacing = 8;  // 每行間距

            criticalResult.xpList.forEach((xp, index) => {
                setTimeout(() => {
                    const xpElement = document.createElement('div');
                    xpElement.className = 'critical-xp';
                    xpElement.textContent = `+++ ${xp}px ！！`;
                    xpElement.style.top = `${baseTop + index * spacing}%`;
                    document.body.appendChild(xpElement);

                    // 2.4秒後移除
                    setTimeout(() => {
                        xpElement.remove();
                    }, 2400);
                }, index * 400); // 每個間隔400ms出現
            });

            // 3秒後移除橫幅
            setTimeout(() => {
                banner.remove();
            }, 3000);
        }

        function updateButtons(hasAnswered) {
            // 檢查是否有上一張卡片
            const hasPrevCard = checkHasPrevCard();
            if (hasPrevCard) {
                prevBtn.classList.remove('hidden');
                prevBtn.classList.add('flex');
            } else {
                prevBtn.classList.add('hidden');
                prevBtn.classList.remove('flex');
            }

            nextBtn.disabled = !hasAnswered;

            // 固定顯示"下一題"（因為只有1題，點擊後會到結果頁）
            nextBtnText.textContent = '下一題';
            nextBtn.querySelector('.material-symbols-outlined').textContent = 'arrow_forward';
        }

        // 檢查是否有上一張卡片
        function checkHasPrevCard() {
            try {
                const currentCardId = sessionStorage.getItem('currentCardId');
                const currentIdsJson = sessionStorage.getItem('currentCardIds');

                if (!currentCardId || !currentIdsJson) {
                    return false;
                }

                const currentIds = JSON.parse(currentIdsJson);
                const currentIndex = currentIds.findIndex(id =>
                    String(id) === String(currentCardId)
                );

                return currentIndex > 0;
            } catch (err) {
                console.error('檢查上一張卡片時發生錯誤:', err);
                return false;
            }
        }

        // 取得上一張卡片 ID
        function getPrevCardId() {
            try {
                const currentCardId = sessionStorage.getItem('currentCardId');
                const currentIdsJson = sessionStorage.getItem('currentCardIds');

                if (!currentCardId || !currentIdsJson) {
                    return null;
                }

                const currentIds = JSON.parse(currentIdsJson);
                const currentIndex = currentIds.findIndex(id =>
                    String(id) === String(currentCardId)
                );

                if (currentIndex > 0) {
                    return currentIds[currentIndex - 1];
                }
                return null;
            } catch (err) {
                console.error('取得上一張卡片時發生錯誤:', err);
                return null;
            }
        }

        function handlePrevClick() {
            if (autoNextTimeout) clearTimeout(autoNextTimeout);

            // 跳轉到上一張卡片
            const prevCardId = getPrevCardId();
            if (prevCardId) {
                window.location.href = `test.html?id=${prevCardId}`;
            }
        }

        async function handleNextClick() {
            if (autoNextTimeout) clearTimeout(autoNextTimeout);

            if (currentQuestionIndex === quizQuestions.length - 1) {
                // 先儲存當前題目的結果到資料庫
                await saveCurrentQuestionResult();

                // 檢查是否有下一張卡片
                const nextCardId = await getNextCardId();

                if (nextCardId) {
                    // 跳轉到下一張卡片的測驗
                    window.location.href = `test.html?id=${nextCardId}`;
                } else {
                    // 沒有下一張卡片時才跳轉到結果頁
                    saveResultsAndRedirect();
                }
            } else {
                goToNextQuestion();
            }
        }

        // 儲存當前題目的結果（已在 handleOptionClick 中完成，此函式僅作為備援）
        async function saveCurrentQuestionResult() {
            // 結果已在點擊選項時儲存，這裡不需要重複呼叫
            return sessionStorage.getItem('quizApiResult')
                ? JSON.parse(sessionStorage.getItem('quizApiResult'))
                : null;
        }

        // 取得下一張卡片 ID（從 sessionStorage 的卡片列表中按順序取得）
        async function getNextCardId() {
            try {
                const currentCardId = sessionStorage.getItem('currentCardId');
                const currentIdsJson = sessionStorage.getItem('currentCardIds');

                if (!currentCardId || !currentIdsJson) {
                    console.log('找不到 currentCardId 或 currentCardIds');
                    return null;
                }

                // 解析卡片 ID 列表
                const currentIds = JSON.parse(currentIdsJson);

                // 找到當前卡片在列表中的索引（需要處理數字/字串類型）
                let currentIndex = currentIds.findIndex(id =>
                    String(id) === String(currentCardId)
                );

                if (currentIndex === -1) {
                    console.log('當前卡片不在列表中:', currentCardId);
                    return null;
                }

                // 檢查是否有下一張卡片
                if (currentIndex < currentIds.length - 1) {
                    const nextId = currentIds[currentIndex + 1];
                    console.log(`找到下一張卡片: ${nextId} (${currentIndex + 1}/${currentIds.length})`);
                    return nextId;
                } else {
                    console.log('已經是最後一張卡片');
                    return null;
                }
            } catch (err) {
                console.error('取得下一張卡片時發生錯誤:', err);
                return null;
            }
        }

        function goToNextQuestion() {
            if (autoNextTimeout) clearTimeout(autoNextTimeout);

            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        }

        // 儲存結果並跳轉
        async function saveResultsAndRedirect() {
            const answer = userAnswers[0]; // 單題制
            const isCorrect = answer ? answer.isCorrect : false;
            const timestamp = new Date().toISOString();

            // 準備基礎結果
            const resultData = {
                results: [isCorrect],
                isPerfect: isCorrect,
                correctCount: isCorrect ? 1 : 0,
                totalQuestions: 1,
                timestamp: timestamp
            };
            localStorage.setItem('quizResults', JSON.stringify(resultData));

            // 呼叫 API 紀錄分數與獎勵
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            // 存儲 cardId 供 result.html 和重測使用
            if (cardId) {
                sessionStorage.setItem('currentCardId', cardId);
            }

            // API 已在 handleOptionClick 中呼叫，這裡只需確認結果已儲存
            const existingResult = sessionStorage.getItem('quizApiResult');
            if (existingResult) {
                console.log('使用已儲存的 API 結果:', JSON.parse(existingResult));
            }

            // Ensure flags are cleared for result page to process them fresh
            sessionStorage.removeItem('levelUpProcessed');
            sessionStorage.removeItem('bonusCelebrationProcessed');

            console.log('Redirecting to result.html...');
            window.location.href = 'result.html';
        }
        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
