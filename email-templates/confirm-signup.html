<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>確認你的帳號 - 360d才庫事業群</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f7f7f7; font-family: 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f7f7f7; padding: 40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 430px; background-color: #ffffff; border: 3px solid #000000; box-shadow: 6px 6px 0px 0px #000000;">

          <!-- Header Banner -->
          <tr>
            <td style="background-color: #FFD600; border-bottom: 3px solid #000000; padding: 32px 24px; text-align: center;">
              <div style="display: inline-block; background-color: #ffffff; border: 3px solid #000000; box-shadow: 3px 3px 0px 0px #000000; padding: 12px; margin-bottom: 16px;">
                <span style="font-size: 32px;">🎓</span>
              </div>
              <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: #000000; letter-spacing: -0.5px; text-transform: uppercase;">
                360d才庫事業群
              </h1>
              <p style="margin: 8px 0 0 0; font-size: 14px; font-weight: 700; color: #000000;">
                考試練習系統
              </p>
            </td>
          </tr>

          <!-- Main Content -->
          <tr>
            <td style="padding: 32px 24px;">
              <h2 style="margin: 0 0 8px 0; font-size: 22px; font-weight: 900; color: #000000; letter-spacing: -0.3px;">
                歡迎加入！🎯
              </h2>
              <p style="margin: 0 0 24px 0; font-size: 15px; color: #1a1a1a; line-height: 1.6; font-weight: 400;">
                感謝你註冊 <strong>360d才庫事業群考試系統</strong>，請點擊下方按鈕完成帳號驗證，即可開始使用互動式測驗與學習追蹤功能。
              </p>

              <!-- CTA Button - Neo-Brutalism Style -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding: 8px 0 24px 0;">
                    <a href="{{ .ConfirmationURL }}"
                       target="_blank"
                       style="display: inline-block; background-color: #FFD600; color: #000000; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; padding: 14px 32px; border: 3px solid #000000; box-shadow: 4px 4px 0px 0px #000000;">
                      ✅ 確認我的帳號
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Info Box - Neo-Brutalism -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color: rgba(255, 214, 0, 0.15); border: 2px solid #000000; padding: 16px; box-shadow: 2px 2px 0px 0px #000000;">
                    <p style="margin: 0 0 12px 0; font-size: 14px; font-weight: 700; color: #000000;">
                      🚀 帳號啟用後你可以：
                    </p>
                    <table role="presentation" cellpadding="0" cellspacing="0" style="font-size: 14px; color: #1a1a1a; line-height: 1.8;">
                      <tr>
                        <td style="padding-right: 8px; vertical-align: top; font-weight: 700;">▸</td>
                        <td>開始練習各章節考試題目</td>
                      </tr>
                      <tr>
                        <td style="padding-right: 8px; vertical-align: top; font-weight: 700;">▸</td>
                        <td>累積經驗值與等級成就</td>
                      </tr>
                      <tr>
                        <td style="padding-right: 8px; vertical-align: top; font-weight: 700;">▸</td>
                        <td>追蹤個人學習進度與弱點分析</td>
                      </tr>
                      <tr>
                        <td style="padding-right: 8px; vertical-align: top; font-weight: 700;">▸</td>
                        <td>挑戰隨機出題模式</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 24px;">
              <div style="border-top: 3px solid #000000;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 20px 24px 28px 24px; text-align: center;">
              <p style="margin: 0 0 8px 0; font-size: 12px; color: #9ca3af; line-height: 1.5;">
                如果你並未註冊此帳號，請忽略此信件。
              </p>
              <p style="margin: 0; font-size: 12px; color: #9ca3af;">
                此連結將於 24 小時後失效。
              </p>
              <div style="margin-top: 16px; display: inline-block; background-color: #000000; padding: 6px 16px; border: 2px solid #000000;">
                <span style="font-size: 11px; font-weight: 900; color: #FFD600; text-transform: uppercase; letter-spacing: 1px;">
                  360d才庫事業群
                </span>
              </div>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
