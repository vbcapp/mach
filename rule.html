<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>iPas AI應用規劃師考證班 - 規則詳解</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FFD600",
                        "background-light": "#EEEEEE",
                        "background-dark": "#111827",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .neo-brutalism-card {
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            border: 4px solid black;
        }
        .neo-brutalism-button:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-[#EEEEEE] dark:bg-background-dark font-display text-black dark:text-white min-h-screen flex flex-col">
    <header class="bg-white border-b-8 border-black sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button onclick="goBack()"
                class="bg-primary border-4 border-black p-1 neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center justify-center">
                <span class="material-symbols-outlined text-black block">arrow_back</span>
            </button>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">規則詳解</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-white border-4 border-black p-1 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                <span class="material-symbols-outlined text-black block text-xl">terminal</span>
            </div>
        </div>
    </header>

    <main class="flex-grow p-6 space-y-5 max-w-md mx-auto">
        <section class="bg-white neo-brutalism-card p-6">
            <h2 class="text-lg font-black italic mb-4 border-b-4 border-black pb-1 inline-block">如何成為滿分卡片？</h2>
            <div class="space-y-4">
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 bg-primary border-3 border-black flex items-center justify-center shrink-0 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                        <span class="material-symbols-outlined text-black text-2xl font-black">add</span>
                    </div>
                    <div>
                        <p class="font-black text-base italic leading-none mb-0.5 uppercase tracking-tight">Step 01</p>
                        <p class="font-bold text-gray-700 text-sm">建立一張新的測驗卡片</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 bg-white border-3 border-black flex items-center justify-center shrink-0 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
                        <span class="material-symbols-outlined text-black text-2xl font-black">fact_check</span>
                    </div>
                    <div>
                        <p class="font-black text-base italic leading-none mb-0.5 uppercase tracking-tight">Step 02</p>
                        <p class="font-bold text-gray-700 text-sm">連續答對 3 個相關問題</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div
                        class="w-12 h-12 bg-black border-3 border-black flex items-center justify-center shrink-0 shadow-[3px_3px_0px_0px_rgba(255,214,0,1)]">
                        <span class="material-symbols-outlined text-primary text-2xl font-black">military_tech</span>
                    </div>
                    <div>
                        <p class="font-black text-base italic leading-none mb-0.5 uppercase tracking-tight">Step 03</p>
                        <p class="font-bold text-gray-700 text-sm">獲得「滿分卡片」勳章</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white neo-brutalism-card p-6">
            <h2 class="text-lg font-black italic mb-4 border-b-4 border-black pb-1 inline-block uppercase">XP 獲得方式</h2>
            <div class="space-y-3">
                <div
                    class="flex items-center justify-between border-3 border-black p-3 bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <div class="flex items-center gap-2">
                        <div
                            class="w-6 h-6 rounded-full border-2 border-black flex items-center justify-center bg-white">
                            <span class="material-symbols-outlined text-black text-[14px] font-black">check</span>
                        </div>
                        <span class="font-black text-base italic">答對 1 題</span>
                    </div>
                    <span class="font-black text-2xl italic tracking-tighter text-black">+70 XP</span>
                </div>
                <div
                    class="flex items-center justify-between border-3 border-black p-3 bg-primary shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-black font-black text-xl">double_arrow</span>
                        <span class="font-black text-base italic">答對 2 題</span>
                    </div>
                    <span class="font-black text-2xl italic tracking-tighter text-black">+85 XP</span>
                </div>
                <div
                    class="flex items-center justify-between border-3 border-black p-3 bg-black shadow-[4px_4px_0px_0px_rgba(255,214,0,1)] text-white">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary font-black text-xl">workspace_premium</span>
                        <span class="font-black text-base italic">答對 3 題</span>
                    </div>
                    <span class="font-black text-2xl italic tracking-tighter text-primary">+100 XP</span>
                </div>
            </div>
        </section>

        <section class="bg-black text-white neo-brutalism-card p-6 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] border-black">
            <div class="flex items-center gap-3 mb-3">
                <span class="material-symbols-outlined text-primary text-3xl font-black">all_inclusive</span>
                <h2 class="text-2xl font-black italic uppercase">無上限挑戰</h2>
            </div>
            <p class="text-base font-bold leading-tight mb-4">
                所有的卡片都可以<span class="text-primary">無限次重複挑戰</span>來獲取 XP！
            </p>
            <div class="border-2 border-primary/50 p-3 bg-zinc-900">
                <p class="text-xs font-bold text-gray-300">
                    💡 提示：獲取 XP 不受當前等級限制，盡情刷題提升你的排名吧！
                </p>
            </div>
        </section>
    </main>

    <div class="h-24"></div>

    <script>
        function goBack() {
            // 返回上一頁
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // 如果沒有歷史記錄，預設回到首頁
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
