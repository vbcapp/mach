<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>工商安全衛生協會-新竹職訓中心 - 權限管理</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FFD600",
                        "background-light": "#EEEEEE",
                        "background-dark": "#111827",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .neo-shadow { box-shadow: 4px 4px 0px 0px #000000; }
        .neo-shadow-sm { box-shadow: 2px 2px 0px 0px #000000; }
        .neo-border { border: 2px solid #000000; }
        .neo-border-thick { border: 3px solid #000000; }
        .neo-brutalism-card {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            border: 4px solid black;
        }
        .neo-brutalism-button:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-black dark:text-white min-h-screen">
    <div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto border-x-2 border-black/5">
        <!-- Header -->
        <header class="bg-primary pt-12 pb-6 px-6 border-b-4 border-black">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='profile.html'"
                    class="bg-white border-4 border-black p-2 neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:scale-105 transition-transform">
                    <span class="material-symbols-outlined text-black block">arrow_back</span>
                </button>
                <h1 class="text-2xl font-black italic tracking-tight">權限管理</h1>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav class="flex border-b-4 border-black bg-white">
            <button id="tab-btn-tags" onclick="switchTab('tags')"
                class="flex-1 py-3 font-black text-sm border-r-2 border-black bg-primary">
                <span class="material-symbols-outlined text-xl block mx-auto mb-1">sell</span>
                標籤
            </button>
            <button id="tab-btn-chapters" onclick="switchTab('chapters')"
                class="flex-1 py-3 font-black text-sm border-r-2 border-black bg-white">
                <span class="material-symbols-outlined text-xl block mx-auto mb-1">folder_managed</span>
                章節
            </button>
            <button id="tab-btn-users" onclick="switchTab('users')" class="flex-1 py-3 font-black text-sm bg-white">
                <span class="material-symbols-outlined text-xl block mx-auto mb-1">group</span>
                學員
            </button>
        </nav>

        <!-- Main Content -->
        <main class="flex-grow p-4 space-y-4 pb-8 overflow-y-auto">
            <!-- ==================== 標籤管理分頁 ==================== -->
            <section id="tab-tags" class="space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-2xl">sell</span>
                        <h2 class="text-lg font-black italic uppercase">標籤管理</h2>
                    </div>
                    <button onclick="openAddTagModal()"
                        class="bg-primary border-4 border-black px-3 py-2 font-black text-sm neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-1">
                        <span class="material-symbols-outlined text-lg">add</span>
                        新增
                    </button>
                </div>

                <div id="tags-loading" class="text-center py-8">
                    <span class="material-symbols-outlined animate-spin text-3xl">progress_activity</span>
                    <p class="text-sm font-bold mt-2">載入中...</p>
                </div>
                <div id="tags-empty" class="hidden text-center py-8">
                    <span class="material-symbols-outlined text-6xl text-zinc-300">label_off</span>
                    <p class="mt-2 text-sm font-bold text-zinc-500">尚無標籤</p>
                </div>
                <div id="tags-list" class="space-y-3 hidden">
                </div>
            </section>

            <!-- ==================== 章節權限分頁 ==================== -->
            <section id="tab-chapters" class="hidden space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-2xl">folder_managed</span>
                        <h2 class="text-lg font-black italic uppercase">章節權限</h2>
                    </div>
                    <button onclick="syncChapters()" id="sync-chapters-btn"
                        class="bg-white border-4 border-black px-3 py-2 font-black text-sm neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-1">
                        <span class="material-symbols-outlined text-lg">sync</span>
                        同步
                    </button>
                </div>

                <div class="bg-primary/30 border-2 border-black p-3">
                    <p class="text-xs font-bold">勾選「公開」讓所有學員存取，或選擇特定標籤進行存取控制。</p>
                </div>

                <div id="chapters-loading" class="text-center py-8">
                    <span class="material-symbols-outlined animate-spin text-3xl">progress_activity</span>
                    <p class="text-sm font-bold mt-2">載入中...</p>
                </div>
                <div id="chapters-list" class="space-y-4 hidden">
                </div>
            </section>

            <!-- ==================== 學員標籤分頁 ==================== -->
            <section id="tab-users" class="hidden space-y-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-2xl">group</span>
                        <h2 class="text-lg font-black italic uppercase">學員標籤</h2>
                    </div>
                    <button onclick="openBatchModal()" id="batch-action-btn" disabled
                        class="bg-white border-4 border-black px-3 py-2 font-black text-sm neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] flex items-center gap-1 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="material-symbols-outlined text-lg">edit_note</span>
                        批量
                    </button>
                </div>

                <!-- 搜尋列 -->
                <div class="relative">
                    <input id="user-search-input" type="text" oninput="searchUsers(this.value)"
                        class="w-full border-4 border-black p-3 pl-12 font-bold focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="搜尋學員 (名稱或 Email)">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
                </div>

                <!-- 全選列 -->
                <div class="flex items-center gap-3 p-2 bg-gray-100 border-2 border-black">
                    <input type="checkbox" id="select-all-users" onchange="toggleSelectAll()"
                        class="w-5 h-5 border-2 border-black accent-primary">
                    <label for="select-all-users" class="font-bold text-sm">全選 (<span id="selected-count">0</span> /
                        <span id="total-count">0</span>)</label>
                </div>

                <div id="users-loading" class="text-center py-8">
                    <span class="material-symbols-outlined animate-spin text-3xl">progress_activity</span>
                    <p class="text-sm font-bold mt-2">載入中...</p>
                </div>
                <div id="users-list" class="space-y-2 max-h-[50vh] overflow-y-auto hidden">
                </div>
            </section>
        </main>
    </div>

    <!-- ==================== 標籤編輯 Modal ==================== -->
    <div id="tag-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white border-4 border-black w-full max-w-sm shadow-[8px_8px_0px_0px_#FFD600]">
            <div class="bg-black text-white px-4 py-3">
                <h3 id="tag-modal-title" class="font-black text-lg">新增標籤</h3>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="text-xs font-black uppercase tracking-widest mb-2 block">標籤名稱</label>
                    <input id="tag-name-input" type="text"
                        class="w-full border-4 border-black p-3 font-bold focus:outline-none focus:ring-2 focus:ring-primary"
                        placeholder="例如：第1梯">
                </div>
                <div>
                    <label class="text-xs font-black uppercase tracking-widest mb-2 block">標籤顏色</label>
                    <div id="color-options" class="flex gap-2 flex-wrap mb-2">
                        <button type="button" onclick="selectColor('#FFD600')" data-color="#FFD600"
                            class="color-option w-10 h-10 border-4 border-black"
                            style="background-color: #FFD600"></button>
                        <button type="button" onclick="selectColor('#4CAF50')" data-color="#4CAF50"
                            class="color-option w-10 h-10 border-2 border-black"
                            style="background-color: #4CAF50"></button>
                        <button type="button" onclick="selectColor('#2196F3')" data-color="#2196F3"
                            class="color-option w-10 h-10 border-2 border-black"
                            style="background-color: #2196F3"></button>
                        <button type="button" onclick="selectColor('#9C27B0')" data-color="#9C27B0"
                            class="color-option w-10 h-10 border-2 border-black"
                            style="background-color: #9C27B0"></button>
                        <button type="button" onclick="selectColor('#FF5722')" data-color="#FF5722"
                            class="color-option w-10 h-10 border-2 border-black"
                            style="background-color: #FF5722"></button>
                        <button type="button" onclick="selectColor('#9E9E9E')" data-color="#9E9E9E"
                            class="color-option w-10 h-10 border-2 border-black"
                            style="background-color: #9E9E9E"></button>
                    </div>
                    <input id="tag-color-input" type="color" value="#FFD600" onchange="selectColor(this.value)"
                        class="w-full h-10 border-4 border-black cursor-pointer">
                </div>
            </div>
            <div class="p-4 border-t-2 border-black flex gap-3">
                <button onclick="closeTagModal()"
                    class="flex-1 bg-white border-4 border-black py-3 font-black neo-brutalism-button">
                    取消
                </button>
                <button onclick="saveTag()"
                    class="flex-1 bg-primary border-4 border-black py-3 font-black neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    儲存
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 章節權限編輯 Modal ==================== -->
    <div id="chapter-access-modal"
        class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div
            class="bg-white border-4 border-black w-full max-w-sm max-h-[80vh] overflow-hidden shadow-[8px_8px_0px_0px_#FFD600] flex flex-col">
            <div class="bg-black text-white px-4 py-3 flex-shrink-0">
                <h3 class="font-black text-lg">編輯章節權限</h3>
                <p id="chapter-access-subtitle" class="text-sm text-gray-300 mt-1"></p>
            </div>
            <div class="p-4 flex-grow overflow-y-auto space-y-4">
                <!-- 公開選項 -->
                <div class="flex items-center justify-between p-3 bg-gray-50 border-2 border-black">
                    <div>
                        <span class="font-black">公開給所有學員</span>
                        <p class="text-xs text-gray-500">啟用後，所有學員都可存取</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chapter-is-public" onchange="toggleChapterTagsSection()"
                            class="sr-only peer">
                        <div
                            class="w-12 h-6 bg-gray-300 border-2 border-black peer-checked:bg-green-500 relative transition-colors">
                            <div
                                class="absolute top-0.5 left-0.5 w-4 h-4 bg-black transition-transform peer-checked:translate-x-6">
                            </div>
                        </div>
                    </label>
                </div>
                <!-- 標籤選擇 -->
                <div id="chapter-tags-section">
                    <label class="text-xs font-black uppercase tracking-widest mb-2 block">開放給以下標籤的學員</label>
                    <div id="chapter-tags-options" class="space-y-2 max-h-48 overflow-y-auto"></div>
                </div>
            </div>
            <div class="p-4 border-t-2 border-black flex gap-3 flex-shrink-0">
                <button onclick="closeChapterAccessModal()"
                    class="flex-1 bg-white border-4 border-black py-3 font-black neo-brutalism-button">
                    取消
                </button>
                <button onclick="saveChapterAccess()"
                    class="flex-1 bg-primary border-4 border-black py-3 font-black neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    儲存
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 學員標籤編輯 Modal ==================== -->
    <div id="user-tag-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div
            class="bg-white border-4 border-black w-full max-w-sm max-h-[80vh] overflow-hidden shadow-[8px_8px_0px_0px_#FFD600] flex flex-col">
            <div class="bg-black text-white px-4 py-3 flex-shrink-0">
                <h3 class="font-black text-lg">編輯學員標籤</h3>
                <p id="user-tag-modal-subtitle" class="text-sm text-gray-300 mt-1"></p>
            </div>
            <div class="p-4 flex-grow overflow-y-auto">
                <p class="text-sm font-bold mb-3">選擇此學員的標籤：</p>
                <div id="user-tag-options" class="space-y-2"></div>
            </div>
            <div class="p-4 border-t-2 border-black flex gap-3 flex-shrink-0">
                <button onclick="closeUserTagModal()"
                    class="flex-1 bg-white border-4 border-black py-3 font-black neo-brutalism-button">
                    取消
                </button>
                <button onclick="saveUserTags()"
                    class="flex-1 bg-primary border-4 border-black py-3 font-black neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    儲存
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== 批量操作 Modal ==================== -->
    <div id="batch-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white border-4 border-black w-full max-w-sm shadow-[8px_8px_0px_0px_#FFD600]">
            <div class="bg-black text-white px-4 py-3">
                <h3 class="font-black text-lg">批量操作</h3>
                <p id="batch-user-count" class="text-sm text-gray-300 mt-1"></p>
            </div>
            <div class="p-4 space-y-4">
                <!-- 操作類型 -->
                <div class="flex gap-2">
                    <button onclick="setBatchMode('add')" id="batch-add-mode"
                        class="flex-1 bg-primary border-4 border-black py-2 font-black text-sm">
                        新增標籤
                    </button>
                    <button onclick="setBatchMode('remove')" id="batch-remove-mode"
                        class="flex-1 bg-white border-4 border-black py-2 font-black text-sm">
                        移除標籤
                    </button>
                </div>
                <!-- 標籤選擇 -->
                <div id="batch-tag-options" class="space-y-2 max-h-48 overflow-y-auto"></div>
            </div>
            <div class="p-4 border-t-2 border-black flex gap-3">
                <button onclick="closeBatchModal()"
                    class="flex-1 bg-white border-4 border-black py-3 font-black neo-brutalism-button">
                    取消
                </button>
                <button onclick="executeBatchOperation()"
                    class="flex-1 bg-primary border-4 border-black py-3 font-black neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    確認
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/modal-system.js"></script>
    <script>
        // ==================== 全域狀態 ====================
        let allTags = [];
        let allChapterAccess = [];
        let allUsers = [];
        let filteredUsers = [];
        let selectedUserIds = new Set();

        // 標籤編輯狀態
        let editingTagId = null;
        let selectedColor = '#FFD600';

        // 章節編輯狀態
        let editingAccessId = null;
        let selectedChapterTags = new Set();

        // 學員編輯狀態
        let editingUserId = null;
        let selectedUserTags = new Set();

        // 批量操作狀態
        let batchMode = 'add';
        let batchSelectedTags = new Set();

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await apiService.initialize();
                const user = apiService.currentUser;

                // 檢查管理員權限
                if (!user || !ADMIN_UUIDS.includes(user.id)) {
                    ModalSystem.alert('權限不足', '您沒有管理員權限', () => {
                        window.location.href = 'profile.html';
                    });
                    return;
                }

                // 載入標籤（預設分頁）
                await loadTags();
            } catch (error) {
                console.error('初始化失敗:', error);
                ModalSystem.alert('錯誤', '頁面載入失敗，請重新整理');
            }
        });

        // ==================== Tab 切換 ====================
        function switchTab(tabName) {
            ['tags', 'chapters', 'users'].forEach(tab => {
                const btn = document.getElementById(`tab-btn-${tab}`);
                const section = document.getElementById(`tab-${tab}`);

                if (tab === tabName) {
                    btn.classList.add('bg-primary');
                    btn.classList.remove('bg-white');
                    section.classList.remove('hidden');
                } else {
                    btn.classList.remove('bg-primary');
                    btn.classList.add('bg-white');
                    section.classList.add('hidden');
                }
            });

            // 載入對應資料
            if (tabName === 'tags' && allTags.length === 0) {
                loadTags();
            } else if (tabName === 'chapters' && allChapterAccess.length === 0) {
                loadChapterAccess();
            } else if (tabName === 'users' && allUsers.length === 0) {
                loadUsers();
            }
        }

        // ==================== 工具函式 ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 標籤管理 ====================
        async function loadTags() {
            const loading = document.getElementById('tags-loading');
            const empty = document.getElementById('tags-empty');
            const list = document.getElementById('tags-list');

            list.classList.add('hidden');
            loading.classList.remove('hidden');
            empty.classList.add('hidden');

            const result = await apiService.getAllTags();

            loading.classList.add('hidden');

            if (!result.success) {
                ModalSystem.alert('載入失敗', result.error?.message || '無法載入標籤');
                return;
            }

            allTags = result.data;
            renderTagsList();
        }

        function renderTagsList() {
            const list = document.getElementById('tags-list');
            const empty = document.getElementById('tags-empty');
            const loading = document.getElementById('tags-loading');

            loading.classList.add('hidden');

            if (allTags.length === 0) {
                empty.classList.remove('hidden');
                list.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.classList.remove('hidden');

            // 移除舊的標籤項目
            list.innerHTML = '';

            // 加入新的標籤項目
            allTags.forEach(tag => {
                const div = document.createElement('div');
                div.className = 'tag-item bg-white border-4 border-black p-4 neo-brutalism-card flex items-center justify-between';
                div.dataset.tagId = tag.id;
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-6 h-6 border-2 border-black" style="background-color: ${tag.color}"></div>
                        <span class="font-black text-lg">${escapeHtml(tag.name)}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEditTagModal('${tag.id}')"
                                class="bg-white border-2 border-black p-2 neo-shadow-sm hover:bg-gray-100">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                        <button onclick="confirmDeleteTag('${tag.id}', '${escapeHtml(tag.name)}')"
                                class="bg-white border-2 border-black p-2 neo-shadow-sm hover:bg-red-100">
                            <span class="material-symbols-outlined text-sm text-red-500">delete</span>
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function openAddTagModal() {
            editingTagId = null;
            document.getElementById('tag-modal-title').textContent = '新增標籤';
            document.getElementById('tag-name-input').value = '';
            selectColor('#FFD600');
            document.getElementById('tag-modal').classList.remove('hidden');
        }

        function openEditTagModal(tagId) {
            const tag = allTags.find(t => t.id === tagId);
            if (!tag) return;

            editingTagId = tagId;
            document.getElementById('tag-modal-title').textContent = '編輯標籤';
            document.getElementById('tag-name-input').value = tag.name;
            selectColor(tag.color);
            document.getElementById('tag-modal').classList.remove('hidden');
        }

        function closeTagModal() {
            document.getElementById('tag-modal').classList.add('hidden');
        }

        function selectColor(color) {
            selectedColor = color;
            document.getElementById('tag-color-input').value = color;

            // 更新顏色選項的邊框
            document.querySelectorAll('.color-option').forEach(btn => {
                if (btn.dataset.color === color) {
                    btn.classList.remove('border-2');
                    btn.classList.add('border-4');
                } else {
                    btn.classList.remove('border-4');
                    btn.classList.add('border-2');
                }
            });
        }

        async function saveTag() {
            const name = document.getElementById('tag-name-input').value.trim();

            if (!name) {
                ModalSystem.alert('請輸入標籤名稱', '標籤名稱不可為空');
                return;
            }

            let result;
            if (editingTagId) {
                result = await apiService.updateTag(editingTagId, { name, color: selectedColor });
            } else {
                result = await apiService.createTag(name, selectedColor);
            }

            if (result.success) {
                closeTagModal();
                ModalSystem.toast(editingTagId ? '標籤已更新' : '標籤已新增', 'success');
                await loadTags();
            } else {
                ModalSystem.alert('操作失敗', result.error?.message || '請稍後再試');
            }
        }

        function confirmDeleteTag(tagId, tagName) {
            ModalSystem.confirm(
                '確定刪除標籤？',
                `刪除「${tagName}」後，相關的權限設定可能會受影響。`,
                async () => {
                    const result = await apiService.deleteTag(tagId);
                    if (result.success) {
                        ModalSystem.toast('標籤已刪除', 'success');
                        await loadTags();
                    } else {
                        ModalSystem.alert('刪除失敗', result.error?.message);
                    }
                },
                null,
                { confirmText: '刪除', isDestructive: true }
            );
        }

        // ==================== 章節權限管理 ====================
        async function loadChapterAccess() {
            const loading = document.getElementById('chapters-loading');
            const list = document.getElementById('chapters-list');

            list.classList.add('hidden');
            loading.classList.remove('hidden');

            // 確保標籤已載入
            if (allTags.length === 0) {
                const tagsResult = await apiService.getAllTags();
                if (tagsResult.success) {
                    allTags = tagsResult.data;
                }
            }

            const result = await apiService.getAllChapterAccess();

            loading.classList.add('hidden');

            if (!result.success) {
                ModalSystem.alert('載入失敗', result.error?.message);
                return;
            }

            allChapterAccess = result.data;
            renderChapterAccessList();
        }

        function renderChapterAccessList() {
            const list = document.getElementById('chapters-list');
            const loading = document.getElementById('chapters-loading');

            loading.classList.add('hidden');
            list.classList.remove('hidden');

            if (allChapterAccess.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-8">
                        <span class="material-symbols-outlined text-6xl text-zinc-300">folder_off</span>
                        <p class="mt-2 text-sm font-bold text-zinc-500">尚無章節資料</p>
                        <p class="text-xs text-zinc-400 mt-1">請先匯入題目</p>
                    </div>
                `;
                return;
            }

            // 按科目分組
            const grouped = {};
            allChapterAccess.forEach(access => {
                const subject = access.subject || '未分類';
                if (!grouped[subject]) {
                    grouped[subject] = [];
                }
                grouped[subject].push(access);
            });

            list.innerHTML = Object.entries(grouped).map(([subject, chapters]) => `
                <div class="subject-group" data-subject="${escapeHtml(subject)}">
                    <div class="subject-header bg-black text-white p-3 flex items-center justify-between cursor-pointer"
                         onclick="toggleSubjectGroup(this)">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined subject-chevron transition-transform">expand_more</span>
                            <span class="font-black">${escapeHtml(subject)}</span>
                        </div>
                        <span class="bg-primary text-black px-2 py-1 text-xs font-black">${chapters.length} 章節</span>
                    </div>
                    <div class="subject-chapters space-y-2 p-2 bg-gray-50 border-x-4 border-b-4 border-black">
                        ${chapters.map(ch => renderChapterItem(ch)).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderChapterItem(access) {
            let tagsHtml;
            if (access.is_public) {
                tagsHtml = '<span class="bg-green-500 text-white px-2 py-0.5 text-xs font-black">公開</span>';
            } else if (access.allowed_tags && access.allowed_tags.length > 0) {
                tagsHtml = access.allowed_tags.map(tagName => {
                    const tag = allTags.find(t => t.name === tagName);
                    const color = tag?.color || '#9E9E9E';
                    return `<span class="px-2 py-0.5 text-xs font-bold border border-black" style="background-color: ${color}">${escapeHtml(tagName)}</span>`;
                }).join('');
            } else {
                tagsHtml = '<span class="text-gray-400 text-xs font-bold">未開放</span>';
            }

            return `
                <div class="chapter-item bg-white border-2 border-black p-3" data-access-id="${access.id}">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-grow">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-black text-sm">${escapeHtml(access.chapter)}</span>
                                <span class="bg-gray-200 px-2 py-0.5 text-xs font-bold">${access.question_count || 0} 題</span>
                            </div>
                            <div class="flex flex-wrap gap-1 mt-2">${tagsHtml}</div>
                        </div>
                        <button onclick="openChapterAccessModal('${access.id}')"
                                class="bg-primary border-2 border-black p-2 neo-shadow-sm flex-shrink-0">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function toggleSubjectGroup(headerEl) {
            const chaptersEl = headerEl.nextElementSibling;
            const chevron = headerEl.querySelector('.subject-chevron');

            if (chaptersEl.classList.contains('hidden')) {
                chaptersEl.classList.remove('hidden');
                chevron.style.transform = 'rotate(0deg)';
            } else {
                chaptersEl.classList.add('hidden');
                chevron.style.transform = 'rotate(-90deg)';
            }
        }

        function openChapterAccessModal(accessId) {
            const access = allChapterAccess.find(a => a.id === accessId);
            if (!access) return;

            editingAccessId = accessId;

            document.getElementById('chapter-access-subtitle').textContent =
                `${access.subject} - ${access.chapter}`;

            document.getElementById('chapter-is-public').checked = access.is_public;

            selectedChapterTags = new Set(access.allowed_tags || []);
            renderChapterTagOptions();
            toggleChapterTagsSection();

            document.getElementById('chapter-access-modal').classList.remove('hidden');
        }

        function closeChapterAccessModal() {
            document.getElementById('chapter-access-modal').classList.add('hidden');
        }

        function toggleChapterTagsSection() {
            const isPublic = document.getElementById('chapter-is-public').checked;
            const section = document.getElementById('chapter-tags-section');

            if (isPublic) {
                section.classList.add('hidden');
            } else {
                section.classList.remove('hidden');
            }
        }

        function renderChapterTagOptions() {
            const container = document.getElementById('chapter-tags-options');

            container.innerHTML = allTags.map(tag => {
                const isChecked = selectedChapterTags.has(tag.name);
                return `
                    <label class="flex items-center gap-3 p-2 border-2 border-black cursor-pointer ${isChecked ? 'bg-primary/20' : 'bg-white'}">
                        <input type="checkbox" ${isChecked ? 'checked' : ''}
                               onchange="toggleChapterTag('${escapeHtml(tag.name)}')"
                               class="w-5 h-5 border-2 border-black accent-primary">
                        <div class="w-4 h-4 border border-black" style="background-color: ${tag.color}"></div>
                        <span class="font-bold">${escapeHtml(tag.name)}</span>
                    </label>
                `;
            }).join('');
        }

        function toggleChapterTag(tagName) {
            if (selectedChapterTags.has(tagName)) {
                selectedChapterTags.delete(tagName);
            } else {
                selectedChapterTags.add(tagName);
            }
            renderChapterTagOptions();
        }

        async function saveChapterAccess() {
            if (!editingAccessId) return;

            const isPublic = document.getElementById('chapter-is-public').checked;
            const allowedTags = isPublic ? [] : Array.from(selectedChapterTags);

            const result = await apiService.updateChapterAccess(editingAccessId, {
                is_public: isPublic,
                allowed_tags: allowedTags
            });

            if (result.success) {
                closeChapterAccessModal();
                ModalSystem.toast('章節權限已更新', 'success');
                await loadChapterAccess();
            } else {
                ModalSystem.alert('儲存失敗', result.error?.message);
            }
        }

        async function syncChapters() {
            const btn = document.getElementById('sync-chapters-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg">sync</span> 同步中...';

            const result = await apiService.syncChapterAccess();

            btn.disabled = false;
            btn.innerHTML = '<span class="material-symbols-outlined text-lg">sync</span> 同步';

            if (result.success) {
                ModalSystem.toast(result.message || '同步完成', 'success');
                await loadChapterAccess();
            } else {
                ModalSystem.alert('同步失敗', result.error?.message);
            }
        }

        // ==================== 學員標籤管理 ====================
        async function loadUsers() {
            const loading = document.getElementById('users-loading');
            const list = document.getElementById('users-list');

            if (list) list.classList.add('hidden');
            if (loading) loading.classList.remove('hidden');

            // 確保標籤已載入
            if (allTags.length === 0) {
                const tagsResult = await apiService.getAllTags();
                if (tagsResult.success) {
                    allTags = tagsResult.data;
                }
            }

            const result = await apiService.getAllUsers();

            loading.classList.add('hidden');

            if (!result.success) {
                ModalSystem.alert('載入失敗', result.error?.message);
                return;
            }

            allUsers = result.data;
            filteredUsers = [...allUsers];
            renderUsersList();
            updateUserCounts();
        }

        function renderUsersList() {
            const list = document.getElementById('users-list');
            const loading = document.getElementById('users-loading');

            loading.classList.add('hidden');
            list.classList.remove('hidden');

            if (filteredUsers.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-8">
                        <span class="material-symbols-outlined text-6xl text-zinc-300">person_off</span>
                        <p class="mt-2 text-sm font-bold text-zinc-500">沒有找到學員</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filteredUsers.map(user => {
                const isSelected = selectedUserIds.has(user.id);
                const userTags = user.tags || [];
                let tagsHtml;

                if (userTags.length > 0) {
                    tagsHtml = userTags.map(tagName => {
                        const tag = allTags.find(t => t.name === tagName);
                        const color = tag?.color || '#9E9E9E';
                        return `<span class="px-2 py-0.5 text-xs font-bold border border-black" style="background-color: ${color}">${escapeHtml(tagName)}</span>`;
                    }).join('');
                } else {
                    tagsHtml = '<span class="text-gray-400 text-xs">無標籤</span>';
                }

                return `
                    <div class="user-item bg-white border-2 border-black p-3 flex items-center gap-3 ${isSelected ? 'bg-primary/10' : ''}"
                         data-user-id="${user.id}">
                        <input type="checkbox" class="user-checkbox w-5 h-5 border-2 border-black accent-primary flex-shrink-0"
                               data-user-id="${user.id}" ${isSelected ? 'checked' : ''}
                               onchange="toggleUserSelection('${user.id}')">
                        <div class="w-10 h-10 border-2 border-black bg-gray-200 flex-shrink-0 overflow-hidden flex items-center justify-center">
                            ${user.avatar_url
                        ? `<img src="${user.avatar_url}" class="w-full h-full object-cover">`
                        : '<span class="material-symbols-outlined text-2xl text-gray-400">person</span>'
                    }
                        </div>
                        <div class="flex-grow min-w-0">
                            <p class="font-black truncate">${escapeHtml(user.username || '未命名')}</p>
                            <p class="text-xs text-gray-500 truncate">${escapeHtml(user.email || '')}</p>
                            <div class="flex flex-wrap gap-1 mt-1">${tagsHtml}</div>
                        </div>
                        <button onclick="openUserTagModal('${user.id}')"
                                class="bg-primary border-2 border-black p-2 neo-shadow-sm flex-shrink-0">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function searchUsers(query) {
            const q = query.toLowerCase().trim();

            if (!q) {
                filteredUsers = [...allUsers];
            } else {
                filteredUsers = allUsers.filter(user =>
                    (user.username && user.username.toLowerCase().includes(q)) ||
                    (user.email && user.email.toLowerCase().includes(q))
                );
            }

            renderUsersList();
            updateUserCounts();
        }

        function toggleUserSelection(userId) {
            if (selectedUserIds.has(userId)) {
                selectedUserIds.delete(userId);
            } else {
                selectedUserIds.add(userId);
            }
            updateBatchButton();
            updateUserCounts();

            // 更新該項目的背景
            const item = document.querySelector(`.user-item[data-user-id="${userId}"]`);
            if (item) {
                if (selectedUserIds.has(userId)) {
                    item.classList.add('bg-primary/10');
                } else {
                    item.classList.remove('bg-primary/10');
                }
            }
        }

        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('select-all-users');

            if (selectAllCheckbox.checked) {
                filteredUsers.forEach(u => selectedUserIds.add(u.id));
            } else {
                selectedUserIds.clear();
            }

            updateBatchButton();
            updateUserCounts();
            renderUsersList();
        }

        function updateBatchButton() {
            const btn = document.getElementById('batch-action-btn');
            btn.disabled = selectedUserIds.size === 0;
        }

        function updateUserCounts() {
            document.getElementById('selected-count').textContent = selectedUserIds.size;
            document.getElementById('total-count').textContent = filteredUsers.length;

            // 更新全選 checkbox 狀態
            const selectAllCheckbox = document.getElementById('select-all-users');
            if (filteredUsers.length > 0 && selectedUserIds.size === filteredUsers.length) {
                selectAllCheckbox.checked = true;
            } else {
                selectAllCheckbox.checked = false;
            }
        }

        function openUserTagModal(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;

            editingUserId = userId;
            selectedUserTags = new Set(user.tags || []);

            document.getElementById('user-tag-modal-subtitle').textContent = user.username || user.email || '未命名';
            renderUserTagOptions();
            document.getElementById('user-tag-modal').classList.remove('hidden');
        }

        function closeUserTagModal() {
            document.getElementById('user-tag-modal').classList.add('hidden');
        }

        function renderUserTagOptions() {
            const container = document.getElementById('user-tag-options');

            container.innerHTML = allTags.map(tag => {
                const isChecked = selectedUserTags.has(tag.name);
                return `
                    <label class="flex items-center gap-3 p-2 border-2 border-black cursor-pointer ${isChecked ? 'bg-primary/20' : 'bg-white'}">
                        <input type="checkbox" ${isChecked ? 'checked' : ''}
                               onchange="toggleUserTagOption('${escapeHtml(tag.name)}')"
                               class="w-5 h-5 border-2 border-black accent-primary">
                        <div class="w-4 h-4 border border-black" style="background-color: ${tag.color}"></div>
                        <span class="font-bold">${escapeHtml(tag.name)}</span>
                    </label>
                `;
            }).join('');
        }

        function toggleUserTagOption(tagName) {
            if (selectedUserTags.has(tagName)) {
                selectedUserTags.delete(tagName);
            } else {
                selectedUserTags.add(tagName);
            }
            renderUserTagOptions();
        }

        async function saveUserTags() {
            if (!editingUserId) return;

            const result = await apiService.setUserTags(editingUserId, Array.from(selectedUserTags));

            if (result.success) {
                closeUserTagModal();
                ModalSystem.toast('學員標籤已更新', 'success');
                await loadUsers();
            } else {
                ModalSystem.alert('儲存失敗', result.error?.message);
            }
        }

        // ==================== 批量操作 ====================
        function openBatchModal() {
            if (selectedUserIds.size === 0) return;

            batchMode = 'add';
            batchSelectedTags = new Set();

            document.getElementById('batch-user-count').textContent = `已選取 ${selectedUserIds.size} 位學員`;
            setBatchMode('add');
            renderBatchTagOptions();
            document.getElementById('batch-modal').classList.remove('hidden');
        }

        function closeBatchModal() {
            document.getElementById('batch-modal').classList.add('hidden');
        }

        function setBatchMode(mode) {
            batchMode = mode;
            batchSelectedTags = new Set();

            const addBtn = document.getElementById('batch-add-mode');
            const removeBtn = document.getElementById('batch-remove-mode');

            if (mode === 'add') {
                addBtn.classList.add('bg-primary');
                addBtn.classList.remove('bg-white');
                removeBtn.classList.remove('bg-primary');
                removeBtn.classList.add('bg-white');
            } else {
                removeBtn.classList.add('bg-primary');
                removeBtn.classList.remove('bg-white');
                addBtn.classList.remove('bg-primary');
                addBtn.classList.add('bg-white');
            }

            renderBatchTagOptions();
        }

        function renderBatchTagOptions() {
            const container = document.getElementById('batch-tag-options');

            container.innerHTML = allTags.map(tag => {
                const isChecked = batchSelectedTags.has(tag.name);
                return `
                    <label class="flex items-center gap-3 p-2 border-2 border-black cursor-pointer ${isChecked ? 'bg-primary/20' : 'bg-white'}">
                        <input type="checkbox" ${isChecked ? 'checked' : ''}
                               onchange="toggleBatchTag('${escapeHtml(tag.name)}')"
                               class="w-5 h-5 border-2 border-black accent-primary">
                        <div class="w-4 h-4 border border-black" style="background-color: ${tag.color}"></div>
                        <span class="font-bold">${escapeHtml(tag.name)}</span>
                    </label>
                `;
            }).join('');
        }

        function toggleBatchTag(tagName) {
            if (batchSelectedTags.has(tagName)) {
                batchSelectedTags.delete(tagName);
            } else {
                batchSelectedTags.add(tagName);
            }
            renderBatchTagOptions();
        }

        async function executeBatchOperation() {
            if (selectedUserIds.size === 0 || batchSelectedTags.size === 0) {
                ModalSystem.alert('請選擇標籤', '請選擇要操作的標籤');
                return;
            }

            const userIds = Array.from(selectedUserIds);
            const tags = Array.from(batchSelectedTags);

            let result;
            if (batchMode === 'add') {
                result = await apiService.addTagsToUsers(userIds, tags);
            } else {
                result = await apiService.removeTagsFromUsers(userIds, tags);
            }

            if (result.success) {
                closeBatchModal();
                selectedUserIds.clear();
                updateBatchButton();
                ModalSystem.toast(`已${batchMode === 'add' ? '新增' : '移除'}標籤給 ${result.updatedCount} 位學員`, 'success');
                await loadUsers();
            } else {
                ModalSystem.alert('操作失敗', result.error?.message);
            }
        }
    </script>
</body>

</html>
