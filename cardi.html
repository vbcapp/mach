<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd400",
                        "secondary": "#ff6b8b",
                        "accent-blue": "#4a90e2",
                        "background-light": "#f5f5f5",
                        "background-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderWidth: {
                        '3': '3px',
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'neo-lg': '10px 10px 0px 0px rgba(0,0,0,1)',
                        'neo-sm': '3px 3px 0px 0px rgba(0,0,0,1)',
                        'neo-dark': '4px 4px 0px 0px rgba(255,255,255,0.2)',
                        'neo-lg-dark': '10px 10px 0px 0px rgba(255,255,255,0.15)',
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
    <style>
        body {
            min-height: 100dvh;
        }

        .centered-container {
            width: 100%;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        .capped-gold-shimmer {
            position: relative;
            overflow: hidden;
            background-color: #ffd400 !important;
            /* Force gold connection */
        }

        .capped-gold-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.6),
                    transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% {
                left: 200%;
            }
        }
    </style>
    <!-- Add LevelSystem Script -->
    <script src="js/level-system.js"></script>
</head>

                    <span class="material-symbols-outlined text-xl sm:text-2xl">more_horiz</span>

                        <p id="header-xp-text" class="text-[8px] sm:text-[10px] font-bold">- / -</p>
                    </div>

                    </div>

    <main class="flex-1 flex flex-col items-center justify-start p-6 w-full">

            <div

                <div class="absolute top-4 left-4">

                    <div class="flex flex-col items-center gap-1">

                    <div>
                        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">

                            內容說明

                            class="max-h-[4.5em] overflow-y-auto leading-relaxed text-sm text-gray-800 dark:text-gray-200">
                        </div>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
                            <span class="w-2 h-4 bg-primary border border-black inline-block"></span>
                            生活化比喻
                        </h3>
                        <div
                            class="bg-gray-50 dark:bg-black/20 border-3 border-black p-4 rounded-lg relative overflow-hidden">

                            <div id="card-analogy"

                <div class="px-6 pb-6 pt-2 shrink-0">
                    <div class="flex items-center justify-between gap-3">
                        <a id="edit-link" href="edit.html"
                            class="w-12 h-12 rounded-full border-3 border-black bg-white dark:bg-black shadow-neo flex items-center justify-center active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all shrink-0 text-black dark:text-white">
                            <span class="material-symbols-outlined text-xl">edit</span>
                        </a>
                        <a id="test-link" href="test.html"
                            class="flex-1 py-3 bg-secondary border-3 border-black dark:border-white shadow-neo active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all rounded-full flex items-center justify-center text-white gap-2 group">
                            <span class="material-symbols-outlined text-xl font-bold">psychology</span>
                            <span class="text-base font-bold tracking-wider">測驗</span>
                        </a>
                        <a href="share.html"
                            class="w-12 h-12 rounded-full border-3 border-black bg-white dark:bg-black shadow-neo flex items-center justify-center active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all shrink-0 text-black dark:text-white">

    </main>
    <div
        class="fixed top-20 left-1/2 -translate-x-[150px] w-32 h-32 bg-primary/20 rounded-full blur-3xl pointer-events-none -z-10">
    </div>
    <div
        class="fixed bottom-40 left-1/2 translate-x-[50px] w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none -z-10">
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/modal-system.js"></script>

    <script>
        let currentCard = null;

        // 從 sessionStorage 讀取快取
        function getCachedCard(cardId) {
            const cached = sessionStorage.getItem(`card_${cardId}`);
            return cached ? JSON.parse(cached) : null;
        }

        // 從快取載入使用者資料
        function loadUserFromCache() {
            const cached = sessionStorage.getItem('userData');
            if (cached) {
                const userData = JSON.parse(cached);

                // 使用 LevelSystem 計算顯示狀態
                let levelState;
                if (typeof LevelSystem !== 'undefined') {
                    const currentXP = userData.current_xp || 0;
                    const perfectCards = userData.perfect_card_count || 0;
                    levelState = LevelSystem.calculateState(currentXP, perfectCards);
                } else {
                    console.warn('LevelSystem not loaded, falling back to simple display');
                    levelState = {
                        actualLevel: userData.current_level || 1,
                        progressInLevel: 0,
                        xpForNextLevel: 100,
                        isCapped: false,
                        displayProgress: 0
                    };
                }

                const xpText = document.getElementById('header-xp-text');
                if (xpText) {
                    if (levelState.isCapped) {
                        xpText.textContent = `MAX`;
                    } else {
                        xpText.textContent = `${levelState.progressInLevel}/${levelState.xpForNextLevel}`;
                    }
                }

                const xpBar = document.getElementById('header-xp-bar');
                if (xpBar) {
                    xpBar.style.width = `${Math.min(levelState.displayProgress, 100)}%`;

                    // 處理金色閃爍 (Capped State)
                    if (levelState.isCapped) {
                        xpBar.classList.add('capped-gold-shimmer');
                        xpBar.classList.remove('bg-primary');
                    } else {
                        xpBar.classList.remove('capped-gold-shimmer');
                        xpBar.classList.add('bg-primary');
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', async function () {
            // 立即從快取載入使用者資料
            loadUserFromCache();

            // 從 URL 取得卡片 ID
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (!cardId) {
                // If ModalSystem is not ready immediately, we might need to wait or just alert.
                // But DOMContentLoaded is fired, scripts should be loaded.
                if (typeof ModalSystem !== 'undefined') {
                    ModalSystem.alert('錯誤', '找不到卡片 ID', () => {
                        window.location.href = 'index.html';
                    });
                } else {
                    alert('找不到卡片 ID');
                    window.location.href = 'index.html';
                }
                return;
            }

            // 先檢查快取，立即顯示
            const cachedCard = getCachedCard(cardId);
            if (cachedCard) {
                currentCard = cachedCard;
                renderCard(cachedCard);
            }

            // 初始化 API 並載入最新資料
            await apiService.initialize();
            await loadCard(cardId);

            // 初始化滑動切換
            initSwipe(cardId);
        });

        // [Swipe Navigation]
        function initSwipe(currentId) {
            const currentIdsJson = sessionStorage.getItem('currentCardIds');
            if (!currentIdsJson) return;

            try {
                const currentIds = JSON.parse(currentIdsJson);
                // 嘗試轉型別比對 (ID 可能是數字或字串)
                let index = currentIds.indexOf(currentId);
                if (index === -1) index = currentIds.indexOf(Number(currentId));
                if (index === -1) index = currentIds.indexOf(String(currentId));

                if (index === -1) return;

                let touchStartX = 0;
                let touchEndX = 0;
                const minSwipeDistance = 50;

                document.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                document.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    handleGesture();
                }, { passive: true });

                function handleGesture() {
                    const diffX = touchEndX - touchStartX;

                    if (Math.abs(diffX) > minSwipeDistance) {
                        if (diffX < 0) {
                            // Swipe Left -> Next Card
                            if (index < currentIds.length - 1) {
                                const nextId = currentIds[index + 1];
                                window.location.href = `cardi.html?id=${nextId}`;
                            } else {
                                // Last card hint?
                            }
                        } else {
                            // Swipe Right -> Prev Card
                            if (index > 0) {
                                const prevId = currentIds[index - 1];
                                window.location.href = `cardi.html?id=${prevId}`;
                            }
                        }
                    }
                }
            } catch (e) {
                console.error('Swipe init error:', e);
            }
        }

        async function loadCard(cardId) {
            const userId = apiService.currentUser?.id;

            if (!userId) {
                ModalSystem.alert('請先登入', '需要登入才能查看卡片', () => {
                    window.location.href = 'login.html';
                });
                return;
            }

            const result = await apiService.getCardWithProgress(cardId, userId);

            if (result.success && result.data.card) {
                currentCard = result.data.card;
                // 更新快取
                sessionStorage.setItem(`card_${cardId}`, JSON.stringify(currentCard));
                renderCard(currentCard);
            } else if (!currentCard) {
                // 只有在沒有快取資料時才顯示錯誤
                ModalSystem.alert('錯誤', '載入卡片失敗', () => {
                    window.location.href = 'index.html';
                });
            }
        }

        function renderCard(card) {
            // 更新分類
            const categoryEl = document.getElementById('card-category');
            if (categoryEl) categoryEl.textContent = card.category || 'GENERAL';

            // 更新等級
            const levelEl = document.getElementById('card-level');
            if (levelEl) levelEl.textContent = `Lv.${card.level || 1}`;

            // 更新標題 (若有縮寫則顯示縮寫，否則顯示全稱)
            const titleEl = document.getElementById('card-title');
            const mainTitle = card.abbreviation ? card.abbreviation : card.english_term;
            if (titleEl) titleEl.textContent = mainTitle;

            // 更新副標題 (若上方顯示縮寫，這裡顯示全稱並加括號；若上方已是全稱，這裡留白)
            const abbrEl = document.getElementById('card-abbreviation');
            const subTitle = card.abbreviation ? `(${card.english_term})` : '';
            if (abbrEl) {
                abbrEl.textContent = subTitle;
                // 強制套用排版樣式：置中、無連字號斷字、動態字級 (盡量不換行)
                abbrEl.style.cssText = `
                    text-align: center;
                    hyphens: none;
                    -webkit-hyphens: none;
                    overflow-wrap: break-word;
                    word-wrap: break-word;
                    font-size: clamp(0.7rem, 3.2vw, 1.2rem);
                    letter-spacing: -0.025em;
                    line-height: 1.1;
                    display: block;
                    width: 100%;
                `;
            }

            // 更新翻譯
            const translationEl = document.getElementById('card-translation');
            if (translationEl) translationEl.textContent = card.chinese_translation;

            // 更新內容說明
            const descriptionEl = document.getElementById('card-description');
            if (descriptionEl) descriptionEl.textContent = card.description;

            // 更新比喻
            const analogyEl = document.getElementById('card-analogy');
            if (analogyEl) analogyEl.textContent = `💡 ${card.analogy || ''}`;

            // 更新連結
            const editLink = document.getElementById('edit-link');
            if (editLink) editLink.href = `edit.html?id=${card.id}`;

            const testLink = document.getElementById('test-link');
            if (testLink) {
                testLink.href = `test.html?id=${card.id}`;
                testLink.onclick = () => sessionStorage.setItem('quizReturnUrl', window.location.href);
            }

            const collapseBtn = document.getElementById('collapse-btn');
            if (collapseBtn) collapseBtn.onclick = () => window.location.href = `card.html?id=${card.id}`;
        }
    </script>

</body>
