<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>登入狀態檢查 - iPas AI應用規劃師考證班</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: "Space Grotesk", sans-serif;
        }

        .status-box {
            background: white;
            border: 3px solid black;
            box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 1);
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }

        .success {
            background: #d4edda;
        }

        .error {
            background: #f8d7da;
        }

        .info {
            background: #d1ecf1;
        }

        button {
            background: #f9f506;
            border: 3px solid black;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">🔐 登入狀態檢查</h1>

        <!-- localStorage 狀態 -->
        <div class="status-box">
            <h2 class="text-2xl font-bold mb-4">📦 LocalStorage 狀態</h2>
            <div id="localStorageStatus"></div>
        </div>

        <!-- Supabase 連接狀態 -->
        <div class="status-box">
            <h2 class="text-2xl font-bold mb-4">🗄️ Supabase 連接狀態</h2>
            <div id="supabaseStatus">⏳ 正在檢查...</div>
        </div>

        <!-- 使用者資訊 -->
        <div class="status-box">
            <h2 class="text-2xl font-bold mb-4">👤 使用者資訊</h2>
            <div id="userInfo">⏳ 正在載入...</div>
        </div>

        <!-- 操作按鈕 -->
        <div class="status-box">
            <h2 class="text-2xl font-bold mb-4">🛠️ 快速操作</h2>
            <button onclick="checkStatus()">🔄 重新檢查狀態</button>
            <button onclick="clearLogin()">🗑️ 清除登入資料</button>
            <button onclick="window.location.href='login.html'">🔑 前往登入頁</button>
            <button onclick="window.location.href='index.html'">🏠 前往首頁</button>
        </div>

        <!-- 詳細資訊 -->
        <div class="status-box">
            <h2 class="text-2xl font-bold mb-4">📊 詳細資訊</h2>
            <div id="detailInfo"></div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案腳本 -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/modal-system.js"></script>

    <script>
        // 檢查 localStorage
        function checkLocalStorage() {
            const nickname = localStorage.getItem('userNickname');
            const consent = localStorage.getItem('userConsent');
            const loginTime = localStorage.getItem('loginTime');

            const statusDiv = document.getElementById('localStorageStatus');

            if (nickname && consent === 'true') {
                statusDiv.innerHTML = `
                    <div class="status-box success">
                        <h3 class="font-bold text-green-800 mb-2">✅ 已通過 Login 頁面</h3>
                        <p><strong>暱稱:</strong> ${nickname}</p>
                        <p><strong>同意狀態:</strong> 已同意</p>
                        <p><strong>登入時間:</strong> ${loginTime ? new Date(loginTime).toLocaleString('zh-TW') : '未知'}</p>
                    </div>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="status-box error">
                        <h3 class="font-bold text-red-800 mb-2">❌ 未通過 Login 頁面</h3>
                        <p>請先到 login.html 填寫暱稱並同意資料收集</p>
                        <button onclick="window.location.href='login.html'" class="mt-2">前往登入</button>
                    </div>
                `;
            }
        }

        // 檢查 Supabase 連接
        async function checkSupabase() {
            const statusDiv = document.getElementById('supabaseStatus');

            try {
                statusDiv.innerHTML = '⏳ 正在連接 Supabase...';

                await apiService.initialize();

                statusDiv.innerHTML = `
                    <div class="status-box success">
                        <h3 class="font-bold text-green-800 mb-2">✅ Supabase 連接成功</h3>
                        <p><strong>專案 URL:</strong> ${SUPABASE_CONFIG.url}</p>
                        <p><strong>SDK 版本:</strong> ${supabase.VERSION || '2.x'}</p>
                    </div>
                `;

                return true;
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="status-box error">
                        <h3 class="font-bold text-red-800 mb-2">❌ Supabase 連接失敗</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                return false;
            }
        }

        // 檢查使用者資訊
        async function checkUser() {
            const userDiv = document.getElementById('userInfo');
            const detailDiv = document.getElementById('detailInfo');

            try {
                if (apiService.currentUser) {
                    userDiv.innerHTML = `
                        <div class="status-box success">
                            <h3 class="font-bold text-green-800 mb-2">✅ Supabase 使用者已登入</h3>
                            <p><strong>Email:</strong> ${apiService.currentUser.email}</p>
                            <p><strong>User ID:</strong> ${apiService.currentUser.id}</p>
                        </div>
                    `;

                    // 嘗試載入使用者 Profile
                    const result = await apiService.getUserProfile(apiService.currentUser.id);

                    if (result.success) {
                        detailDiv.innerHTML = `
                            <h3 class="font-bold mb-2">使用者 Profile 資料：</h3>
                            <pre>${JSON.stringify(result.data, null, 2)}</pre>
                        `;
                    } else {
                        detailDiv.innerHTML = `
                            <div class="status-box error">
                                <p>⚠️ 使用者尚未在資料庫中建立 Profile</p>
                                <p class="text-sm mt-2">這是正常的，第一次使用時需要建立使用者資料</p>
                            </div>
                        `;
                    }
                } else {
                    userDiv.innerHTML = `
                        <div class="status-box error">
                            <h3 class="font-bold text-red-800 mb-2">❌ Supabase 未登入</h3>
                            <p>目前沒有 Supabase 認證的使用者</p>
                            <p class="text-sm mt-2">💡 提示：目前應用使用 localStorage 進行簡易登入，Supabase 認證功能尚未啟用</p>
                        </div>
                    `;

                    detailDiv.innerHTML = `
                        <div class="status-box info">
                            <h3 class="font-bold mb-2">ℹ️ 說明</h3>
                            <p>目前的登入機制：</p>
                            <ol class="list-decimal list-inside mt-2 space-y-1">
                                <li>使用者在 login.html 填寫暱稱</li>
                                <li>資料儲存在 localStorage</li>
                                <li>index.html 檢查 localStorage 決定是否顯示頁面</li>
                                <li>Supabase 認證（Email/密碼）尚未啟用</li>
                            </ol>
                        </div>
                    `;
                }
            } catch (error) {
                userDiv.innerHTML = `
                    <div class="status-box error">
                        <h3 class="font-bold text-red-800 mb-2">❌ 檢查失敗</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // 完整狀態檢查
        async function checkStatus() {
            checkLocalStorage();
            const connected = await checkSupabase();
            if (connected) {
                await checkUser();
            }
        }

        // 清除登入資料
        function clearLogin() {
            ModalSystem.confirm(
                '清除登入資料',
                '確定要清除所有登入資料嗎？',
                () => {
                    localStorage.removeItem('userNickname');
                    localStorage.removeItem('userConsent');
                    localStorage.removeItem('loginTime');
                    ModalSystem.toast('✅ 登入資料已清除！', 'success');
                    checkStatus();
                },
                null,
                { confirmText: '清除', isDestructive: true }
            );
        }

        // 頁面載入時執行
        window.addEventListener('load', checkStatus);
    </script>
</body>

</html>
