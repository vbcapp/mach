<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">


    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="職訓考試" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>工商安全衛生協會-新竹職訓中心 - 建立考卷</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Tailwind Config -->
    <!-- Neo-Brutalism Styles -->
</head>

<body class="bg-background-light dark:bg-background-dark text-black dark:text-white min-h-screen">
    <div class="vibe-app-shell">

        <!-- Header -->
        <div id="app-header" data-variant="back" data-title="建立考卷" data-back-href="index.html"></div>

        <!-- Step Indicator -->
        <div class="bg-white border-b-4 border-black px-6 py-4">
            <div class="flex items-center justify-between">
                <div id="step-1-indicator" class="flex items-center gap-2">
                    <div
                        class="step-circle w-8 h-8 bg-primary border-2 border-black flex items-center justify-center font-black">
                        1</div>
                    <span class="text-sm font-bold hidden sm:inline">選擇來源</span>
                </div>
                <div class="flex-1 h-1 bg-black mx-2"></div>
                <div id="step-2-indicator" class="flex items-center gap-2">
                    <div
                        class="step-circle w-8 h-8 bg-gray-200 border-2 border-black flex items-center justify-center font-black">
                        2</div>
                    <span class="text-sm font-bold hidden sm:inline">設定考卷</span>
                </div>
                <div class="flex-1 h-1 bg-black mx-2"></div>
                <div id="step-3-indicator" class="flex items-center gap-2">
                    <div
                        class="step-circle w-8 h-8 bg-gray-200 border-2 border-black flex items-center justify-center font-black">
                        3</div>
                    <span class="text-sm font-bold hidden sm:inline">預覽確認</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="flex-grow p-4 space-y-4 pb-8 overflow-y-auto no-scrollbar">

            <!-- ==================== Step 1: 選擇來源 ==================== -->
            <section id="step-1" class="space-y-4">
                <div class="vibe-info-box">
                    <p class="text-xs font-bold">請勾選要抽取題目的類別與章節，可多選。</p>
                </div>

                <!-- 來源選擇區域 -->
                <div id="source-selection-list" class="space-y-3">
                    <div id="source-loading" class="text-center py-8">
                        <span class="material-symbols-outlined animate-spin text-3xl">progress_activity</span>
                        <p class="text-sm font-bold mt-2">載入題庫資料...</p>
                    </div>
                </div>

                <!-- 已選統計 -->
                <div class="vibe-card neo-shadow-sm flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined">check_circle</span>
                        <span class="font-bold">已選題目來源</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="selected-chapters-count" class="text-sm font-bold">0 個章節</span>
                        <span id="available-questions-count"
                            class="vibe-count-badge">0 題可選</span>
                    </div>
                </div>

                <!-- 下一步按鈕 -->
                <button id="step1-next-btn" onclick="goToStep2()" disabled class="vibe-btn vibe-btn-primary">
                    下一步：設定考卷
                </button>
            </section>

            <!-- ==================== Step 2: 設定考卷資訊 ==================== -->
            <section id="step-2" class="hidden space-y-4">
                <div class="vibe-card space-y-4">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-2xl">settings</span>
                        <h2 class="text-lg font-black italic uppercase">考卷設定</h2>
                    </div>

                    <!-- 選擇舊類別 / 新增大類別 -->
                    <div>
                        <label class="text-xs font-black uppercase tracking-widest mb-2 block">選擇舊類別 或 新增大類別 *</label>
                        <div class="relative">
                            <input id="new-subject-input" type="text" list="existing-subjects"
                                class="w-full border-4 border-black p-3 font-bold focus:outline-none focus:ring-2 focus:ring-primary"
                                placeholder="輸入或選擇類別（例如：114年模擬考）">
                            <datalist id="existing-subjects">
                                <!-- 動態生成現有類別選項 -->
                            </datalist>
                            <span
                                class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 pointer-events-none">
                                arrow_drop_down
                            </span>
                        </div>
                        <p class="text-[10px] text-gray-600 mt-1">💡 點擊可看到現有類別，或直接輸入新類別名稱</p>
                    </div>

                    <!-- 新章節名稱 -->
                    <div>
                        <label
                            class="text-xs font-black uppercase tracking-widest mb-2 flex items-center justify-between">
                            <span>新章節名稱 *</span>
                            <button type="button" id="toggle-chapters-btn" onclick="toggleExistingChapters()"
                                class="text-[10px] bg-gray-100 border-2 border-black px-2 py-1 font-bold flex items-center gap-1 hover:bg-gray-200">
                                <span class="material-symbols-outlined text-xs">visibility</span>
                                <span id="toggle-chapters-text">展開查看現有章節</span>
                            </button>
                        </label>
                        <input id="new-chapter-input" type="text"
                            class="w-full border-4 border-black p-3 font-bold focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="例如：第一回">

                        <!-- 現有章節列表（可展開/收合） -->
                        <div id="existing-chapters-list"
                            class="hidden mt-2 bg-gray-50 border-2 border-black p-3 max-h-40 overflow-y-auto no-scrollbar">
                            <p class="text-xs font-bold text-gray-500 mb-2">📋 現有的 類別：章節</p>
                            <div id="chapters-content" class="space-y-1">
                                <!-- 動態生成 -->
                            </div>
                        </div>
                    </div>

                    <!-- 抽取題數 -->
                    <div>
                        <label class="text-xs font-black uppercase tracking-widest mb-2 block">抽取題數 *</label>
                        <div class="flex items-center gap-4">
                            <input id="question-count-input" type="number" min="1" value="10"
                                class="flex-1 border-4 border-black p-3 font-bold focus:outline-none focus:ring-2 focus:ring-primary">
                            <span id="max-questions-hint" class="text-sm font-bold text-gray-500">最多 0 題</span>
                        </div>
                    </div>
                </div>

                <!-- 操作按鈕 -->
                <div class="flex gap-4">
                    <button onclick="goToStep1()" class="vibe-btn vibe-btn-secondary flex-1">
                        上一步
                    </button>
                    <button id="step2-next-btn" onclick="goToStep3()" class="vibe-btn vibe-btn-primary flex-1">
                        預覽考卷
                    </button>
                </div>
            </section>

            <!-- ==================== Step 3: 預覽確認 ==================== -->
            <section id="step-3" class="hidden space-y-4">
                <div class="vibe-card">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-2xl">preview</span>
                            <h2 class="text-lg font-black italic uppercase">考卷預覽</h2>
                        </div>
                        <button onclick="regeneratePreview()"
                            class="bg-gray-100 border-2 border-black px-3 py-1 font-bold text-sm flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">refresh</span> 重新抽題
                        </button>
                    </div>

                    <!-- 考卷資訊摘要 -->
                    <div class="vibe-info-box-muted mb-4 space-y-1">
                        <p class="text-sm"><span class="font-black">類別：</span><span id="preview-subject">--</span></p>
                        <p class="text-sm"><span class="font-black">章節：</span><span id="preview-chapter">--</span></p>
                        <p class="text-sm"><span class="font-black">題數：</span><span id="preview-count">--</span></p>
                    </div>

                    <!-- 題目預覽列表 -->
                    <div id="preview-questions-list" class="space-y-2 max-h-[40vh] overflow-y-auto no-scrollbar">
                        <!-- 動態生成 -->
                    </div>
                </div>

                <!-- 操作按鈕 -->
                <div class="flex gap-4">
                    <button onclick="goToStep2()" class="vibe-btn vibe-btn-secondary flex-1">
                        上一步
                    </button>
                    <button id="create-exam-btn" onclick="createExam()" class="vibe-btn vibe-btn-primary flex-1">
                        確認建立
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center">
        <div class="vibe-loader-box">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-black border-t-primary animate-spin"></div>
                <p id="loading-text" class="font-black italic">處理中...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/modal-system.js"></script>

    <script>
        // ==================== 全域狀態 ====================
        let subjectChapterStats = [];  // 所有類別/章節統計
        let selectedSources = [];      // 已選擇的來源 [{subject, chapter, count}, ...]
        let previewQuestions = [];     // 預覽的題目列表

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await apiService.initialize();
                const user = apiService.currentUser;

                // 檢查管理員權限
                if (!user || !RoleManager.isAdmin()) {
                    ModalSystem.alert('權限不足', '您沒有管理員權限', () => {
                        window.location.href = 'profile.html';
                    });
                    return;
                }

                // 載入類別/章節統計
                await loadSourceData();
            } catch (error) {
                console.error('初始化失敗:', error);
                ModalSystem.alert('錯誤', '頁面載入失敗，請重新整理');
            }
        });

        // ==================== 載入來源資料 ====================
        async function loadSourceData() {
            const loading = document.getElementById('source-loading');

            const result = await apiService.getSubjectChapterStats();

            loading.classList.add('hidden');

            if (!result.success) {
                ModalSystem.alert('載入失敗', result.error?.message || '無法載入題庫資料');
                return;
            }

            subjectChapterStats = result.data;
            renderSourceList();
        }

        // ==================== 渲染來源選擇列表 ====================
        function renderSourceList() {
            const list = document.getElementById('source-selection-list');

            if (subjectChapterStats.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-8">
                        <span class="material-symbols-outlined text-6xl text-zinc-300">folder_off</span>
                        <p class="mt-2 text-sm font-bold text-zinc-500">題庫中沒有題目</p>
                    </div>
                `;
                return;
            }

            // 按 subject 分組
            const grouped = {};
            subjectChapterStats.forEach(item => {
                if (!grouped[item.subject]) {
                    grouped[item.subject] = [];
                }
                grouped[item.subject].push(item);
            });

            list.innerHTML = Object.entries(grouped).map(([subject, chapters]) => {
                const totalCount = chapters.reduce((sum, c) => sum + c.question_count, 0);

                return `
                    <div class="subject-group vibe-card">
                        <div class="subject-header bg-black text-white p-3 flex items-center justify-between cursor-pointer"
                             onclick="toggleSubjectGroup(this)" data-subject="${escapeHtml(subject)}">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" class="subject-checkbox w-5 h-5 accent-primary"
                                       data-subject="${escapeHtml(subject)}"
                                       onclick="event.stopPropagation(); toggleSubjectAll('${escapeJs(subject)}', this.checked)">
                                <span class="material-symbols-outlined subject-chevron transition-transform">expand_more</span>
                                <span class="font-black">${escapeHtml(subject)}</span>
                            </div>
                            <span class="bg-primary text-black px-2 py-1 text-xs font-black">${totalCount} 題</span>
                        </div>
                        <div class="subject-chapters space-y-2 p-3 bg-gray-50">
                            ${chapters.map(ch => `
                                <label class="chapter-item flex items-center gap-3 p-2 border-2 border-black cursor-pointer bg-white hover:bg-gray-100"
                                       data-subject="${escapeHtml(ch.subject)}" data-chapter="${escapeHtml(ch.chapter)}">
                                    <input type="checkbox" class="chapter-checkbox w-5 h-5 accent-primary"
                                           data-subject="${escapeHtml(ch.subject)}"
                                           data-chapter="${escapeHtml(ch.chapter)}"
                                           data-count="${ch.question_count}"
                                           onchange="updateSourceSelection()">
                                    <span class="font-bold flex-grow">${escapeHtml(ch.chapter)}</span>
                                    <span class="bg-gray-200 px-2 py-1 text-xs font-bold">${ch.question_count} 題</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== 切換 Subject 群組展開/收合 ====================
        function toggleSubjectGroup(headerEl) {
            const chaptersEl = headerEl.nextElementSibling;
            const chevron = headerEl.querySelector('.subject-chevron');

            if (chaptersEl.classList.contains('hidden')) {
                chaptersEl.classList.remove('hidden');
                chevron.style.transform = 'rotate(0deg)';
            } else {
                chaptersEl.classList.add('hidden');
                chevron.style.transform = 'rotate(-90deg)';
            }
        }

        // ==================== 全選/取消全選某 Subject ====================
        function toggleSubjectAll(subject, checked) {
            const checkboxes = document.querySelectorAll(`.chapter-checkbox[data-subject="${subject}"]`);
            checkboxes.forEach(cb => cb.checked = checked);
            updateSourceSelection();
        }

        // ==================== 更新來源選擇狀態 ====================
        function updateSourceSelection() {
            const checkboxes = document.querySelectorAll('.chapter-checkbox:checked');
            selectedSources = [];
            let totalQuestions = 0;

            checkboxes.forEach(cb => {
                const subject = cb.dataset.subject;
                const chapter = cb.dataset.chapter;
                const count = parseInt(cb.dataset.count) || 0;

                selectedSources.push({ subject, chapter, count });
                totalQuestions += count;
            });

            // 更新統計顯示
            document.getElementById('selected-chapters-count').textContent = `${selectedSources.length} 個章節`;
            document.getElementById('available-questions-count').textContent = `${totalQuestions} 題可選`;

            // 更新 Subject checkbox 狀態
            const subjectCheckboxes = document.querySelectorAll('.subject-checkbox');
            subjectCheckboxes.forEach(subCb => {
                const subject = subCb.dataset.subject;
                const chapterCbs = document.querySelectorAll(`.chapter-checkbox[data-subject="${subject}"]`);
                const checkedCbs = document.querySelectorAll(`.chapter-checkbox[data-subject="${subject}"]:checked`);
                subCb.checked = chapterCbs.length > 0 && chapterCbs.length === checkedCbs.length;
                subCb.indeterminate = checkedCbs.length > 0 && checkedCbs.length < chapterCbs.length;
            });

            // 控制下一步按鈕
            const nextBtn = document.getElementById('step1-next-btn');
            nextBtn.disabled = selectedSources.length === 0;
        }

        // ==================== 步驟切換 ====================
        function goToStep1() {
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            updateStepIndicator(1);
        }

        function goToStep2() {
            if (selectedSources.length === 0) {
                ModalSystem.alert('請選擇來源', '請至少勾選一個章節');
                return;
            }

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('step-3').classList.add('hidden');
            updateStepIndicator(2);

            // 更新最大題數提示
            const totalAvailable = selectedSources.reduce((sum, s) => sum + s.count, 0);
            document.getElementById('max-questions-hint').textContent = `最多 ${totalAvailable} 題`;
            document.getElementById('question-count-input').max = totalAvailable;

            // 設定預設題數
            const countInput = document.getElementById('question-count-input');
            if (parseInt(countInput.value) > totalAvailable) {
                countInput.value = totalAvailable;
            }

            // 填充現有類別選項
            populateExistingSubjects();

            // 填充現有章節列表
            populateExistingChapters();
        }

        // ==================== 填充現有類別選項 ====================
        function populateExistingSubjects() {
            const datalist = document.getElementById('existing-subjects');

            // 取得所有不重複的類別
            const uniqueSubjects = [...new Set(subjectChapterStats.map(item => item.subject))];

            datalist.innerHTML = uniqueSubjects.map(subject =>
                `<option value="${escapeHtml(subject)}">`
            ).join('');
        }

        // ==================== 填充現有章節列表 ====================
        function populateExistingChapters() {
            const content = document.getElementById('chapters-content');

            // 按類別分組顯示章節
            const grouped = {};
            subjectChapterStats.forEach(item => {
                if (!grouped[item.subject]) {
                    grouped[item.subject] = [];
                }
                grouped[item.subject].push(item.chapter);
            });

            content.innerHTML = Object.entries(grouped).map(([subject, chapters]) => `
                <div class="text-xs">
                    <span class="font-black text-black">${escapeHtml(subject)}：</span>
                    <span class="text-gray-700">${chapters.map(ch => escapeHtml(ch)).join('、')}</span>
                </div>
            `).join('');
        }

        // ==================== 切換現有章節顯示 ====================
        function toggleExistingChapters() {
            const list = document.getElementById('existing-chapters-list');
            const btnText = document.getElementById('toggle-chapters-text');
            const btn = document.getElementById('toggle-chapters-btn');

            if (list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                btnText.textContent = '收合章節列表';
                btn.querySelector('.material-symbols-outlined').textContent = 'visibility_off';
            } else {
                list.classList.add('hidden');
                btnText.textContent = '展開查看現有章節';
                btn.querySelector('.material-symbols-outlined').textContent = 'visibility';
            }
        }

        async function goToStep3() {
            const newSubject = document.getElementById('new-subject-input').value.trim();
            const newChapter = document.getElementById('new-chapter-input').value.trim();
            const questionCount = parseInt(document.getElementById('question-count-input').value) || 10;

            // 驗證
            if (!newSubject) {
                ModalSystem.alert('請填寫類別名稱', '新類別名稱為必填');
                return;
            }
            if (!newChapter) {
                ModalSystem.alert('請填寫章節名稱', '新章節名稱為必填');
                return;
            }
            if (questionCount < 1) {
                ModalSystem.alert('請填寫題數', '抽取題數至少為 1');
                return;
            }

            // 抽取題目
            await generatePreview();

            if (previewQuestions.length === 0) {
                return; // generatePreview 內部會顯示錯誤訊息
            }

            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            updateStepIndicator(3);
        }

        function updateStepIndicator(currentStep) {
            [1, 2, 3].forEach(step => {
                const indicator = document.getElementById(`step-${step}-indicator`);
                const circle = indicator.querySelector('.step-circle');

                if (step <= currentStep) {
                    circle.classList.remove('bg-gray-200');
                    circle.classList.add('bg-primary');
                } else {
                    circle.classList.remove('bg-primary');
                    circle.classList.add('bg-gray-200');
                }
            });
        }

        // ==================== 生成預覽 ====================
        async function generatePreview() {
            const questionCount = parseInt(document.getElementById('question-count-input').value) || 10;

            showLoading('抽取題目中...');

            const result = await apiService.getRandomQuestions(selectedSources, questionCount);

            hideLoading();

            if (!result.success) {
                ModalSystem.alert('抽取失敗', result.error?.message || '無法抽取題目');
                return;
            }

            previewQuestions = result.data;
            renderPreview();
        }

        async function regeneratePreview() {
            await generatePreview();
            ModalSystem.toast('已重新抽題', 'success');
        }

        function renderPreview() {
            const newSubject = document.getElementById('new-subject-input').value.trim();
            const newChapter = document.getElementById('new-chapter-input').value.trim();

            document.getElementById('preview-subject').textContent = newSubject;
            document.getElementById('preview-chapter').textContent = newChapter;
            document.getElementById('preview-count').textContent = `${previewQuestions.length} 題`;

            const list = document.getElementById('preview-questions-list');
            list.innerHTML = previewQuestions.map((q, index) => `
                <div class="bg-gray-50 border-2 border-black p-3">
                    <div class="flex items-start gap-2">
                        <span class="bg-black text-white px-2 py-1 text-xs font-black shrink-0">${index + 1}</span>
                        <div class="flex-grow overflow-hidden">
                            <p class="font-bold text-sm mb-1 line-clamp-2">${escapeHtml(q.question || '無題目')}</p>
                            <div class="flex flex-wrap gap-2 text-xs">
                                <span class="bg-gray-200 px-2 py-0.5 border border-black">原：${escapeHtml(q.subject || '未分類')}</span>
                                <span class="bg-gray-200 px-2 py-0.5 border border-black">${escapeHtml(q.chapter || '通用')}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ==================== 建立考卷 ====================
        async function createExam() {
            const newSubject = document.getElementById('new-subject-input').value.trim();
            const newChapter = document.getElementById('new-chapter-input').value.trim();

            if (previewQuestions.length === 0) {
                ModalSystem.alert('沒有題目', '請先抽取題目');
                return;
            }

            ModalSystem.confirm(
                '確認建立考卷？',
                `將複製 ${previewQuestions.length} 題到「${newSubject} - ${newChapter}」`,
                async () => {
                    showLoading('建立考卷中...');

                    const result = await apiService.copyQuestionsToNewExam(
                        previewQuestions,
                        newSubject,
                        newChapter
                    );

                    hideLoading();

                    if (result.success) {
                        ModalSystem.alert('建立成功', `已成功建立 ${result.count} 題考卷`, () => {
                            window.location.href = 'index.html';
                        });
                    } else {
                        ModalSystem.alert('建立失敗', result.error?.message || '發生錯誤');
                    }
                }
            );
        }

        // ==================== 工具函式 ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeJs(text) {
            if (!text) return '';
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function showLoading(text = '處理中...') {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('loading-overlay').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
        }
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>

</html>
