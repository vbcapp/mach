<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">


    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="職訓考試" />
    <meta name="theme-color" content="#000000" />
    <!-- manifest 由 config.js 動態產生 -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>工商安全衛生協會-新竹職訓中心 - 排行榜入口 (圖示修復版)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>


    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />


</head>

<body class="bg-zinc-100 dark:bg-background-dark text-black dark:text-white overflow-hidden leading-relaxed">
    <div class="vibe-app-shell">
        <header
            class="flex-none bg-zinc-100 dark:bg-background-dark border-b-2 border-black px-4 py-4 flex items-center justify-between z-10">
            <div class="flex items-center gap-2">
                <div class="bg-primary neo-border p-1 flex items-center justify-center">
                    <span class="material-symbols-outlined text-black font-bold">terminal</span>
                </div>
                <h1 class="text-xl font-black tracking-tighter" data-brand="org-name">工商安全衛生協會-新竹職訓中心</h1>
            </div>
        </header>
        <main class="flex-1 overflow-y-auto px-4 space-y-4 pb-28 no-scrollbar">
            <div class="mt-2 space-y-1">
                <p class="text-gray-600 dark:text-gray-400 font-bold text-sm">查看所有學習者的等級排名</p>
            </div>
            <div class="grid grid-cols-1 gap-6 max-w-xs mx-auto">
                <a href="rank_l.html"
                    class="neo-card bg-white dark:bg-zinc-900 p-6 flex flex-col items-center text-center transition-transform active:translate-x-[2px] active:translate-y-[2px] active:shadow-[4px_4px_0px_0px_black] group">
                    <div class="w-14 h-14 border-2 border-black bg-primary flex items-center justify-center mb-3">
                        <span class="material-symbols-outlined text-4xl fill-1">bolt</span>
                    </div>
                    <h2 class="text-xl font-black mb-1">按等級排名</h2>
                    <p class="text-xs font-bold text-gray-500">看看誰是目前的程式大師</p>
                </a>
                <a href="rank_n.html"
                    class="neo-card bg-white dark:bg-zinc-900 p-6 flex flex-col items-center text-center transition-transform active:translate-x-[2px] active:translate-y-[2px] active:shadow-[4px_4px_0px_0px_black] group">
                    <div
                        class="w-14 h-14 border-2 border-black bg-white dark:bg-zinc-800 flex items-center justify-center mb-3">
                        <span class="material-symbols-outlined text-4xl">quiz</span>
                    </div>
                    <h2 class="text-xl font-black mb-1">答題次數排行榜</h2>
                    <p class="text-xs font-bold text-gray-500">每日/每週最勤奮的學習者</p>
                </a>
            </div>
        </main>
        <!-- Bottom Navigation Component -->
        <div id="bottom-nav" data-active-page="rank"></div>
        <script src="js/components/bottom-nav.js"></script>
    </div>
    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>

</html>
