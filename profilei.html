<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>iPas AI應用規劃師考證班 - 帳號設定</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9d006",
                        "background-light": "#fcfbf8",
                        "background-dark": "#1a1a1a",
                        "brutal-black": "#000000",
                        "danger": "#ff4d4d",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "2px",
                        "xl": "4px",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "brutal": "4px 4px 0px 0px rgba(0,0,0,1)",
                        "brutal-sm": "2px 2px 0px 0px rgba(0,0,0,1)",
                        "brutal-lg": "6px 6px 0px 0px rgba(0,0,0,1)",
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .neo-shadow { box-shadow: 4px 4px 0px 0px #000000; }
            .neo-shadow-sm { box-shadow: 2px 2px 0px 0px #000000; }
            .neo-shadow-danger { box-shadow: 4px 4px 0px 0px #ff4d4d; }
            .neo-border { border: 2px solid #000000; }
            .neo-border-danger { border: 2px solid #ff4d4d; }
        }
        body { font-family: 'Space Grotesk', sans-serif; }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-brutal-black dark:text-white transition-colors duration-200">
    <div class="relative min-h-screen w-full flex-col max-w-[480px] mx-auto overflow-x-hidden pb-12">
        <!-- 標題列 -->
        <header
            class="sticky top-0 z-50 flex items-center bg-background-light dark:bg-background-dark p-6 pb-4 border-b-2 border-black">
            <button class="material-symbols-outlined font-black text-brutal-black dark:text-white"
                onclick="history.back()">
                arrow_back_ios
            </button>
            <h1 class="flex-1 text-center text-xl font-black uppercase tracking-tighter">帳號設定</h1>
            <div class="w-6"></div>
        </header>

        <div class="p-4 space-y-8">
            <!-- 個人資訊 -->
            <section>
                <div class="bg-primary inline-block neo-border px-4 py-1 neo-shadow-sm mb-4">
                    <h3 class="text-sm font-black uppercase tracking-tighter">個人資訊</h3>
                </div>
                <div class="bg-white dark:bg-zinc-800 neo-border neo-shadow p-5 flex flex-col gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-black uppercase tracking-widest">使用者名稱</label>
                        <input id="username"
                            class="w-full bg-zinc-100 dark:bg-zinc-700 neo-border px-4 py-3 font-bold focus:ring-0 focus:border-black outline-none"
                            type="text" value="" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-black uppercase tracking-widest">電子郵件</label>
                        <input id="email"
                            class="w-full bg-zinc-100 dark:bg-zinc-700 neo-border px-4 py-3 font-bold focus:ring-0 focus:border-black outline-none"
                            placeholder="vibe@example.com" type="email" />
                    </div>
                    <button onclick="updateProfile()"
                        class="w-full bg-primary neo-border py-3 text-sm font-black uppercase neo-shadow-sm hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none transition-all">
                        更新個人資料
                    </button>
                </div>
            </section>

            <!-- 安全設定 -->
            <section>
                <div class="bg-primary inline-block neo-border px-4 py-1 neo-shadow-sm mb-4">
                    <h3 class="text-sm font-black uppercase tracking-tighter">安全設定</h3>
                </div>
                <div class="bg-white dark:bg-zinc-800 neo-border neo-shadow p-5 flex flex-col gap-4">
                    <button onclick="changePassword()"
                        class="w-full flex justify-between items-center bg-zinc-100 dark:bg-zinc-700 neo-border p-4 font-bold uppercase neo-shadow-sm active:shadow-none active:translate-x-1 active:translate-y-1 transition-all">
                        <span>修改密碼</span>
                        <span class="material-symbols-outlined">lock_reset</span>
                    </button>
                    <button onclick="toggle2FA()"
                        class="w-full flex justify-between items-center bg-zinc-100 dark:bg-zinc-700 neo-border p-4 font-bold uppercase neo-shadow-sm active:shadow-none active:translate-x-1 active:translate-y-1 transition-all">
                        <span>啟用雙重驗證</span>
                        <div class="w-10 h-5 neo-border bg-white dark:bg-zinc-600 relative flex items-center p-0.5">
                            <div id="2fa-toggle"
                                class="size-3 bg-black dark:bg-white neo-border absolute left-0.5 transition-all"></div>
                        </div>
                    </button>
                </div>
            </section>

            <!-- 訂閱管理 -->
            <section>
                <div class="bg-primary inline-block neo-border px-4 py-1 neo-shadow-sm mb-4">
                    <h3 class="text-sm font-black uppercase tracking-tighter">訂閱管理</h3>
                </div>
                <div class="bg-white dark:bg-zinc-800 neo-border neo-shadow p-5 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-black uppercase tracking-widest text-zinc-500">當前方案</p>
                            <p id="subscription-plan"
                                class="text-xl font-black text-primary drop-shadow-[1px_1px_0_rgba(0,0,0,1)] uppercase">
                                Premium Member</p>
                        </div>
                        <div class="bg-primary neo-border p-2 neo-shadow-sm">
                            <span class="material-symbols-outlined text-brutal-black">workspace_premium</span>
                        </div>
                    </div>
                    <p id="subscription-expiry" class="text-sm font-medium">您的訂閱將於 2024/12/31 到期</p>
                    <button onclick="manageSubscription()"
                        class="w-full bg-white dark:bg-zinc-700 neo-border py-3 text-sm font-black uppercase neo-shadow-sm hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none transition-all">
                        管理訂閱
                    </button>
                </div>
            </section>

            <!-- 危險區域 -->
            <section>
                <div class="bg-danger inline-block neo-border px-4 py-1 neo-shadow-sm mb-4">
                    <h3 class="text-sm font-black uppercase tracking-tighter text-white">危險區域</h3>
                </div>
                <div class="bg-white dark:bg-zinc-800 neo-border-danger neo-shadow-danger p-5 flex flex-col gap-4">
                    <button onclick="logout()"
                        class="w-full flex justify-between items-center bg-white dark:bg-zinc-700 neo-border p-4 font-bold uppercase neo-shadow-sm active:shadow-none active:translate-x-1 active:translate-y-1 transition-all text-danger">
                        <span>登出</span>
                        <span class="material-symbols-outlined">logout</span>
                    </button>
                    <button onclick="deleteAccount()"
                        class="w-full flex justify-between items-center bg-danger neo-border p-4 font-bold uppercase neo-shadow-sm active:shadow-none active:translate-x-1 active:translate-y-1 transition-all text-white">
                        <span>刪除帳號</span>
                        <span class="material-symbols-outlined">delete_forever</span>
                    </button>
                    <p class="text-[10px] text-zinc-500 font-bold text-center uppercase">刪除後所有資料將無法恢復</p>
                </div>
            </section>
        </div>

        <!-- 版本資訊 -->
        <div class="mt-8 mb-4 flex flex-col items-center gap-2 opacity-30">
            <div class="bg-zinc-400 p-1">
                <span class="material-symbols-outlined text-white text-xs">terminal</span>
            </div>
            <p class="text-[10px] font-black uppercase tracking-[0.2em]">iPas AI應用規劃師考證班 v2.4.0</p>
        </div>
    </div>

    <!-- ==================== Supabase 整合 ==================== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/init.js"></script>

    <script>
        let is2FAEnabled = false;

        // 頁面載入時載入使用者資料
        window.addEventListener('DOMContentLoaded', async function () {
            await loadUserData();
        });

        // 載入使用者資料
        async function loadUserData() {
            const nickname = localStorage.getItem('userNickname');
            if (nickname) {
                document.getElementById('username').value = nickname;
            }

            // 如果有 Supabase 使用者，載入 email
            if (apiService?.currentUser) {
                document.getElementById('email').value = apiService.currentUser.email || '';
            }
        }

        // 更新個人資料
        async function updateProfile() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!username) {
                alert('請輸入使用者名稱');
                return;
            }

            // 更新 localStorage
            localStorage.setItem('userNickname', username);

            // TODO: 如果有 Supabase 認證，也更新資料庫
            if (apiService?.currentUser) {
                try {
                    const result = await apiService.updateUser(apiService.currentUser.id, {
                        username: username
                    });

                    if (result.success) {
                        alert('✅ 個人資料已更新！');
                    } else {
                        console.warn('更新資料庫失敗:', result.error);
                        alert('✅ 本地資料已更新！');
                    }
                } catch (error) {
                    console.error('更新失敗:', error);
                    alert('✅ 本地資料已更新！');
                }
            } else {
                alert('✅ 個人資料已更新！');
            }
        }

        // 修改密碼
        function changePassword() {
            alert('🔐 修改密碼功能開發中...\n\n目前使用 localStorage 簡易登入，尚未啟用密碼功能');
        }

        // 切換雙重驗證
        function toggle2FA() {
            is2FAEnabled = !is2FAEnabled;
            const toggle = document.getElementById('2fa-toggle');

            if (is2FAEnabled) {
                toggle.style.left = 'calc(100% - 0.75rem - 2px)';
                alert('✅ 雙重驗證已啟用（模擬）');
            } else {
                toggle.style.left = '2px';
                alert('❌ 雙重驗證已停用');
            }
        }

        // 管理訂閱
        function manageSubscription() {
            alert('💳 訂閱管理功能開發中...\n\n將來可以在此升級/降級您的訂閱方案');
        }

        // 登出
        async function logout() {
            if (confirm('確定要登出嗎？')) {
                const btn = document.querySelector('button[onclick="logout()"]');
                const originalText = btn ? btn.innerHTML : '登出';
                if (btn) btn.innerHTML = '登出中...';

                try {
                    // 使用 apiService 的登出方法，它會正確清除 user_device_id 和 Supabase Session
                    if (apiService) {
                        await apiService.logout();
                    } else {
                        // Fallback if apiService not ready
                        localStorage.clear();
                        sessionStorage.clear();
                    }

                    alert('✅ 已登出');
                    window.location.href = 'login.html';
                } catch (e) {
                    console.error('Logout failed:', e);
                    alert('登出發生錯誤，但我們會嘗試轉跳');
                    window.location.href = 'login.html';
                }
            }
        }

        // 刪除帳號
        function deleteAccount() {
            const confirm1 = confirm('⚠️ 警告：刪除帳號後所有資料將無法恢復！\n\n確定要刪除帳號嗎？');

            if (confirm1) {
                const confirm2 = confirm('🚨 最後確認：真的要刪除帳號嗎？\n\n此操作無法復原！');

                if (confirm2) {
                    // 清除所有本地資料
                    localStorage.clear();

                    // TODO: 從資料庫刪除使用者資料
                    if (apiService?.currentUser) {
                        console.log('應該從資料庫刪除使用者:', apiService.currentUser.id);
                    }

                    alert('🗑️ 帳號已刪除\n\n感謝您使用 iPas AI應用規劃師考證班');
                    window.location.href = 'login.html';
                }
            }
        }
    </script>
</body>

</html>
