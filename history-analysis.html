<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">


    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="職訓考試" />
    <meta name="theme-color" content="#000000" />
    <!-- manifest 由 config.js 動態產生 -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>工商安全衛生協會-新竹職訓中心 - 歷史 AI 分析</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <style>
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(243, 244, 246, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.hidden {
            display: none;
        }

        /* Markdown 渲染樣式 */
        .markdown-body h2 {
            font-size: 1.125rem;
            font-weight: 900;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            border-bottom: var(--border-base);
            padding-bottom: 0.25rem;
        }

        .markdown-body h3 {
            font-size: 0.875rem;
            font-weight: 700;
            margin-top: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .markdown-body p {
            margin-bottom: 0.5rem;
            line-height: 1.6;
            font-size: 0.875rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-left: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .markdown-body li {
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }

        .markdown-body strong {
            font-weight: 900;
        }

        /* Modal 樣式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            border: var(--border-heavy);
            box-shadow: var(--card-shadow-lg);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 1rem;
            border-bottom: var(--border-thick);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--color-primary);
        }

        .modal-body {
            padding: 1rem;
            overflow-y: auto;
            flex: 1;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: var(--border-base);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.25rem;
        }

        .modal-close:hover {
            background: var(--color-danger);
            color: white;
        }
    </style>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>

</head>

<body class="bg-background-light dark:bg-background-dark text-black dark:text-white min-h-screen pb-6">

    <div id="loading-overlay" class="loading-overlay">
        <div class="text-center">
            <span class="material-symbols-outlined text-5xl animate-spin text-black">progress_activity</span>
            <p class="mt-4 font-black">載入歷史紀錄中...</p>
        </div>
    </div>

    <!-- AI 分析 Modal -->
    <div id="ai-analysis-modal" class="modal-overlay" onclick="closeAIAnalysisModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-xl">history</span>
                    <span id="modal-date-title" class="font-black text-sm uppercase">AI 分析紀錄</span>
                </div>
                <button class="modal-close" onclick="closeAIAnalysisModal()">&times;</button>
            </div>
            <div class="bg-gray-50 border-b-2 border-black p-3 text-xs flex justify-between">
                <div>
                    <span class="font-bold text-gray-500">正確率:</span>
                    <span id="modal-accuracy" class="font-black ml-1">--%</span>
                </div>
                <div>
                    <span class="font-bold text-gray-500">錯題數:</span>
                    <span id="modal-wrong" class="font-black text-[var(--color-danger)] ml-1">--</span>
                </div>
            </div>
            <div id="ai-analysis-modal-body" class="modal-body markdown-body bg-white">
                <!-- Modal 內容 -->
            </div>
        </div>
    </div>

    <div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto border-x-2 border-black/5 bg-gray-50">
        <header
            class="bg-white pt-12 pb-4 px-4 border-b-4 border-black sticky top-0 z-40 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='weakness.html'"
                    class="w-10 h-10 neo-border bg-primary flex items-center justify-center neo-button-active hover:bg-yellow-400">
                    <span class="material-symbols-outlined text-xl font-black text-black">arrow_back</span>
                </button>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase uppercase">AI 分析歷史</h1>
            </div>
            <span class="material-symbols-outlined text-3xl text-purple-500">auto_awesome</span>
        </header>

        <main class="flex-grow p-4">
            <div class="mb-4">
                <p class="text-xs font-bold text-gray-500">在此回顧 AI 為您產生的歷史建議與分析進展。</p>
            </div>

            <div id="history-list" class="space-y-4">
                <!-- Data will be injected here -->
            </div>

            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 px-4 text-center">
                <span class="material-symbols-outlined text-6xl mb-4 text-gray-400">history_toggle_off</span>
                <h3 class="text-xl font-black italic mb-2">尚無歷史紀錄</h3>
                <p class="text-sm font-bold text-gray-500">您還沒有產生過任何 AI 分析。<br>請回到弱點分析頁面產生您的第一份報告！</p>
                <button onclick="window.location.href='weakness.html'"
                    class="mt-6 px-6 py-3 font-black text-sm uppercase bg-primary neo-border neo-shadow-sm hover:translate-y-0.5 hover:shadow-none transition-all">
                    前往弱點分析
                </button>
            </div>
        </main>
    </div>

    <script>
        let historyData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('history-list');
            const emptyState = document.getElementById('empty-state');
            const loadingOverlay = document.getElementById('loading-overlay');

            try {
                await apiService.initialize();

                if (!apiService.currentUser) {
                    window.location.href = 'login.html';
                    return;
                }

                const result = await apiService.getUserAnalysisHistory(apiService.currentUser.id, 20);

                if (!result.success) {
                    throw new Error(result.error?.message || '取得歷史紀錄失敗');
                }

                historyData = result.data;

                if (historyData.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    renderHistoryList(historyData, listContainer);
                }

            } catch (error) {
                console.error("載入歷史紀錄錯誤:", error);
                listContainer.innerHTML = `<div class="bg-red-100 border-2 border-red-500 p-4 text-red-700 font-bold mb-4 neo-brutalism-card">載入失敗: ${error.message}</div>`;
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });

        function renderHistoryList(data, container) {
            container.innerHTML = '';

            data.forEach((item, index) => {
                // Parse date
                const dateObj = new Date(item.generated_at);
                const dateStr = dateObj.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
                const timeStr = dateObj.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });

                // Parse snapshot stats
                const stats = item.stats_snapshot || {};
                const accuracy = stats.overallAccuracy !== undefined ? stats.overallAccuracy : '--';
                const wrongCount = stats.wrongQuestionCount !== undefined ? stats.wrongQuestionCount : '--';

                const isLatest = index === 0;
                let badgeHtml = '';
                if (isLatest) {
                    badgeHtml = '<span class="absolute -top-3 -right-2 bg-purple-500 text-white text-[10px] font-black px-2 py-1 border-2 border-black rotate-[10deg]">最新</span>';
                }

                const listItem = document.createElement('div');
                listItem.className = `neo-brutalism-card bg-white p-4 relative cursor-pointer active:translate-y-1 active:translate-x-1 active:shadow-none transition-all hover:bg-purple-50`;
                listItem.onclick = () => openPastAnalysis(index);

                listItem.innerHTML = `
                    ${badgeHtml}
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-purple-600 text-2xl">event_note</span>
                            <div>
                                <h3 class="text-sm font-black">${dateStr}</h3>
                                <p class="text-[10px] text-gray-500 font-bold">${timeStr}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 text-purple-500 hover:underline">
                            <span class="text-xs font-black">檢視</span>
                            <span class="material-symbols-outlined text-[14px]">open_in_new</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mt-3 pt-3 border-t-2 border-dashed border-gray-200">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold text-gray-400 uppercase">當下正確率</span>
                            <span class="text-base font-black text-blue-600">${accuracy}%</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold text-gray-400 uppercase">當下錯題數</span>
                            <span class="text-base font-black text-[var(--color-danger)]">${wrongCount} 題</span>
                        </div>
                    </div>
                `;

                container.appendChild(listItem);
            });
        }

        function openPastAnalysis(index) {
            const item = historyData[index];
            if (!item) return;

            const dateObj = new Date(item.generated_at);
            const dateStr = dateObj.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });

            document.getElementById('modal-date-title').textContent = `${dateStr} 分析紀錄`;

            const stats = item.stats_snapshot || {};
            document.getElementById('modal-accuracy').textContent = (stats.overallAccuracy !== undefined ? stats.overallAccuracy : '--') + '%';
            document.getElementById('modal-wrong').textContent = (stats.wrongQuestionCount !== undefined ? stats.wrongQuestionCount : '--');

            const modalBody = document.getElementById('ai-analysis-modal-body');
            modalBody.innerHTML = marked.parse(item.analysis_content || '無內容');

            const modal = document.getElementById('ai-analysis-modal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeAIAnalysisModal(event) {
            if (!event || event.target.id === 'ai-analysis-modal') {
                const modal = document.getElementById('ai-analysis-modal');
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAIAnalysisModal();
            }
        });
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>

</html>
