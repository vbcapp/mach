<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd400",
                        "secondary": "#ff6b8b",
                        "accent-blue": "#4a90e2",
                        "background-light": "#f5f5f5",
                        "background-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderWidth: {
                        '3': '3px',
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'neo-lg': '10px 10px 0px 0px rgba(0,0,0,1)',
                        'neo-sm': '3px 3px 0px 0px rgba(0,0,0,1)',
                        'neo-dark': '4px 4px 0px 0px rgba(255,255,255,0.2)',
                        'neo-lg-dark': '10px 10px 0px 0px rgba(255,255,255,0.15)',
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 0, 'opsz' 24;
        }
        .centered-container {
            width: 100%;
            max-width: 375px;
            margin-left: auto;
            margin-right: auto;
        }
        body {
            min-height: 100dvh;
        }.no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .capped-gold-shimmer {
            position: relative;
            overflow: hidden;
            background-color: #ffd400 !important; /* Force gold connection */
        }
        .capped-gold-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            100% {
                left: 200%;
            }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    </style>
    <!-- Add LevelSystem Script -->
    <script src="js/level-system.js"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#1d1a0c] dark:text-white min-h-screen flex flex-col items-center overflow-x-hidden">
    <header
        class="w-full bg-background-light dark:bg-background-dark border-b-3 border-black dark:border-white/20 p-2 sm:p-4 shrink-0 z-50 flex flex-col items-center">
        <div class="w-full max-w-md">
            <div class="flex items-center justify-between relative h-10 sm:h-12">
                <button onclick="window.location.href='index.html'"
                    class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center active:opacity-50 transition-opacity z-10 text-black dark:text-white">
                    <span class="material-symbols-outlined text-xl sm:text-2xl font-bold">arrow_back_ios_new</span>
                </button>
                <h1
                    class="text-lg sm:text-xl font-bold tracking-tight absolute left-1/2 -translate-x-1/2 whitespace-nowrap">
                    VibeCoding</h1>
                <button
                    class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center active:opacity-50 transition-opacity z-10">
                    <span class="material-symbols-outlined text-xl sm:text-2xl">more_horiz</span>
                </button>
            </div>
            <div class="mt-4 w-full overflow-x-auto no-scrollbar pb-1">
                <div id="date-navigation" class="flex justify-between items-center gap-3 min-w-max px-1">
                    <!-- 动态生成日期格子 -->
                </div>
            </div>
        </div>
    </header>
    <main class="flex-1 flex flex-col items-center py-8 p-6 w-full">
        <div class="centered-container">
            <div
                class="w-full bg-white dark:bg-[#2a2a2a] border-3 border-black dark:border-white shadow-neo-lg dark:shadow-neo-lg-dark rounded-2xl flex flex-col relative overflow-hidden">
                <div class="absolute top-4 left-4">
                    <div class="bg-primary border-3 border-black px-2 py-0.5 rounded shadow-neo-sm">
                        <span id="card-category" class="text-[10px] font-bold tracking-widest uppercase">BACKEND</span>
                    </div>
                </div>
                <div class="absolute top-4 right-4">
                    <button id="add-btn" onclick="addToCollection()"
                        class="bg-white dark:bg-black border-3 border-black dark:border-white w-8 h-8 rounded shadow-neo-sm flex items-center justify-center active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-colors">
                        <span class="material-symbols-outlined text-xl font-black">add</span>
                    </button>
                </div>
                <div class="p-6 pb-2 pt-14">
                    <div class="flex flex-col items-center gap-1">
                        <h2 id="card-title" class="text-7xl font-bold tracking-tighter text-center">API</h2>
                        <span id="card-abbreviation" class="text-lg font-bold text-gray-500 mb-1">(API)</span>
                        <span id="card-translation" class="text-xl font-bold italic mb-4">應用程式介面</span>
                        <span id="add-count" class="text-xs text-gray-400 mb-2">0 人已收藏</span>
                        <div
                            class="bg-primary border-3 border-black px-6 py-2 rounded-lg shadow-neo-sm flex items-center justify-center gap-2">
                            <span id="card-level" class="text-sm font-bold tracking-widest">Lv.2</span>
                        </div>
                    </div>
                </div>
                <div class="px-6 py-6 flex flex-col gap-6">
                    <div>
                        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
                            <span class="w-2 h-4 bg-primary border border-black inline-block"></span>
                            內容說明
                        </h3>
                        <div id="card-description"
                            class="max-h-[4.5em] overflow-y-auto leading-relaxed text-sm text-gray-800 dark:text-gray-200">
                            API 是軟體與軟體之間溝通的橋樑，讓不同程式可以互相交換資料或使用彼此的功能，而不需要知道對方的內部程式碼怎麼寫。
                        </div>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold mb-2 flex items-center gap-2">
                            <span class="w-2 h-4 bg-secondary border border-black inline-block"></span>
                            生活化比喻
                        </h3>
                        <div
                            class="bg-gray-50 dark:bg-black/20 border-3 border-black p-4 rounded-xl relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-primary"></div>
                            <div id="card-analogy"
                                class="max-h-[9em] overflow-y-auto leading-relaxed text-sm text-gray-700 dark:text-gray-300 italic">
                                💡 API
                                就像是餐廳的服務生。你（客戶端）看菜單點餐，服務生將你的需求傳達給廚房（伺服器），最後再把做好的菜送到你桌上。你不需要知道廚房怎麼開火，只需要透過服務生就能得到食物。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div
        class="fixed top-20 left-1/2 -translate-x-[180px] w-32 h-32 bg-primary/10 rounded-full blur-3xl pointer-events-none -z-10">
    </div>
    <div
        class="fixed bottom-40 left-1/2 translate-x-[80px] w-48 h-48 bg-secondary/10 rounded-full blur-3xl pointer-events-none -z-10">
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        // 每日一卡資料
        let currentDailyCard = null;
        let currentDate = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', async function () {
            await apiService.initialize();

            // 从 URL 获取日期参数，如果没有则使用今天
            const urlParams = new URLSearchParams(window.location.search);
            const dateParam = urlParams.get('date');
            currentDate = dateParam || new Date().toISOString().split('T')[0];

            // 生成日期导航栏
            generateDateNavigation(currentDate);

            // 加载指定日期的卡片
            await loadDailyCard(currentDate);
            loadUserFromCache();
        });

        // 從快取載入使用者資料
        function loadUserFromCache() {
            const cached = sessionStorage.getItem('userData');
            if (cached) {
                const userData = JSON.parse(cached);
                updateHeaderUI(userData);
            }
        }

        // 生成日期导航栏（显示当前日期前后各2天，共5天）
        function generateDateNavigation(centerDate) {
            const container = document.getElementById('date-navigation');
            if (!container) return;

            container.innerHTML = '';
            const center = new Date(centerDate);

            // 生成前后各2天，共5天
            for (let i = -2; i <= 2; i++) {
                const date = new Date(center);
                date.setDate(center.getDate() + i);

                const dateStr = date.toISOString().split('T')[0];
                const month = date.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
                const day = date.getDate();

                const isActive = dateStr === currentDate;

                const dateBox = document.createElement('div');
                dateBox.className = `flex flex-col items-center justify-center min-w-[60px] h-14 border-3 border-black rounded-xl shadow-neo-sm shrink-0 active:scale-95 transition-transform cursor-pointer ${
                    isActive ? 'bg-primary' : 'bg-white'
                }`;
                dateBox.onclick = () => navigateToDate(dateStr);

                dateBox.innerHTML = `
                    <span class="text-[10px] font-bold uppercase ${isActive ? '' : 'opacity-60'}">${month}</span>
                    <span class="${isActive ? 'text-xl' : 'text-lg'} font-bold">${day}</span>
                `;

                container.appendChild(dateBox);
            }
        }

        // 跳转到指定日期
        function navigateToDate(date) {
            window.location.href = `calendar_c.html?date=${date}`;
        }


        // 載入每日一卡（根据日期）
        async function loadDailyCard(date) {
            // 如果有指定日期，使用指定日期；否则使用今天
            const result = date
                ? await apiService.getDailyCardByDate(date)
                : await apiService.getTodayDailyCard();

            if (result.success && result.data) {
                currentDailyCard = result.data;
                renderDailyCard(result.data);

                // 檢查使用者是否已添加
                if (apiService.currentUser) {
                    const addedResult = await apiService.hasUserAddedDailyCard(
                        currentDailyCard.id,
                        apiService.currentUser.id
                    );
                    if (addedResult.success && addedResult.hasAdded) {
                        updateAddButtonState(true);
                    }
                }
            } else {
                console.error('載入每日一卡失敗:', result.error);
            }
        }

        // 渲染卡片內容
        function renderDailyCard(card) {
            // 更新分類
            const categoryEl = document.getElementById('card-category');
            if (categoryEl) categoryEl.textContent = card.category;

            // 更新標題
            const titleEl = document.getElementById('card-title');
            if (titleEl) titleEl.textContent = card.english_term;

            // 更新縮寫
            const abbrEl = document.getElementById('card-abbreviation');
            if (abbrEl) abbrEl.textContent = card.abbreviation ? `(${card.abbreviation})` : '';

            // 更新翻譯
            const translationEl = document.getElementById('card-translation');
            if (translationEl) translationEl.textContent = card.chinese_translation;

            // 更新等級
            const levelEl = document.getElementById('card-level');
            if (levelEl) levelEl.textContent = `Lv.${card.level}`;

            // 更新內容說明
            const descriptionEl = document.getElementById('card-description');
            if (descriptionEl) descriptionEl.textContent = card.description;

            // 更新比喻
            const analogyEl = document.getElementById('card-analogy');
            if (analogyEl) analogyEl.textContent = `💡 ${card.analogy}`;

            // 更新添加人數
            const addCountEl = document.getElementById('add-count');
            if (addCountEl) addCountEl.textContent = `${card.add_count} 人已收藏`;
        }

        // 添加卡片到收藏
        async function addToCollection() {
            if (!currentDailyCard) {
                alert('卡片尚未載入');
                return;
            }

            if (!apiService.currentUser) {
                alert('請先登入');
                window.location.href = 'login.html';
                return;
            }

            // 檢查是否已添加
            const checkResult = await apiService.hasUserAddedDailyCard(
                currentDailyCard.id,
                apiService.currentUser.id
            );

            if (checkResult.success && checkResult.hasAdded) {
                alert('你已經收藏過這張卡片了！');
                return;
            }

            const result = await apiService.addDailyCardToCollection(
                currentDailyCard.id,
                apiService.currentUser.id
            );

            if (result.success) {
                alert(`收藏成功！獲得 ${result.xpEarned} XP`);
                updateAddButtonState(true);

                // 更新顯示的添加人數
                currentDailyCard.add_count++;
                const addCountEl = document.getElementById('add-count');
                if (addCountEl) addCountEl.textContent = `${currentDailyCard.add_count} 人已收藏`;

                // 更新用戶 XP (如果是最新的 API 版本會回傳 newUserData)
                if (result.newUserData) {
                    // 更新快取
                    sessionStorage.setItem('userData', JSON.stringify(result.newUserData));

                    // 立即更新 Header UI
                    // 這裡我們可以重複使用 loadUserFromCache 的邏輯，但為了確保準確，我們直接寫更新邏輯
                    // 或者我們應該升級 loadUserFromCache 來使用 LevelSystem
                    updateHeaderUI(result.newUserData);
                }
            } else {
                alert('添加失敗: ' + result.error.message);
            }
        }

        function updateHeaderUI(userData) {
            let levelState;
            if (typeof LevelSystem !== 'undefined') {
                const currentXP = userData.current_xp || 0;
                const perfectCards = userData.perfect_card_count || 0;
                levelState = LevelSystem.calculateState(currentXP, perfectCards);
            } else {
                levelState = {
                    actualLevel: userData.current_level || 1,
                    progressInLevel: 0,
                    xpForNextLevel: 100,
                    isCapped: false,
                    displayProgress: 0
                };
            }

            const xpText = document.getElementById('header-xp-text');
            if (xpText) {
                if (levelState.isCapped) {
                    xpText.textContent = `MAX`;
                } else {
                    xpText.textContent = `${levelState.progressInLevel}/${levelState.xpForNextLevel}`;
                }
            }

            const xpBar = document.getElementById('header-xp-bar');
            if (xpBar) {
                xpBar.style.width = `${Math.min(levelState.displayProgress, 100)}%`;

                // 處理金色閃爍 (Capped State) (需要 CSS，稍後確認是否有加)
                if (levelState.isCapped) {
                    xpBar.classList.add('capped-gold-shimmer');
                    xpBar.classList.remove('bg-primary');
                } else {
                    xpBar.classList.remove('capped-gold-shimmer');
                    xpBar.classList.add('bg-primary');
                }
            }
        }

        // 更新添加按鈕狀態
        function updateAddButtonState(isAdded) {
            const addBtn = document.getElementById('add-btn');
            if (addBtn) {
                if (isAdded) {
                    addBtn.innerHTML = '<span class="material-symbols-outlined text-xl font-black">check</span>';
                    addBtn.classList.add('bg-green-400');
                    addBtn.classList.remove('bg-white');
                    addBtn.disabled = true;
                }
            }
        }
    </script>

</body>

</html>
