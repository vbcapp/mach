<!DOCTYPE html>
<html class="light" lang="zh-Hant">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="職訓考試" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>測驗結果</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;family=Noto+Sans+TC:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    
</head>

<body class="text-black dark:text-white min-h-screen flex flex-col overflow-x-hidden">
    <header class="pt-6 px-6 pb-2 flex flex-col shrink-0">
        <div class="flex items-center w-full mb-4 relative">
            <button id="back-btn" onclick="handleBack()"
                class="w-11 h-11 flex items-center justify-center bg-white dark:bg-zinc-800 neo-border rounded-full shadow-neo active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all z-10 shrink-0">
                <span class="material-symbols-outlined text-2xl font-bold">arrow_back</span>
            </button>
            <div class="absolute inset-x-0 flex justify-center pointer-events-none">
                <div
                    class="bg-primary text-black px-4 py-1.5 neo-border flex items-center gap-1.5 rounded-full shadow-neo-yellow font-black text-sm uppercase tracking-tight pointer-events-auto">
                    <span class="material-symbols-outlined text-base">emoji_events</span>
                    測驗結果
                </div>
            </div>
            <!-- Test Button -->
            <button id="test-anim-btn"
                class="absolute right-0 w-11 h-11 flex items-center justify-center bg-white dark:bg-zinc-800 neo-border rounded-full shadow-neo active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all z-10 shrink-0">
                <span class="material-symbols-outlined text-xl font-bold text-blue-500">play_arrow</span>
            </button>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto px-6 py-2 flex flex-col items-center justify-center space-y-4">
        <!-- 分數卡片 -->
        <div
            class="w-full bg-white dark:bg-zinc-900 neo-border rounded-2xl shadow-neo overflow-hidden transform hover:scale-[1.02] transition-transform">
            <div class="h-4 bg-primary border-b-[3px] border-black"></div>
            <div class="p-6 text-center space-y-2">
                <p class="text-zinc-500 dark:text-zinc-400 font-bold text-base uppercase tracking-wide">你的得分</p>
                <div class="flex items-baseline justify-center gap-2">
                    <span id="score-text" class="text-6xl font-black text-neo-indigo dark:text-primary">0</span>
                    <span class="text-3xl font-bold text-zinc-400">/</span>
                    <span id="total-text" class="text-3xl font-bold text-zinc-400">3</span>
                </div>
            </div>
        </div>

        <!-- 評語 -->
        <div id="message-container"
            class="w-full text-center space-y-2 p-4 bg-note-yellow dark:bg-zinc-800/50 neo-border rounded-2xl shadow-neo-yellow">
            <span id="result-emoji" class="text-5xl animate-bounce inline-block">🎉</span>
            <h2 id="result-title" class="text-2xl font-black text-zinc-900 dark:text-white leading-tight">
                太棒了！
            </h2>
            <p id="result-desc" class="text-zinc-700 dark:text-zinc-300 font-medium text-sm">
                你已經完全掌握了這些知識！
            </p>
        </div>

        <!-- 詳細結果列表 (可選) -->
        <div class="w-full space-y-2">
            <h3 class="font-black text-base px-2">答題狀況</h3>
            <div id="results-list" class="grid grid-cols-3 gap-3">
                <!-- 由 JS 生成 -->
            </div>
        </div>
    </main>

    <footer class="px-6 pb-6 pt-2 shrink-0 bg-transparent space-y-3">
        <button onclick="retakeQuiz()"
            class="group w-full bg-primary text-black neo-border rounded-2xl py-3 font-black text-lg shadow-neo-lg hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[10px_10px_0px_0px_#3730A3] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined font-black">refresh</span>
            <span>再測一次</span>
        </button>

        <button onclick="window.location.href='index.html'"
            class="group w-full bg-white dark:bg-zinc-800 text-black dark:text-white neo-border rounded-2xl py-3 font-black text-lg shadow-neo hover:translate-x-[-2px] hover:translate-y-[-2px] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2">
            <span>回到首頁</span>
        </button>
    </footer>

    <script>
        // 追蹤是否有待處理的升級
        let pendingLevelUp = null;
        // 動畫隊列：按順序顯示動畫（開拓者 → 大師勛章 → 等級提升）
        let celebrationQueue = [];
        // 是否正在顯示動畫
        let isShowingCelebration = false;

        document.addEventListener('DOMContentLoaded', () => {
            const resultData = localStorage.getItem('quizResults');
            const apiResultData = sessionStorage.getItem('quizApiResult');

            // Debug: 顯示 storage 內容
            console.log('=== Result Page Debug ===');
            console.log('quizResults exists:', !!resultData);
            console.log('quizApiResult exists:', !!apiResultData);
            console.log('quizApiResult raw:', apiResultData);

            if (!resultData) {
                // 如果沒有結果資料，導回首頁或測驗頁
                window.location.href = 'test.html';
                return;
            }

            const data = JSON.parse(resultData);
            const { correctCount, totalQuestions, isPerfect, results } = data;

            // 優先使用 API 回傳的 XP
            let xpEarned = 0;
            let bonuses = [];

            if (apiResultData) {
                try {
                    const apiResult = JSON.parse(apiResultData);
                    console.log('=== Result Page Debug ===');
                    console.log('apiResult:', apiResult);
                    console.log('bonuses:', apiResult.bonuses);
                    if (apiResult.success) {
                        xpEarned = apiResult.xpEarned;
                        bonuses = apiResult.bonuses || [];

                        // 檢查是否升級（使用單獨的 flag 避免重複觸發）
                        const levelUpProcessed = sessionStorage.getItem('levelUpProcessed');
                        if (apiResult.leveledUp && !levelUpProcessed) {
                            console.log('🎉 Level Up detected!', apiResult.oldLevel, '->', apiResult.newLevel);
                            pendingLevelUp = {
                                oldLevel: apiResult.oldLevel,
                                newLevel: apiResult.newLevel
                            };
                            // 標記升級已處理，避免返回時重複觸發
                            sessionStorage.setItem('levelUpProcessed', 'true');
                        }
                    }
                } catch (e) {
                    console.error('Error parsing API result', e);
                }
            } else {
                // Fallback: 純前端計算 (如果沒 API 回傳) - 高底薪模式
                if (correctCount === 1) xpEarned = 70;
                else if (correctCount === 2) xpEarned = 85;
                else if (correctCount === 3) xpEarned = 100;
            }

            // 更新分數顯示 (改為顯示 XP)
            document.getElementById('score-text').textContent = xpEarned;

            // 修改 "/" 和 "3" 為 "分"
            const scoreContainer = document.getElementById('score-text').parentElement;
            // 移除原本的 "/" 和 total-text
            const oldSlash = scoreContainer.children[1];
            const oldTotal = document.getElementById('total-text');
            if (oldSlash) oldSlash.style.display = 'none';
            if (oldTotal) oldTotal.style.display = 'none';

            // 新增 "分" 字樣 (如果還沒加過)
            let unitSpan = document.getElementById('score-unit');
            if (!unitSpan) {
                unitSpan = document.createElement('span');
                unitSpan.id = 'score-unit';
                unitSpan.className = 'text-3xl font-bold text-zinc-400';
                unitSpan.textContent = 'XP';
                scoreContainer.appendChild(unitSpan);
            }

            // 更新評語
            const emojiEl = document.getElementById('result-emoji');
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');
            const messageContainer = document.getElementById('message-container');

            if (isPerfect) {
                emojiEl.textContent = '🏆';
                titleEl.textContent = '完美通關！';
                descEl.textContent = '你是 API 大師！所有題目都答對了！';
                messageContainer.classList.add('bg-correct-green', 'border-correct-border');
                messageContainer.classList.remove('bg-note-yellow');
            } else if (correctCount > 0) {
                emojiEl.textContent = '💪';
                titleEl.textContent = '做得不錯！';
                descEl.textContent = `答對了 ${correctCount} 題，再接再厲！`;
            } else {
                emojiEl.textContent = '📚';
                titleEl.textContent = '繼續加油！';
                descEl.textContent = '別灰心，複習一下再挑戰一次！';
                messageContainer.classList.add('bg-incorrect-red', 'border-incorrect-border');
                messageContainer.classList.remove('bg-note-yellow', 'shadow-neo-yellow');
                messageContainer.classList.add('shadow-neo');
            }

            // 顯示獲得的獎勵 (Bonus) & 觸發慶祝動畫
            if (bonuses.length > 0) {
                const bonusContainer = document.createElement('div');
                bonusContainer.className = 'mt-3 space-y-2';

                bonuses.forEach((bonus, index) => {
                    const badgeWrapper = document.createElement('div');
                    badgeWrapper.className = 'flex flex-col items-center gap-1';

                    const badge = document.createElement('div');
                    badge.className = 'bg-yellow-100 text-yellow-800 border-2 border-yellow-400 px-3 py-1.5 rounded-xl font-bold text-sm inline-flex items-center gap-2 mx-1 shadow-sm opacity-0 transform translate-y-4 transition-all duration-500';

                    // 根據獎勵類型顯示不同 icon 和說明
                    let icon = 'military_tech';
                    let description = '';

                    if (bonus.name.includes('開拓者')) {
                        icon = 'flag';
                        description = '🎉 首次滿分通關！';
                    } else if (bonus.name.includes('大師勛章')) {
                        icon = 'workspace_premium';
                        description = '🏆 已精通此卡片所有題目！';
                    } else if (bonus.name.includes('大師加成')) {
                        icon = 'workspace_premium';
                        description = '✨ 大師額外加成';
                    }

                    badge.innerHTML = `<span class="material-symbols-outlined text-lg">${icon}</span> ${bonus.name} +${bonus.xp}XP`;
                    badgeWrapper.appendChild(badge);

                    // 加上說明文字
                    if (description) {
                        const descText = document.createElement('p');
                        descText.className = 'text-xs text-zinc-500 font-medium opacity-0 transition-opacity duration-500';
                        descText.textContent = description;
                        badgeWrapper.appendChild(descText);

                        // 延遲顯示說明文字
                        setTimeout(() => {
                            descText.classList.remove('opacity-0');
                        }, 800 + (index * 200));
                    }

                    bonusContainer.appendChild(badgeWrapper);

                    // 延遲顯示 Badge 動畫
                    setTimeout(() => {
                        badge.classList.remove('opacity-0', 'translate-y-4');
                        badge.classList.add('animate-bounce');
                    }, 500 + (index * 200));

                    // 如果是【首次】特殊成就，加入動畫隊列（大師加成不觸發）
                    // 使用 flag 避免返回頁面時重複觸發
                    // 如果是【首次】特殊成就，加入動畫隊列（大師加成不觸發）
                    // 使用 flag 避免返回頁面時重複觸發
                    const bonusCelebrationProcessed = sessionStorage.getItem('bonusCelebrationProcessed');
                    const isFirstTimeAchievement =
                        bonus.name.includes('開拓者') ||
                        (bonus.name.includes('大師勛章') && bonus.isNew !== false);

                    console.log('Bonus Check:', { name: bonus.name, isFirstTimeAchievement, bonusCelebrationProcessed });

                    // DEBUG: Temporarily ignore bonusCelebrationProcessed to verify animation rendering
                    // if (isFirstTimeAchievement && !bonusCelebrationProcessed) {
                    if (isFirstTimeAchievement) {
                        console.log('Queueing celebration for:', bonus.name);
                        // 加入隊列而不是直接顯示
                        queueCelebration(bonus);
                    } else {
                        console.log('Skipping celebration queue for:', bonus.name);
                    }
                });

                // 標記 bonus celebration 已處理
                if (!sessionStorage.getItem('bonusCelebrationProcessed')) {
                    sessionStorage.setItem('bonusCelebrationProcessed', 'true');
                }

                // 插入到評語描述下方
                descEl.after(bonusContainer);
            }

            // 開始處理動畫隊列（包括最後的升級動畫）
            console.log('Processing next celebration...');
            processNextCelebration();

            // 執行數字跳動動畫
            animateValue("score-text", 0, xpEarned, 1500);

            // 生成結果圖示
            const listContainer = document.getElementById('results-list');
            listContainer.innerHTML = results.map((isCorrect, index) => `
                <button onclick="window.location.href='test.html?mode=review&index=${index}'" 
                    class="aspect-square neo-border rounded-xl flex flex-col items-center justify-center gap-1 ${isCorrect ? 'bg-correct-green border-correct-border' : 'bg-incorrect-red border-incorrect-border'} active:scale-95 transition-transform">
                    <span class="text-xs font-black opacity-50">Q${index + 1}</span>
                    <span class="material-symbols-outlined text-2xl font-black ${isCorrect ? 'text-green-600' : 'text-red-500'}">
                        ${isCorrect ? 'check' : 'close'}
                    </span>
                </button>
            `).join('');
        });

        // 數字跳動動畫
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            if (!obj) return;
            // 假設 end 為字串可能包含非數字，先轉型
            const endNum = parseInt(end, 10);
            if (isNaN(endNum)) {
                obj.textContent = end;
                return;
            }

            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // 使用 easeOutQuart 緩動效果
                const easeProgress = 1 - Math.pow(1 - progress, 4);
                obj.textContent = Math.floor(progress * (endNum - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.textContent = endNum;
                }
            };
            window.requestAnimationFrame(step);
        }

        // 處理升級跳轉
        function triggerLevelUpTransition() {
            if (!pendingLevelUp) return;

            // 儲存升級資訊
            sessionStorage.setItem('levelUpData', JSON.stringify(pendingLevelUp));
            sessionStorage.setItem('levelUpReturnUrl', 'result.html');

            // 延遲跳轉，讓用戶先看到結果
            setTimeout(() => {
                window.location.href = 'upgrade.html';
            }, 800);
        }

        // 將慶祝動畫加入隊列（按順序：開拓者優先，大師勛章次之）
        function queueCelebration(bonus) {
            // 決定優先順序：開拓者 = 1, 大師勛章 = 2
            let priority = 99;
            if (bonus.name.includes('開拓者')) priority = 1;
            else if (bonus.name.includes('大師勛章')) priority = 2;

            celebrationQueue.push({ bonus, priority });
            // 按優先順序排序
            celebrationQueue.sort((a, b) => a.priority - b.priority);
        }

        // 處理隊列中的下一個動畫
        function processNextCelebration() {
            // 如果正在顯示動畫，等待
            if (isShowingCelebration) return;

            // 如果隊列中還有動畫，顯示下一個
            if (celebrationQueue.length > 0) {
                const next = celebrationQueue.shift();
                showCelebrationModal(next.bonus);
            }
            // 如果隊列空了，檢查是否有待處理的升級
            else if (pendingLevelUp) {
                triggerLevelUpTransition();
            }
        }

        // 全螢幕慶祝 Modal
        function showCelebrationModal(bonus) {
            console.log('SHOWING CELEBRATION MODAL for:', bonus.name);
            // 標記正在顯示動畫
            isShowingCelebration = true;

            // 取得卡片名稱
            const cardName = sessionStorage.getItem('currentCardName') || '此卡片';

            // 創建 Modal 元素 (Force Z-Index via style)
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 transition-opacity duration-300';
            modal.style.zIndex = '9999';

            let icon = 'military_tech';
            let colorClass = 'text-yellow-400';
            let borderColorClass = 'border-yellow-400';
            let shadowClass = 'shadow-[0_0_50px_rgba(250,204,21,0.5)]';
            let description = '';

            if (bonus.name.includes('開拓者')) {
                icon = 'flag';
                colorClass = 'text-orange-400';
                borderColorClass = 'border-orange-400';
                shadowClass = 'shadow-[0_0_50px_rgba(251,146,60,0.5)]';
                description = `恭喜你【${cardName}】卡第一次獲得滿分！`;
            }
            if (bonus.name.includes('大師')) {
                icon = 'workspace_premium';
                colorClass = 'text-purple-400';
                borderColorClass = 'border-purple-400';
                shadowClass = 'shadow-[0_0_50px_rgba(168,85,247,0.5)]';
                description = `恭喜你【${cardName}】卡所有 5 道題目都答對過了！`;
            }

            modal.innerHTML = `
                <div class="relative transform scale-50 transition-transform duration-500 bg-white dark:bg-zinc-900 border-4 ${borderColorClass} p-6 rounded-3xl ${shadowClass} flex flex-col items-center text-center max-w-sm mx-4">
                    <div class="absolute -top-10 bg-yellow-400 text-black font-black text-base px-5 py-1.5 rounded-full border-4 border-white dark:border-zinc-900 shadow-lg rotate-3 uppercase tracking-wider">
                        NEW UNLOCK!
                    </div>
                    <span class="material-symbols-outlined text-7xl ${colorClass} mb-3 animate-[bounce_2s_infinite]">
                        ${icon}
                    </span>
                    <h2 class="text-2xl font-black text-black dark:text-white mb-2 leading-tight">
                        ${bonus.name}
                    </h2>
                    <p class="text-sm font-medium text-zinc-600 dark:text-zinc-400 mb-4 leading-relaxed">
                        ${description}
                    </p>
                    
                    <!-- 底部水平佈局區塊 -->
                    <div class="w-full flex items-center gap-3 pt-3 border-t-2 border-dashed border-zinc-200 dark:border-zinc-700">
                        <div class="flex-1 text-left">
                            <p class="text-xs font-bold text-zinc-500 dark:text-zinc-400">獲得獎勵</p>
                        </div>
                        <div class="bg-primary text-black font-black text-sm px-3 py-1.5 rounded-xl border-2 border-black shadow-neo shrink-0">
                            +${bonus.xp} XP
                        </div>
                        <button id="close-modal-btn" class="bg-black text-white dark:bg-white dark:text-black font-black text-sm px-4 py-2 rounded-xl border-2 border-black hover:scale-105 active:scale-95 transition-transform shrink-0">
                            太棒了！
                        </button>
                    </div>
                    
                    <!-- 簡單的光芒背景 -->
                    <div class="absolute inset-0 -z-10 bg-gradient-to-tr from-yellow-100/50 to-transparent dark:from-yellow-900/20 rounded-2xl pointer-events-none"></div>
                </div>
            `;

            document.body.appendChild(modal);

            // 顯示動畫
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-50');
                modal.querySelector('div').classList.add('scale-100', 'rotate-1');
            });

            // 點擊關閉
            const closeBtn = modal.querySelector('#close-modal-btn');
            const closeModal = () => {
                modal.classList.add('opacity-0');
                modal.querySelector('div').classList.remove('scale-100');
                modal.querySelector('div').classList.add('scale-50');
                setTimeout(() => {
                    modal.remove();
                    // 標記動畫結束
                    isShowingCelebration = false;
                    // 處理下一個動畫
                    processNextCelebration();
                }, 300);
            };
            closeBtn.onclick = closeModal;

            // 簡易 Confetti 效果
            createConfetti();
        }

        function createConfetti() {
            // 簡單的 CSS 粒子噴發
            const colors = ['#FACC15', '#EF4444', '#22C55E', '#3B82F6', '#A855F7'];
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'fixed w-3 h-3 rounded-full z-[60] pointer-events-none';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                document.body.appendChild(particle);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 10;
                const tx = Math.cos(angle) * velocity * 20; // x distance
                const ty = Math.sin(angle) * velocity * 20; // y distance

                particle.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}vw), calc(-50% + ${ty}vh)) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    fill: 'forwards'
                }).onfinish = () => particle.remove();
            }
        }

        function handleBack() {
            const returnUrl = sessionStorage.getItem('quizReturnUrl');
            if (returnUrl) {
                window.location.href = returnUrl;
            } else {
                window.location.href = 'index.html';
            }
        }

        function retakeQuiz() {
            // 清除測驗狀態，確保重新開始
            localStorage.removeItem('quizReviewState');
            localStorage.removeItem('quizResults');
            localStorage.removeItem('quizApiResult');

            // 獲取當前卡片 ID
            const cardId = sessionStorage.getItem('currentCardId');

            // 跳轉時帶上 cardId 參數
            if (cardId) {
                window.location.href = `test.html?id=${cardId}`;
            } else {
                window.location.href = 'test.html';
            }
        }

        // DEBUG: 雙擊標題觸發測試動畫
        const titleElement = document.getElementById('result-title');
        if (titleElement) {
            titleElement.addEventListener('dblclick', () => {
                const fakeBonus = { name: "【開拓者獎勵】", xp: 50 };
                showCelebrationModal(fakeBonus);
                createConfetti();
            });
        }

        // DEBUG: 右上角按鈕觸發
        const testBtn = document.getElementById('test-anim-btn');
        if (testBtn) {
            testBtn.addEventListener('click', () => {
                console.log('DEBUG: Simulating Full Flow (Pioneer -> Level Up)');

                // 1. 設定待處理的升級
                pendingLevelUp = { oldLevel: 6, newLevel: 7 };

                // 2. 加入開拓者獎勵到隊列
                const fakeBonus = { name: "【開拓者獎勵】", xp: 50 };
                queueCelebration(fakeBonus);

                // 3. 開始處理
                processNextCelebration();
            });

            // Right click (or long press) to test Level Up
            testBtn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                console.warn('DEBUG: Forcing Level Up Transition');
                pendingLevelUp = { oldLevel: 6, newLevel: 7 };
                triggerLevelUpTransition();
            });
        }
    </script>

            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
