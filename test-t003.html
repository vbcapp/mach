<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T003 API 測試 - 本次 vs 歷史正確率</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card.recent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-card.historical {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-count {
            font-size: 12px;
            opacity: 0.8;
        }

        .improvement-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 3px solid #ddd;
        }

        .improvement-card.positive {
            border-color: #27ae60;
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
        }

        .improvement-card.negative {
            border-color: #e74c3c;
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .improvement-card.neutral {
            border-color: #95a5a6;
            background: linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%);
            color: white;
        }

        .improvement-label {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .improvement-value {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .improvement-text {
            font-size: 16px;
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: #f39c12;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📊 T003 API 測試</h1>
            <p class="subtitle">測試「本次 vs 歷史正確率」API 功能</p>

            <div class="input-row">
                <div class="input-group">
                    <label for="userId">用戶 ID (UUID)</label>
                    <input
                        type="text"
                        id="userId"
                        placeholder="例如: 123e4567-e89b-12d3-a456-426614174000"
                        value="">
                </div>

                <div class="input-group">
                    <label for="recentCount">最近幾題</label>
                    <input
                        type="number"
                        id="recentCount"
                        value="10"
                        min="1"
                        max="100">
                </div>
            </div>

            <button onclick="testAPI()">🚀 執行測試</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">載入中...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h2>📈 測試結果</h2>

                <div class="comparison-grid">
                    <div class="stat-card recent">
                        <div class="stat-label">最近 <span id="displayRecentCount">10</span> 題正確率</div>
                        <div class="stat-value"><span id="recentAccuracy">0</span>%</div>
                        <div class="stat-count">共 <span id="recentCount">0</span> 題</div>
                    </div>

                    <div class="stat-card historical">
                        <div class="stat-label">歷史平均正確率</div>
                        <div class="stat-value"><span id="historicalAccuracy">0</span>%</div>
                        <div class="stat-count">共 <span id="historicalCount">0</span> 題</div>
                    </div>
                </div>

                <div class="improvement-card" id="improvementCard">
                    <div class="improvement-label">進步幅度</div>
                    <div class="improvement-value" id="improvement">0</div>
                    <div class="improvement-text" id="improvementText">持平表現</div>
                    <div id="bestBadge" style="display: none;">
                        <span class="badge">🏆 最佳表現</span>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">分析題數</div>
                        <div class="info-value" id="analyzedCount">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">總答題數</div>
                        <div class="info-value" id="totalCount">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">最佳表現</div>
                        <div class="info-value" id="bestStatus">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        const apiService = new ApiService();
        let initialized = false;

        // 自動初始化
        (async function() {
            const result = await apiService.initialize();
            if (result.success) {
                initialized = true;
                console.log('✅ API Service 初始化成功');

                // 如果有當前用戶，自動填入 ID
                if (result.user && result.user.id) {
                    document.getElementById('userId').value = result.user.id;
                }
            } else {
                showError('API Service 初始化失敗: ' + (result.error || '未知錯誤'));
            }
        })();

        async function testAPI() {
            if (!initialized) {
                showError('API Service 尚未初始化');
                return;
            }

            const userId = document.getElementById('userId').value.trim();
            const recentCount = parseInt(document.getElementById('recentCount').value);

            if (!userId) {
                showError('請輸入用戶 ID');
                return;
            }

            if (!recentCount || recentCount < 1) {
                showError('請輸入有效的題數（>= 1）');
                return;
            }

            // 隱藏之前的結果
            hideError();
            hideResult();
            showLoading();

            try {
                console.log('🔍 呼叫 getRecentVsHistoricalAccuracy API...');
                const result = await apiService.getRecentVsHistoricalAccuracy(userId, recentCount);

                hideLoading();

                if (result.success) {
                    console.log('✅ API 回傳成功:', result.data);
                    showResult(result.data);
                } else {
                    showError('API 錯誤: ' + (result.error || '未知錯誤'));
                }
            } catch (error) {
                hideLoading();
                showError('執行錯誤: ' + error.message);
                console.error(error);
            }
        }

        function showResult(data) {
            // 更新數值
            document.getElementById('displayRecentCount').textContent = data.recentCount;
            document.getElementById('recentAccuracy').textContent = data.recentAccuracy;
            document.getElementById('recentCount').textContent = data.recentCount;
            document.getElementById('historicalAccuracy').textContent = data.historicalAccuracy;
            document.getElementById('historicalCount').textContent = data.historicalCount;
            document.getElementById('analyzedCount').textContent = data.recentCount;
            document.getElementById('totalCount').textContent = data.historicalCount;

            // 更新進步幅度
            const improvement = data.improvement;
            const improvementEl = document.getElementById('improvement');
            const improvementTextEl = document.getElementById('improvementText');
            const improvementCard = document.getElementById('improvementCard');

            if (improvement > 0) {
                improvementEl.textContent = `+${improvement}%`;
                improvementTextEl.textContent = '表現進步中 🎉';
                improvementCard.className = 'improvement-card positive';
            } else if (improvement < 0) {
                improvementEl.textContent = `${improvement}%`;
                improvementTextEl.textContent = '需要加油 💪';
                improvementCard.className = 'improvement-card negative';
            } else {
                improvementEl.textContent = '0%';
                improvementTextEl.textContent = '持平表現 ➡️';
                improvementCard.className = 'improvement-card neutral';
            }

            // 更新最佳表現狀態
            const bestBadge = document.getElementById('bestBadge');
            const bestStatus = document.getElementById('bestStatus');

            if (data.isBestPerformance) {
                bestBadge.style.display = 'block';
                bestStatus.textContent = '是 🏆';
                bestStatus.style.color = '#f39c12';
            } else {
                bestBadge.style.display = 'none';
                bestStatus.textContent = '否';
                bestStatus.style.color = '#95a5a6';
            }

            document.getElementById('result').classList.add('show');
        }

        function hideResult() {
            document.getElementById('result').classList.remove('show');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        // 監聽 Enter 鍵
        document.getElementById('userId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testAPI();
            }
        });

        document.getElementById('recentCount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testAPI();
            }
        });
    </script>
</body>
</html>
