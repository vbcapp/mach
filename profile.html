<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VibeCoding 個人中心 - Hero Layout (修訂版)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FFD600",
                        "background-light": "#EEEEEE",
                        "background-dark": "#111827",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .neo-shadow { box-shadow: 4px 4px 0px 0px #000000; }
        .neo-shadow-sm { box-shadow: 2px 2px 0px 0px #000000; }
        .neo-border { border: 2px solid #000000; }
        .neo-border-thick { border: 3px solid #000000; }
        .neo-brutalism-card {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            border: 4px solid black;
        }
        .neo-brutalism-button:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(2px, 2px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }

        .capped-gold-shimmer {
            position: relative;
            overflow: hidden;
            background-color: #ffd400 !important;
            /* Force gold connection */
        }

        .capped-gold-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.6),
                    transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% {
                left: 200%;
            }
        }
    </style>
    <!-- Add LevelSystem Script -->
    <script src="js/level-system.js"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-black dark:text-white min-h-screen flex flex-col">
    <section class="bg-primary pt-12 pb-10 px-6 border-b-8 border-black relative overflow-hidden">
        <div class="absolute top-4 left-6 right-6 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <a href="rule.html"
                    class="bg-white border-4 border-black p-1 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] cursor-pointer hover:scale-105 transition-transform">
                    <span class="material-symbols-outlined text-black block text-xl">terminal</span>
                </a>
                <h1 class="text-xl font-black italic tracking-tighter">VIBECODING</h1>
            </div>
            <button
                class="bg-white border-4 border-black p-2 neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <span class="material-symbols-outlined text-black block">settings</span>
            </button>
        </div>
        <div class="flex flex-col items-center mt-12 mb-12">
            <div class="relative">
                <div class="w-32 h-32 bg-white border-4 border-black flex items-center justify-center shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] cursor-pointer hover:scale-105 transition-transform"
                    onclick="window.location.href='profilei.html'">
                    <span class="material-symbols-outlined text-black text-7xl">person</span>
                </div>
                <!-- 提示文字 -->
                <div id="user-level"
                    class="absolute -top-3 -right-6 bg-black text-white border-4 border-black px-4 py-1 font-black italic shadow-[4px_4px_0px_0px_rgba(255,214,0,1)]">
                    Lv. -
                </div>
            </div>
            <h2 id="user-nickname" class="text-6xl font-black italic mt-6 tracking-tight">Loading...</h2>
        </div>
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-1">
                <span class="text-xs font-black italic uppercase tracking-wider">XP POINTS</span>
                <span id="user-xp-text" class="text-xs font-black italic">0 / 0</span>
            </div>
            <div class="h-6 w-full border-4 border-black bg-white">
                <div id="user-xp-bar" class="h-full bg-black border-r-4 border-black" style="width: 0%"></div>
            </div>
        </div>
    </section>
    <main class="flex-grow p-6 space-y-6 pb-32">
        <div
            class="bg-white dark:bg-gray-800 border-4 border-black p-4 flex justify-between items-center neo-brutalism-card">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-black dark:text-white">style</span>
                <span class="text-xl font-black italic">我的卡片數量</span>
            </div>
            <div id="user-card-count" class="text-4xl font-black italic bg-primary px-3 border-l-4 border-black">0</div>
        </div>
        <div class="bg-white dark:bg-gray-800 border-4 border-black p-4 space-y-4 neo-brutalism-card">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-black dark:text-white">cloud_upload</span>
                <span class="text-xl font-black italic uppercase">資料備份</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button id="export-cards-btn"
                    class="w-full bg-primary border-4 border-black py-3 px-2 font-black italic flex items-center justify-center text-center leading-tight neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    匯出卡片資料 (JSON)
                </button>
                <button id="import-cards-btn"
                    class="w-full bg-white border-4 border-black py-3 px-2 font-black italic flex items-center justify-center text-center leading-tight neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    匯入所有卡片
                </button>
                <input type="file" id="import-file-input" accept=".json" class="hidden">
            </div>
        </div>
        <div class="bg-white dark:bg-gray-800 border-4 border-black p-4 space-y-4 neo-brutalism-card">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-black dark:text-white">share</span>
                <span class="text-xl font-black italic uppercase">社群追蹤</span>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button
                    class="aspect-square bg-black border-4 border-black flex items-center justify-center neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <span class="text-white font-black text-xl">@</span>
                </button>
                <button
                    class="aspect-square bg-[#1877F2] border-4 border-black flex items-center justify-center neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <span class="text-white font-black text-xl italic">f</span>
                </button>
                <button
                    class="aspect-square bg-gradient-to-tr from-[#F58529] via-[#DD2A7B] to-[#8134AF] border-4 border-black flex items-center justify-center neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <span class="material-symbols-outlined text-white">camera_alt</span>
                </button>
                <button
                    class="aspect-square bg-[#06C755] border-4 border-black flex items-center justify-center neo-brutalism-button shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <span class="material-symbols-outlined text-white">chat_bubble</span>
                </button>
            </div>
        </div>
    </main>
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white dark:bg-zinc-900 border-t-thick border-black flex justify-around items-center px-2 py-4 pb-8 z-50">
        <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1 group">
            <div
                class="size-11 flex items-center justify-center neo-border neo-shadow-sm bg-white group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                <span class="material-symbols-outlined text-2xl font-bold">style</span>
            </div>
            <span class="text-[10px] font-black uppercase">單字卡</span>
        </button>
        <button onclick="window.location.href='calendar.html'" class="flex flex-col items-center gap-1 group">
            <div
                class="size-11 flex items-center justify-center neo-border neo-shadow-sm bg-white group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                <span class="material-symbols-outlined text-2xl font-bold">calendar_month</span>
            </div>
            <span class="text-[10px] font-black uppercase">學習曆</span>
        </button>
        <button onclick="window.location.href='rank.html'" class="flex flex-col items-center gap-1 group">
            <div
                class="size-11 flex items-center justify-center neo-border neo-shadow-sm bg-white group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                <span class="material-symbols-outlined text-2xl font-bold">trophy</span>
            </div>
            <span class="text-[9px] font-black uppercase">排行榜</span>
        </button>
        <button class="flex flex-col items-center gap-1 group">
            <div
                class="size-14 -mt-8 flex items-center justify-center neo-border-thick neo-shadow bg-primary group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                <span class="material-symbols-outlined text-3xl font-black">person</span>
            </div>
            <span class="text-[9px] font-black uppercase">個人</span>
        </button>
    </nav>

    <!-- ==================== Supabase 整合 ==================== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/init.js"></script>

    <script>
        // 從 sessionStorage 載入使用者資料（立即顯示）
        function loadFromCache() {
            const cached = sessionStorage.getItem('userData');
            if (cached) {
                const userData = JSON.parse(cached);
                updateProfilePageUI(userData);
                if (userData.username) {
                    document.getElementById('user-nickname').textContent = userData.username;
                }
                return true;
            }
            return false;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 先從快取載入（最快）
            loadFromCache();

            const nickname = localStorage.getItem('userNickname');
            if (nickname) {
                document.getElementById('user-nickname').textContent = nickname;
            }

            // 2. 如果有 Supabase 連接，嘗試獲取最新資料
            await apiService.initialize();

            if (apiService.currentUser) {
                const profileResult = await apiService.getUserProfile(apiService.currentUser.id);
                if (profileResult.success) {
                    // 更新顯示名稱
                    document.getElementById('user-nickname').textContent = profileResult.data.username;

                    // 同步更新 LocalStorage，確保下次載入也是最新的
                    localStorage.setItem('userNickname', profileResult.data.username);

                    // 快取到 sessionStorage
                    sessionStorage.setItem('userData', JSON.stringify(profileResult.data));

                    // 更新其他 UI (Level, XP 等)
                    updateProfilePageUI(profileResult.data);
                }
            }

            // 綁定匯出按鈕事件
            const exportBtn = document.getElementById('export-cards-btn');
            if (exportBtn) {
                exportBtn.addEventListener('click', async () => {
                    if (!apiService.currentUser) {
                        alert('請先登入');
                        return;
                    }

                    // 顯示 Loading
                    const originalText = exportBtn.innerText;
                    exportBtn.innerText = '匯出中...';
                    exportBtn.disabled = true;

                    try {
                        const result = await apiService.getAllUserCards(apiService.currentUser.id);

                        if (result.success) {
                            const dataStr = JSON.stringify(result.data, null, 2);
                            const blob = new Blob([dataStr], { type: 'application/json' });
                            const url = URL.createObjectURL(blob);

                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `vibecoding_cards_backup_${new Date().toISOString().split('T')[0]}.json`;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        } else {
                            alert('匯出失敗: ' + (result.error?.message || '未知錯誤'));
                        }
                    } catch (e) {
                        console.error(e);
                        alert('匯出發生錯誤');
                    } finally {
                        exportBtn.innerText = originalText;
                        exportBtn.disabled = false;
                    }
                });
            }

            // 綁定匯入按鈕與檔案選擇
            const importBtn = document.getElementById('import-cards-btn');
            const fileInput = document.getElementById('import-file-input');

            if (importBtn && fileInput) {
                importBtn.addEventListener('click', () => {
                    if (!apiService.currentUser) {
                        alert('請先登入');
                        return;
                    }
                    fileInput.click();
                });

                fileInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    if (!file.name.endsWith('.json')) {
                        alert('請選擇 JSON 檔案');
                        return;
                    }

                    if (!confirm('匯入操作將會新增這些卡片到您的帳號中。確定要繼續嗎？')) {
                        fileInput.value = ''; // 清除選擇
                        return;
                    }

                    // 顯示 Loading
                    const originalText = importBtn.innerText;
                    importBtn.innerText = '匯入中...';
                    importBtn.disabled = true;

                    try {
                        const text = await file.text();
                        let cards = JSON.parse(text);

                        if (!Array.isArray(cards)) {
                            // 如果不是陣列，嘗試看看是否包在 data 屬性裡 (依據匯出格式 result.data)
                            if (cards.data && Array.isArray(cards.data)) {
                                cards = cards.data;
                            } else {
                                throw new Error('格式錯誤：JSON 內容應為卡片陣列');
                            }
                        }

                        // 資料清理與準備
                        const currentUserId = apiService.currentUser.id;
                        const cardsToImport = cards.map(c => {
                            // 移除不應該直接匯入的欄位，保留卡片內容
                            // 注意：我們移除 ID，讓它們成為新卡片
                            // 移除 progress，因為新卡片進度應重置
                            const { id, user_id, created_at, updated_at, progress, user_card_progress, ...cardContent } = c;
                            return {
                                ...cardContent,
                                user_id: currentUserId, // 確保歸屬到當前用戶
                                is_public: false // 預設匯入為私人
                            };
                        });

                        if (cardsToImport.length === 0) {
                            alert('沒有可匯入的有效卡片資料');
                            return;
                        }

                        // 批量建立
                        // 由於瀏覽器端可能會有請求大小限制，如果是大量資料，可以考慮分批
                        // 這裡簡單做，直接呼叫 update (createCards)
                        // 注意：createCards 在 api-service.js 中已實作
                        const result = await apiService.createCards(cardsToImport);

                        if (result.success) {
                            alert(`成功匯入 ${result.cardsCreated} 張卡片！\n獲得 ${result.xpEarned} XP！`);
                            // 重新載入頁面以更新數據
                            window.location.reload();
                        } else {
                            throw result.error;
                        }

                    } catch (err) {
                        console.error(err);
                        alert('匯入失敗: ' + (err.message || '未知錯誤'));
                    } finally {
                        importBtn.innerText = originalText;
                        importBtn.disabled = false;
                        fileInput.value = ''; // Reset input
                    }
                });
            }
        });

        function updateProfilePageUI(userData) {
            // 使用 LevelSystem 計算顯示狀態
            let levelState;
            if (typeof LevelSystem !== 'undefined') {
                const currentXP = userData.current_xp || 0;
                const perfectCards = userData.perfect_card_count || 0;
                levelState = LevelSystem.calculateState(currentXP, perfectCards);
            } else {
                console.warn('LevelSystem not loaded, falling back to simple display');
                levelState = {
                    actualLevel: userData.current_level || 1,
                    progressInLevel: 0,
                    xpForNextLevel: 100,
                    isCapped: false,
                    displayProgress: 0
                };
            }

            // 更新等級
            const levelBadge = document.getElementById('user-level');
            if (levelBadge) {
                levelBadge.textContent = 'Lv. ' + levelState.actualLevel;
            }

            // 更新 XP 文字
            const xpText = document.getElementById('user-xp-text');
            if (xpText) {
                if (levelState.isCapped) {
                    xpText.textContent = `MAX (Need Perfect Card)`;
                } else {
                    xpText.textContent = `${levelState.progressInLevel.toLocaleString()} / ${levelState.xpForNextLevel.toLocaleString()}`;
                }
            }

            // 更新 XP 進度條
            const xpBar = document.getElementById('user-xp-bar');
            if (xpBar) {
                xpBar.style.width = `${Math.min(levelState.displayProgress, 100)}%`;

                // 處理金色閃爍 (Capped State)
                if (levelState.isCapped) {
                    xpBar.classList.add('capped-gold-shimmer');
                    xpBar.classList.remove('bg-black'); // Profile page default is black
                } else {
                    xpBar.classList.remove('capped-gold-shimmer');
                    xpBar.classList.add('bg-black'); // Restore default
                }
            }

            // 更新卡片數量
            const cardCount = document.getElementById('user-card-count');
            if (cardCount) {
                cardCount.textContent = userData.total_cards || 0;
            }
        }
    </script>
</body>

</html>
