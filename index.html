    <!-- Filter Modal -->

        <div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-zinc-900 rounded-t-xl overflow-hidden neo-border-thick transition-transform transform translate-y-full"

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // === Success Toast Logic ===
            const toastData = sessionStorage.getItem('newCardSuccess');
            const urlParams = new URLSearchParams(window.location.search);

            // 檢查是否有授權錯誤 (來自 init.js 的強制登出)
            if (urlParams.get('error') === 'unauthorized') {
                ModalSystem.alert('存取被拒', '抱歉，你不是本課程的學員，無法注冊或登入。若有問題，可聯係 ceceloveye@gmail.com');
                // 清除 URL 參數，避免重整時再次跳出
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // === 練習完成 Toast ===
            const practiceData = sessionStorage.getItem('practiceSession');
            if (practiceData) {
                try {
                    const session = JSON.parse(practiceData);
                    const toast = document.getElementById('success-toast');
                    const toastMsg = document.getElementById('toast-message');
                    const toastXp = document.getElementById('toast-xp');

                    if (toast && toastMsg && toastXp && session.questionsCompleted > 0) {
                        const correct = session.correctCount || 0;
                        const incorrect = session.incorrectCount || 0;
                        toastMsg.textContent = `完成 ${session.questionsCompleted} 題，對 ${correct} 錯 ${incorrect}`;
                        toastXp.textContent = `+${session.totalXP} XP`;

                        toast.classList.remove('hidden');
                        setTimeout(() => {
                            toast.classList.add('hidden');
                        }, 4000);
                    }
                } catch (e) {
                    console.error('Practice Toast Error:', e);
                }
                sessionStorage.removeItem('practiceSession');
            }

            // === 新增卡片 Toast ===
            if (toastData) {
                try {
                    const data = JSON.parse(toastData);
                    const toast = document.getElementById('success-toast');
                    const toastMsg = document.getElementById('toast-message');
                    const toastXp = document.getElementById('toast-xp');

                    if (toast && toastMsg && toastXp) {
                        if (data.term) {
                            toastMsg.textContent = `成功新增 : ${data.term}`;
                        } else {
                            toastMsg.textContent = `已批量生成 ${data.count} 張卡片`;
                        }
                        toastXp.textContent = `+${data.xp} XP`;

                        toast.classList.remove('hidden');

                        setTimeout(() => {
                            toast.classList.add('hidden');
                        }, 4000);
                    }
                } catch (e) {
                    console.error('Toast Error:', e);
                }
                sessionStorage.removeItem('newCardSuccess');
            }

            // === 變數宣告 ===
            const searchInput = document.getElementById('search-input');
            const tuneButton = document.getElementById('trigger-filter-btn');

            // Modal Elements
            const filterModal = document.getElementById('filter-modal');
            const filterBackdrop = document.getElementById('filter-backdrop');
            const filterContent = document.getElementById('filter-content');
            const closeFilterBtn = document.getElementById('close-filter');
            const categoryList = document.getElementById('category-list');
            const applyFilterBtn = document.getElementById('apply-filter');
            const clearFilterBtn = document.getElementById('clear-filter');

            // 狀態 — key 格式為 "subject|||chapter"，確保不同 subject 下同名 chapter 不會衝突
            let selectedPairs = new Set();      // 儲存選取的 subject+chapter 組合
            let expandedSubjects = new Set();   // 記錄哪些 subject 是展開的
            let groupedData = [];               // [{ subject, chapters: [...] }, ...]
            let currentSearchQuery = '';

            function pairKey(subject, chapter) { return subject + '|||' + chapter; }
            function parsePairKey(key) { const [s, c] = key.split('|||'); return { subject: s, chapter: c }; }

            // === Modal 操作 ===
            function openModal() {
                filterModal.classList.remove('hidden');
                setTimeout(() => {
                    filterContent.classList.remove('translate-y-full');
                }, 10);
                loadCategories();
            }

            function closeModal() {
                filterContent.classList.add('translate-y-full');
                setTimeout(() => {
                    filterModal.classList.add('hidden');
                }, 300);
            }

            // === 載入與渲染分類 ===
            async function loadCategories() {
                const userId = apiService.currentUser?.id;
                if (!userId) return;

                if (groupedData.length === 0) {
                    const result = await apiService.getGroupedCategories(userId);
                    if (result.success) {
                        groupedData = result.data;
                    } else {
                        categoryList.innerHTML = '<div class="text-red-500 text-center">載入失敗</div>';
                        return;
                    }
                }

                renderCategoryList();
            }

            function isSubjectFullySelected(group) {
                return group.chapters.every(ch => selectedPairs.has(pairKey(group.subject, ch)));
            }

            function isSubjectPartiallySelected(group) {
                return group.chapters.some(ch => selectedPairs.has(pairKey(group.subject, ch))) && !isSubjectFullySelected(group);
            }

            function renderCategoryList() {
                categoryList.innerHTML = '';
                if (groupedData.length === 0) {
                    categoryList.innerHTML = '<div class="text-center text-gray-500">目前沒有分類</div>';
                    return;
                }

                groupedData.forEach(group => {
                    const isExpanded = expandedSubjects.has(group.subject);
                    const isFullSelected = isSubjectFullySelected(group);
                    const isPartial = isSubjectPartiallySelected(group);

                    // === 大分類標頭 ===
                    const header = document.createElement('div');
                    header.className = `flex items-center justify-between p-3 mb-1 rounded-lg border-2 cursor-pointer transition-all ${isFullSelected ? 'border-primary bg-yellow-50 dark:bg-yellow-900/20' : isPartial ? 'border-primary/50 bg-yellow-50/50 dark:bg-yellow-900/10' : 'border-gray-200 bg-white dark:bg-zinc-800 dark:border-zinc-700'}`;

                    header.innerHTML = `
                        <div class="flex items-center gap-2 flex-1 min-w-0">
                            <span class="material-symbols-outlined text-base transition-transform ${isExpanded ? 'rotate-90' : ''}" style="font-size:18px">chevron_right</span>
                            <span class="font-black text-sm truncate ${isFullSelected || isPartial ? 'text-black dark:text-white' : 'text-gray-700 dark:text-gray-300'}">${group.subject}</span>
                            <span class="text-xs text-gray-400 whitespace-nowrap">(${group.chapters.length})</span>
                        </div>
                        <div data-role="checkbox" class="w-5 h-5 border-2 border-border-main flex items-center justify-center flex-shrink-0 ${isFullSelected ? 'bg-primary' : 'bg-white dark:bg-zinc-700'}">
                            ${isFullSelected ? '<span class="material-symbols-outlined text-sm font-bold">check</span>' : isPartial ? '<span class="block w-2.5 h-0.5 bg-primary"></span>' : ''}
                        </div>
                    `;

                    // 點整列：展開/收合
                    header.onclick = (e) => {
                        if (isExpanded) {
                            expandedSubjects.delete(group.subject);
                        } else {
                            expandedSubjects.add(group.subject);
                        }
                        renderCategoryList();
                    };

                    // 點 checkbox 區域：全選/全取消
                    const checkbox = header.querySelector('[data-role="checkbox"]');
                    checkbox.onclick = (e) => {
                        e.stopPropagation();
                        if (isFullSelected) {
                            group.chapters.forEach(ch => selectedPairs.delete(pairKey(group.subject, ch)));
                        } else {
                            group.chapters.forEach(ch => selectedPairs.add(pairKey(group.subject, ch)));
                        }
                        renderCategoryList();
                    };

                    categoryList.appendChild(header);

                    // === 次分類列表（展開時顯示）===
                    if (isExpanded) {
                        const subList = document.createElement('div');
                        subList.className = 'ml-6 mb-2';

                        group.chapters.forEach(ch => {
                            const key = pairKey(group.subject, ch);
                            const isChSelected = selectedPairs.has(key);
                            const item = document.createElement('div');
                            item.className = `flex items-center justify-between p-2.5 mb-1 rounded border-2 cursor-pointer transition-all ${isChSelected ? 'border-primary bg-yellow-50 dark:bg-yellow-900/20' : 'border-gray-100 bg-gray-50 dark:bg-zinc-700/50 dark:border-zinc-600'}`;
                            item.onclick = () => {
                                if (selectedPairs.has(key)) {
                                    selectedPairs.delete(key);
                                } else {
                                    selectedPairs.add(key);
                                }
                                renderCategoryList();
                            };

                            item.innerHTML = `
                                <span class="text-sm ${isChSelected ? 'font-bold text-black dark:text-white' : 'text-gray-600 dark:text-gray-300'}">${ch}</span>
                                <div class="w-4 h-4 border-2 border-border-main flex items-center justify-center flex-shrink-0 ${isChSelected ? 'bg-primary' : 'bg-white dark:bg-zinc-600'}">
                                    ${isChSelected ? '<span class="material-symbols-outlined font-bold" style="font-size:12px">check</span>' : ''}
                                </div>
                            `;
                            subList.appendChild(item);
                        });

                        categoryList.appendChild(subList);
                    }
                });
            }

            // === 搜尋與篩選邏輯 ===

            // === 更新章節快速篩選按鈕（根據 Modal 選擇結果） ===
            function updateChapterFilterButtons() {
                const filterContainer = document.getElementById('filter-buttons');
                if (!filterContainer) return;

                const chapterBtns = filterContainer.querySelectorAll('.filter-btn[data-filter^="chapter:"]');

                if (selectedPairs.size === 0) {
                    // 沒有篩選 → 顯示所有章節按鈕
                    chapterBtns.forEach(btn => btn.style.display = '');
                } else {
                    // 取得已選的章節名稱
                    const selectedChapters = new Set(
                        Array.from(selectedPairs).map(key => parsePairKey(key).chapter)
                    );

                    chapterBtns.forEach(btn => {
                        const chapter = btn.getAttribute('data-filter').replace('chapter:', '');
                        btn.style.display = selectedChapters.has(chapter) ? '' : 'none';
                    });
                }
            }

            async function applyFilter() {
                const userId = apiService.currentUser?.id;
                if (!userId) return;

                const cardsContainer = document.getElementById('cards-container');
                cardsContainer.innerHTML = `
                    <div class="col-span-2 text-center py-8 text-gray-400 flex flex-col items-center">
                        <img src="new2436.gif" alt="Loading..." class="w-16 h-16 object-contain mb-2">
                        <p class="text-xs">載入中...</p>
                    </div>
                `;

                // 更新章節快速篩選按鈕的顯示/隱藏
                updateChapterFilterButtons();

                // 將 selectedPairs 轉為 subject+chapter 組合
                let subjectChapterPairs = null;
                if (selectedPairs.size > 0) {
                    subjectChapterPairs = Array.from(selectedPairs).map(parsePairKey);
                }

                const options = {
                    userId: userId,
                    page: 1, // 篩選後重置為第一頁
                    limit: 100, // 增加數量
                    searchQuery: currentSearchQuery || null,
                    subjectChapterPairs: subjectChapterPairs
                };

                const result = await apiService.getAccessibleQuestions(userId, options);

                if (result.success) {
                    const container = document.getElementById('cards-container');

                    if (result.data.cards.length === 0) {
                        container.innerHTML = `
                            <div class="col-span-2 flex flex-col items-center justify-center py-12 opacity-50">
                                <span class="material-symbols-outlined text-4xl mb-2">inbox</span>
                                <p class="text-sm font-bold">沒有找到卡片</p>
                            </div>
                        `;
                    } else {
                        // 使用 init.js 定義的 renderCardItem 以保持樣式一致
                        if (typeof renderCardItem === 'function') {
                            container.innerHTML = result.data.cards.map(card => renderCardItem(card)).join('');
                        } else {
                            console.error('renderCardItem not found');
                            // Fallback if global function missing
                            container.innerHTML = result.data.cards.map(c => `<div>${c.english_term}</div>`).join('');
                        }

                        // 重新綁定事件 (愛心、編輯、刪除)
                        if (typeof bindCardActions === 'function') {
                            bindCardActions(result.data.cards);
                        }
                    }

                    // 更新上方計數（總題數 + 答對題數）
                    const countEl = document.getElementById('user-card-count');
                    if (countEl) countEl.textContent = result.data.pagination.totalItems;

                    // 計算篩選後的答對題數
                    const correctCount = result.data.cards.filter(card => {
                        const progress = card.progress;
                        return progress && (progress.is_correct === true || (progress.times_correct || 0) > 0);
                    }).length;
                    const correctEl = document.getElementById('user-correct-count');
                    if (correctEl) correctEl.textContent = correctCount;
                } else {
                    cardsContainer.innerHTML = '<div class="col-span-2 text-center text-red-500">載入失敗</div>';
                }
            }

            // === Event Listeners ===
            // 1. Filter Trigger (Tune Button)
            if (tuneButton) {
                tuneButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    openModal();
                });
            }

            // 2. Close / Backdrop
            closeFilterBtn.onclick = closeModal;
            filterBackdrop.onclick = closeModal;

            // 3. Apply
            applyFilterBtn.onclick = () => {
                applyFilter();
                closeModal();
            };

            // 4. Clear
            clearFilterBtn.onclick = () => {
                selectedPairs.clear();
                renderCategoryList();
                applyFilter();
            };

            // 5. Search Input (Debounce)
            let debounceTimer;
            searchInput.addEventListener('input', (e) => {
                currentSearchQuery = e.target.value.trim();
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    applyFilter(); // 搜尋也是一種篩選
                }, 500);
            });

            // 編輯按鈕 (保留原本邏輯)
            const editButtons = document.querySelectorAll('[data-edit="true"]');
            editButtons.forEach(button => {
                button.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.location.href = 'edit.html';
                });
            });
        });
    </script>

    <!-- ==================== Supabase 整合 ==================== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service（config.js 已在 <head> 載入） -->
    <script src="js/api-service.js"></script>
    <script src="js/init.js"></script>
    <script src="js/modal-system.js"></script>
    <script src="js/components/bottom-nav.js"></script>

    <!-- Onboarding System -->
    <script src="js/onboarding-system.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check for onboarding
            if (typeof OnboardingSystem !== 'undefined') {
                OnboardingSystem.checkAndShow();
            }
        });

        // 管理員按鈕顯示控制 - 等待應用初始化完成後再檢查
        function showAdminButtonIfAllowed() {
            const currentUser = apiService?.currentUser;
            if (currentUser && typeof RoleManager !== 'undefined' && RoleManager.isAdmin()) {
                const adminBtn = document.getElementById('admin-create-btn');
                if (adminBtn) {
                    adminBtn.classList.remove('hidden');
                }
            }
        }

        // 監聽應用初始化完成事件
        window.addEventListener('appInitialized', showAdminButtonIfAllowed);

        // 如果應用已經初始化完成（可能事件已經觸發過了），立即檢查
        if (typeof appInitialized !== 'undefined' && appInitialized) {
            showAdminButtonIfAllowed();
        }
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
