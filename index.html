<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VibeCoding 簡約首頁列表</title>

    <!-- 登入檢查 -->
    <script>
        // 檢查是否已登入，如果沒有則導向 login.html
        if (!localStorage.getItem('userNickname') || !localStorage.getItem('userConsent')) {
            window.location.href = 'login.html';
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd400",
                        "background-light": "#f7f7f7",
                        "background-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px #000000;
        }
        .neo-shadow-sm {
            box-shadow: 2px 2px 0px 0px #000000;
        }
        .neo-border {
            border: 2px solid #000000;
        }
        .neo-border-thick {
            border: 3px solid #000000;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: max(884px, 100dvh);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        a.material-symbols-outlined {
            text-decoration: none;
            display: inline-block;
        }
        

        .capped-gold-shimmer {
            position: relative;
            overflow: hidden;
            background-color: #ffd400 !important; /* Force gold connection */
        }
        .capped-gold-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            100% {
                left: 200%;
            }
        }
    </style>
    <!-- Add LevelSystem Script -->
    <script src="js/level-system.js"></script>

<body class="bg-zinc-100 dark:bg-background-dark text-[#1a1a1a] dark:text-white overflow-hidden">
    <div class="relative flex h-screen w-full flex-col max-w-[430px] mx-auto border-x-2 border-black/5">
        <header
            class="flex-none bg-zinc-100 dark:bg-background-dark border-b-2 border-black px-4 py-4 flex items-center justify-between z-10">
            <div class="flex items-center gap-2">
                <div class="bg-primary neo-border p-1 flex items-center justify-center">
                    <span class="material-symbols-outlined text-black font-bold">terminal</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight uppercase italic">VIBECODING</h1>
            </div>
            <a href="vibe-coding/build.html"
                class="w-10 h-10 neo-border flex items-center justify-center bg-primary text-black neo-shadow-sm active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all">
                <span class="material-symbols-outlined font-bold">add</span>
            </a>
        </header>

        <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-28 no-scrollbar">
            <div class="bg-black border-[3px] border-primary p-4 flex items-center gap-4">
                <div
                    class="w-16 h-16 border-[3px] border-primary flex items-center justify-center bg-black flex-shrink-0">
                    <div class="w-10 h-10 bg-primary relative overflow-hidden">
                        <div class="absolute top-1 left-1 right-1 h-3 bg-black"></div>
                        <div class="absolute bottom-4 left-2 w-1.5 h-1.5 bg-black"></div>
                        <div class="absolute bottom-4 right-2 w-1.5 h-1.5 bg-black"></div>
                        <div class="absolute bottom-1.5 left-3 right-3 h-1 bg-black"></div>
                    </div>
                </div>
                <div class="flex-1 space-y-1">
                    <div class="flex items-end justify-between">
                        <div id="user-level"
                            class="text-primary text-2xl font-black italic tracking-tighter leading-none">Lv. -</div>
                        <div id="user-xp-text" class="text-[12px] font-bold text-primary italic pr-1">-/-</div>
                    </div>
                    <div class="w-full h-2 border border-zinc-600 bg-zinc-900 overflow-hidden">
                        <div id="user-xp-bar" class="h-full bg-primary" style="width: 0%;"></div>
                    </div>
                    <div id="perfect-card-requirement"
                        class="text-[10px] font-bold text-white tracking-widest uppercase opacity-80">升級資格：滿分卡 - / -
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-black italic tracking-tighter uppercase">單字卡庫</h2>
                    <span
                        class="text-[10px] font-bold opacity-50 bg-zinc-200 dark:bg-zinc-800 px-2 py-1 neo-border"><span
                            id="user-card-count">-</span>
                        <span id="card-label">CARDS</span></span>
                </div>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input
                            class="w-full h-12 neo-border-thick px-10 bg-white dark:bg-zinc-800 focus:outline-none text-sm font-bold"
                            placeholder="搜尋術語..." type="text" />
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-xl">search</span>
                    </div>
                    <button
                        class="w-12 h-12 neo-border-thick bg-white dark:bg-zinc-800 flex items-center justify-center neo-shadow-sm active:shadow-none active:translate-x-[1px] active:translate-y-[1px]">
                        <span class="material-symbols-outlined">tune</span>
                    </button>
                </div>
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="filter-buttons">
                    <button data-filter="all"
                        class="filter-btn flex-none px-4 py-2 neo-border-thick bg-primary font-black text-xs neo-shadow-sm active">全部</button>
                    <button data-filter="unfamiliar"
                        class="filter-btn flex-none px-4 py-2 neo-border-thick bg-white dark:bg-zinc-800 font-bold text-xs neo-shadow-sm text-red-500">❤</button>
                    <button data-filter="lv1"
                        class="filter-btn flex-none px-5 py-2 neo-border-thick bg-white dark:bg-zinc-800 font-bold text-xs neo-shadow-sm">Lv.1</button>
                    <button data-filter="lv2"
                        class="filter-btn flex-none px-5 py-2 neo-border-thick bg-white dark:bg-zinc-800 font-bold text-xs neo-shadow-sm">Lv.2</button>
                    <button data-filter="lv3"
                        class="filter-btn flex-none px-5 py-2 neo-border-thick bg-white dark:bg-zinc-800 font-bold text-xs neo-shadow-sm">Lv.3</button>
                    <button data-filter="lv4"
                        class="filter-btn flex-none px-5 py-2 neo-border-thick bg-white dark:bg-zinc-800 font-bold text-xs neo-shadow-sm">Lv.4</button>
                    <button data-filter="lv5"
                        class="filter-btn flex-none px-5 py-2 neo-border-thick bg-white dark:bg-zinc-800 font-bold text-xs neo-shadow-sm">Lv.5</button>
                </div>
                <div id="cards-container" class="grid grid-cols-2 gap-4">
                    <!-- 卡片將由 JavaScript 動態載入 -->
                    <div class="col-span-2 text-center py-8 text-gray-400">
                        <span class="material-symbols-outlined animate-spin">progress_activity</span>
                        <p class="text-xs mt-2">載入中...</p>
                    </div>
                </div>
            </div>
        </main>
        <nav
            class="fixed bottom-0 w-full max-w-[430px] bg-white dark:bg-zinc-900 border-t-thick border-black flex justify-around items-center px-2 py-4 pb-8 z-50">
            <button class="flex flex-col items-center gap-1 group">
                <div
                    class="size-14 -mt-8 flex items-center justify-center neo-border-thick neo-shadow bg-primary group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                    <span class="material-symbols-outlined text-3xl font-black">style</span>
                </div>
                <span class="text-[10px] font-black uppercase">單字卡</span>
            </button>
            <button onclick="window.location.href='calendar.html'" class="flex flex-col items-center gap-1 group">
                <div
                    class="size-11 flex items-center justify-center neo-border neo-shadow-sm bg-white group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                    <span class="material-symbols-outlined text-2xl font-bold">calendar_month</span>
                </div>
                <span class="text-[10px] font-black uppercase">學習曆</span>
            </button>
            <button onclick="window.location.href='rank.html'" class="flex flex-col items-center gap-1 group">
                <div
                    class="size-11 flex items-center justify-center neo-border neo-shadow-sm bg-white group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                    <span class="material-symbols-outlined text-2xl font-bold">trophy</span>
                </div>
                <span class="text-[9px] font-black uppercase">排行榜</span>
            </button>
            <button onclick="window.location.href='profile.html'" class="flex flex-col items-center gap-1 group">
                <div
                    class="size-11 flex items-center justify-center neo-border neo-shadow-sm bg-white group-active:translate-y-0.5 group-active:translate-x-0.5 group-active:shadow-none">
                    <span class="material-symbols-outlined text-2xl font-bold">person</span>
                </div>
                <span class="text-[9px] font-black uppercase">個人</span>
            </button>
        </nav>
    </div>

    <script>
        // 篩選按鈕點擊功能
        document.addEventListener('DOMContentLoaded', function () {
            const filterButtons = document.querySelectorAll('.filter-btn');

            filterButtons.forEach(button => {
                button.addEventListener('click', function () {
                    // 移除所有按鈕的 active 狀態
                    filterButtons.forEach(btn => {
                        btn.classList.remove('active', 'bg-primary', 'font-black');
                        btn.classList.add('bg-white', 'dark:bg-zinc-800', 'font-bold');
                    });

                    // 為當前點擊的按鈕添加 active 狀態
                    this.classList.add('active', 'bg-primary', 'font-black');
                    this.classList.remove('bg-white', 'dark:bg-zinc-800', 'font-bold');

                    // 這裡可以添加篩選卡片的邏輯
                    const filterValue = this.getAttribute('data-filter');
                    console.log('選擇的篩選器:', filterValue);
                    // 未來可以根據 filterValue 來篩選顯示的卡片
                });
            });
        });

        // 編輯按鈕點擊功能
        document.addEventListener('DOMContentLoaded', function () {
            const editButtons = document.querySelectorAll('[data-edit="true"]');

            editButtons.forEach(button => {
                button.addEventListener('click', function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                    window.location.href = 'edit.html';
                });
            });
        });
    </script>

    <!-- ==================== Supabase 整合 ==================== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/init.js"></script>

</body>

</html>
