<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T002 API 測試 - 今日新增熟練題數</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-value.highlight {
            color: #f39c12;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎯 T002 API 測試</h1>
            <p class="subtitle">測試「今日新增熟練題數」API 功能</p>

            <div class="input-group">
                <label for="userId">用戶 ID (UUID)</label>
                <input
                    type="text"
                    id="userId"
                    placeholder="例如: 123e4567-e89b-12d3-a456-426614174000"
                    value="">
            </div>

            <button onclick="testAPI()">🚀 執行測試</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">載入中...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h2>📊 測試結果</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">今日新增熟練題數</div>
                        <div class="stat-value highlight" id="todayMastered">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">昨日新增熟練題數</div>
                        <div class="stat-value" id="yesterdayMastered">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">本週累積熟練題數</div>
                        <div class="stat-value" id="weekMastered">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">連續天數</div>
                        <div class="stat-value highlight" id="consecutiveDays">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        const apiService = new ApiService();
        let initialized = false;

        // 自動初始化
        (async function() {
            const result = await apiService.initialize();
            if (result.success) {
                initialized = true;
                console.log('✅ API Service 初始化成功');

                // 如果有當前用戶，自動填入 ID
                if (result.user && result.user.id) {
                    document.getElementById('userId').value = result.user.id;
                }
            } else {
                showError('API Service 初始化失敗: ' + (result.error || '未知錯誤'));
            }
        })();

        async function testAPI() {
            if (!initialized) {
                showError('API Service 尚未初始化');
                return;
            }

            const userId = document.getElementById('userId').value.trim();

            if (!userId) {
                showError('請輸入用戶 ID');
                return;
            }

            // 隱藏之前的結果
            hideError();
            hideResult();
            showLoading();

            try {
                console.log('🔍 呼叫 getTodayMasteredCount API...');
                const result = await apiService.getTodayMasteredCount(userId);

                hideLoading();

                if (result.success) {
                    console.log('✅ API 回傳成功:', result.data);
                    showResult(result.data);
                } else {
                    showError('API 錯誤: ' + (result.error || '未知錯誤'));
                }
            } catch (error) {
                hideLoading();
                showError('執行錯誤: ' + error.message);
                console.error(error);
            }
        }

        function showResult(data) {
            document.getElementById('todayMastered').textContent = data.todayMastered;
            document.getElementById('yesterdayMastered').textContent = data.yesterdayMastered;
            document.getElementById('weekMastered').textContent = data.weekMastered;
            document.getElementById('consecutiveDays').textContent = data.consecutiveDays;
            document.getElementById('result').classList.add('show');
        }

        function hideResult() {
            document.getElementById('result').classList.remove('show');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        // 監聽 Enter 鍵
        document.getElementById('userId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testAPI();
            }
        });
    </script>
</body>
</html>
