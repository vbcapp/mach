<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T004 API 測試 - 錯誤選項分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f5576c;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 150px;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .summary-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .summary-card .big-number {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .question-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border: 3px solid #e74c3c;
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .question-meta {
            flex: 1;
        }

        .question-subject {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .question-chapter {
            color: #666;
            font-size: 13px;
            margin-top: 3px;
        }

        .error-badge {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(231, 76, 60, 0.3);
        }

        .question-text {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-left: 10px;
        }

        .answer-analysis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .answer-box {
            background: #fff5f5;
            border: 2px solid #e74c3c;
            border-radius: 8px;
            padding: 15px;
        }

        .answer-box.correct {
            background: #f0fff4;
            border-color: #27ae60;
        }

        .answer-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .answer-content {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
        }

        .answer-count {
            font-size: 13px;
            color: #e74c3c;
            font-weight: bold;
        }

        .answer-count.correct-count {
            color: #27ae60;
        }

        .wrong-distribution {
            background: #fff5f5;
            border-radius: 8px;
            padding: 15px;
            margin-left: 10px;
        }

        .wrong-distribution h4 {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .wrong-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ffe6e6;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-answer {
            font-size: 14px;
            color: #333;
        }

        .wrong-count {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .empty-state p {
            font-size: 16px;
            color: #999;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5576c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .type-badge {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎯 T004 API 測試</h1>
            <p class="subtitle">測試「錯誤選項分析」API 功能 - 找出學員最常選錯的答案</p>

            <div class="input-row">
                <div class="input-group">
                    <label for="userId">用戶 ID (UUID)</label>
                    <input
                        type="text"
                        id="userId"
                        placeholder="例如: 123e4567-e89b-12d3-a456-426614174000"
                        value="">
                </div>

                <div class="input-group">
                    <label for="limit">顯示題數</label>
                    <input
                        type="number"
                        id="limit"
                        value="5"
                        min="1"
                        max="20">
                </div>
            </div>

            <button onclick="testAPI()">🚀 執行測試</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">載入中...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <h2>📊 測試結果</h2>

                <div class="summary-card">
                    <h3>找到常錯題目</h3>
                    <div class="big-number" id="questionCount">0</div>
                    <p style="opacity: 0.9;">個題目需要特別注意</p>
                </div>

                <div id="questionList" class="question-list"></div>

                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="icon">🎉</div>
                    <h3>太棒了！</h3>
                    <p>目前沒有錯誤記錄，繼續保持！</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        const apiService = new ApiService();
        let initialized = false;

        // 自動初始化
        (async function() {
            const result = await apiService.initialize();
            if (result.success) {
                initialized = true;
                console.log('✅ API Service 初始化成功');

                // 如果有當前用戶，自動填入 ID
                if (result.user && result.user.id) {
                    document.getElementById('userId').value = result.user.id;
                }
            } else {
                showError('API Service 初始化失敗: ' + (result.error || '未知錯誤'));
            }
        })();

        async function testAPI() {
            if (!initialized) {
                showError('API Service 尚未初始化');
                return;
            }

            const userId = document.getElementById('userId').value.trim();
            const limit = parseInt(document.getElementById('limit').value);

            if (!userId) {
                showError('請輸入用戶 ID');
                return;
            }

            if (!limit || limit < 1) {
                showError('請輸入有效的題數（>= 1）');
                return;
            }

            // 隱藏之前的結果
            hideError();
            hideResult();
            showLoading();

            try {
                console.log('🔍 呼叫 getWrongAnswerPatterns API...');
                const result = await apiService.getWrongAnswerPatterns(userId, limit);

                hideLoading();

                if (result.success) {
                    console.log('✅ API 回傳成功:', result.data);
                    showResult(result.data);
                } else {
                    showError('API 錯誤: ' + (result.error?.message || result.error || '未知錯誤'));
                }
            } catch (error) {
                hideLoading();
                showError('執行錯誤: ' + error.message);
                console.error(error);
            }
        }

        function showResult(data) {
            const questionList = document.getElementById('questionList');
            const emptyState = document.getElementById('emptyState');
            const questionCount = document.getElementById('questionCount');

            // 更新題目數量
            questionCount.textContent = data.length;

            if (data.length === 0) {
                questionList.innerHTML = '';
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                questionList.innerHTML = data.map((item, index) => {
                    return `
                        <div class="question-card">
                            <div class="question-header">
                                <div class="question-meta">
                                    <span class="question-subject">${escapeHtml(item.subject || '未分類')}</span>
                                    ${item.questionType ? `<span class="type-badge">${escapeHtml(item.questionType)}</span>` : ''}
                                    <div class="question-chapter">📖 ${escapeHtml(item.chapter || '通用')}</div>
                                </div>
                                <div class="error-badge">
                                    錯誤 ${item.timesWrong} 次
                                </div>
                            </div>

                            <div class="question-text">
                                <strong>Q${index + 1}:</strong> ${escapeHtml(item.question)}
                            </div>

                            <div class="answer-analysis">
                                <div class="answer-box correct">
                                    <div class="answer-label">✅ 正確答案</div>
                                    <div class="answer-content">${formatAnswer(item.correctAnswer)}</div>
                                </div>

                                <div class="answer-box">
                                    <div class="answer-label">❌ 最常選錯</div>
                                    <div class="answer-content">${formatAnswer(item.mostCommonWrongAnswer)}</div>
                                </div>
                            </div>

                            ${renderWrongDistribution(item.wrongAnswerCounts)}
                        </div>
                    `;
                }).join('');
            }

            document.getElementById('result').classList.add('show');
        }

        function renderWrongDistribution(wrongCounts) {
            const entries = Object.entries(wrongCounts);
            if (entries.length === 0) return '';

            const items = entries
                .sort((a, b) => b[1] - a[1]) // 按次數排序
                .map(([answer, count]) => `
                    <div class="wrong-item">
                        <span class="wrong-answer">${escapeHtml(answer)}</span>
                        <span class="wrong-count">${count} 次</span>
                    </div>
                `).join('');

            return `
                <div class="wrong-distribution">
                    <h4>📊 錯誤選項分布</h4>
                    ${items}
                </div>
            `;
        }

        function formatAnswer(answer) {
            if (answer === null || answer === undefined) {
                return '<span style="color: #999;">無</span>';
            }

            if (Array.isArray(answer)) {
                return escapeHtml(answer.join(', '));
            }

            return escapeHtml(String(answer));
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function hideResult() {
            document.getElementById('result').classList.remove('show');
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        // 監聽 Enter 鍵
        document.getElementById('userId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testAPI();
            }
        });

        document.getElementById('limit').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                testAPI();
            }
        });
    </script>
</body>
</html>
