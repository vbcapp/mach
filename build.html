<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VibeCoding - Generate Term Flashcard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FFD600",
                        "background-light": "#8E8E8E",
                    },
                    fontFamily: {
                        display: ["Inter", "system-ui", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px #000000;
        }
        .neo-border {
            border: 3px solid #000000;
        }
        .neo-border-thick {
            border: 4px solid #000000;
        }
        .modal-top-radius {
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="font-display bg-background-light min-h-screen flex flex-col">
    <div class="flex-1 bg-black/30 p-6 flex justify-between items-start">
        <div class="w-12 h-12 rounded-full bg-white/20"></div>
        <div class="w-12 h-12 rounded-full bg-primary/60 flex items-center justify-center">
            <span class="material-symbols-outlined text-black/40">search</span>
        </div>
    </div>
    <div class="w-full bg-white modal-top-radius border-t-[3px] border-x-[3px] border-black flex flex-col">
        <div class="bg-primary pt-6 pb-6 border-b-[3px] border-black px-6">
            <div class="flex justify-center mb-4">
                <div class="w-12 h-1.5 bg-white/60 rounded-full"></div>
            </div>
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-black italic tracking-tight text-black">生成術語卡片</h1>
                <a href="index.html"
                    class="w-10 h-10 neo-border-thick bg-white flex items-center justify-center cursor-pointer">
                    <span class="material-symbols-outlined text-black font-black">close</span>
                </a>
            </div>
        </div>
        <div class="px-6 pt-6 pb-6 space-y-6 bg-white">
            <div class="space-y-4">
                <label class="block text-lg font-black text-slate-800">
                    輸入你想學習的程式設計專有名詞
                </label>
                <div class="relative">
                    <input
                        class="w-full h-16 px-4 text-base font-bold border-[3px] border-[#2B66FF] focus:ring-0 focus:outline-none bg-white text-black placeholder:text-gray-400 placeholder:font-normal"
                        type="text" placeholder="請輸入專有名詞，例如：API、DOM... " />
                </div>
            </div>
            <div class="space-y-3 pb-4">

                <button class="w-full py-5 text-xl font-black neo-border-thick bg-primary neo-shadow text-black">
                    確認生成
                </button>
                <a href="index.html"
                    class="w-full py-5 text-xl font-black neo-border-thick bg-white text-black block text-center cursor-pointer">
                    取消
                </a>
            </div>
        </div>
    </div>

</body>

</html>
