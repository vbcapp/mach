<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="考試神器" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="智慧考試練習平台，隨時隨地刷題備考" />
    <meta property="og:title" content="考試神器" />
    <meta property="og:description" content="智慧考試練習平台，隨時隨地刷題備考" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="考試神器" />
    <meta name="twitter:description" content="智慧考試練習平台，隨時隨地刷題備考" />
    <!-- manifest 由 config.js 動態產生 -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>考試神器 - 答題次數排行榜</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&amp;family=Space+Mono:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(243, 244, 246, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-overlay.hidden {
            display: none;
        }
    </style>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/level-system.js"></script>
    <script src="js/api-service.js"></script>
</head>

<body class="bg-surface dark:bg-background-dark text-black min-h-screen">
    <!-- 加入手機版置中容器 -->
    <div class="vibe-app-shell bg-background-light dark:bg-zinc-900 shadow-2xl flex flex-col min-h-screen pb-12">
        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="text-center">
                <span class="material-symbols-outlined text-5xl animate-spin">progress_activity</span>
                <p class="mt-4 font-bold text-lg">載入排行榜中...</p>
            </div>
        </div>

        <header class="p-6">
            <div class="flex items-center gap-4 mb-6">
                <a href="rank.html"
                    class="neo-border bg-white p-2 flex items-center justify-center active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-transform">
                    <span class="material-symbols-outlined text-2xl">arrow_back</span>
                </a>
                <h1 class="text-3xl font-black">答題次數排行榜</h1>
            </div>

            <!-- 每日/每週切換 -->
            <div class="flex gap-2 mb-4">
                <button id="tab-daily" onclick="switchPeriod('daily')"
                    class="flex-1 neo-border py-3 px-4 font-black text-center transition-all tab-active">
                    今日
                </button>
                <button id="tab-weekly" onclick="switchPeriod('weekly')"
                    class="flex-1 neo-border py-3 px-4 font-black text-center transition-all tab-inactive">
                    本週
                </button>
            </div>

            <div class="space-y-1">
                <p id="total-users" class="text-lg font-bold">共 -- 位學習者參與</p>
                <p id="last-update" class="text-sm font-bold text-gray-500">最後更新：--</p>
            </div>
        </header>

        <main class="px-6 space-y-8">
            <!-- 前三名頒獎台 -->
            <div id="podium-container" class="flex items-end justify-center gap-3 pt-4">
                <!-- 第二名 -->
                <div id="rank-2-container" class="flex-1 flex flex-col items-center">
                    <div id="rank-2-card"
                        class="neo-card bg-white w-full pt-6 pb-4 flex flex-col items-center relative">
                        <div
                            class="absolute -top-6 neo-border bg-white rounded-full w-12 h-12 flex items-center justify-center font-black text-xl">
                            2</div>
                        <div id="rank-2-avatar"
                            class="w-12 h-12 neo-border bg-gray-200 rounded-full mb-2 overflow-hidden">
                            <img alt="avatar" src="" class="w-full h-full object-cover" />
                        </div>
                        <span id="rank-2-name" class="font-black text-xs truncate w-full text-center px-1">--</span>
                        <span id="rank-2-count" class="font-black text-2xl italic leading-tight">--</span>
                        <span id="rank-2-level" class="text-[10px] font-bold text-gray-500">Lv.--</span>
                    </div>
                </div>

                <!-- 第一名 (冠軍) -->
                <div id="rank-1-container" class="flex-1 flex flex-col items-center scale-110 z-10">
                    <div id="rank-1-card"
                        class="neo-card-lg bg-primary w-full pt-8 pb-6 flex flex-col items-center relative">
                        <div
                            class="absolute -top-8 neo-border bg-primary rounded-full w-14 h-14 flex items-center justify-center font-black text-2xl">
                            <span class="material-symbols-outlined text-3xl">workspace_premium</span>
                        </div>
                        <div id="rank-1-avatar" class="w-16 h-16 neo-border bg-white rounded-full mb-2 overflow-hidden">
                            <img alt="avatar" src="" class="w-full h-full object-cover" />
                        </div>
                        <span id="rank-1-name" class="font-black text-sm truncate w-full text-center px-1">--</span>
                        <span id="rank-1-count" class="font-black text-4xl italic leading-tight">--</span>
                        <span id="rank-1-level" class="text-[11px] font-bold text-black/60">Lv.--</span>
                    </div>
                </div>

                <!-- 第三名 -->
                <div id="rank-3-container" class="flex-1 flex flex-col items-center">
                    <div id="rank-3-card"
                        class="neo-card bg-white w-full pt-6 pb-4 flex flex-col items-center relative">
                        <div
                            class="absolute -top-6 neo-border bg-white rounded-full w-12 h-12 flex items-center justify-center font-black text-xl">
                            3</div>
                        <div id="rank-3-avatar"
                            class="w-12 h-12 neo-border bg-gray-100 rounded-full mb-2 overflow-hidden">
                            <img alt="avatar" src="" class="w-full h-full object-cover" />
                        </div>
                        <span id="rank-3-name" class="font-black text-xs truncate w-full text-center px-1">--</span>
                        <span id="rank-3-count" class="font-black text-2xl italic leading-tight">--</span>
                        <span id="rank-3-level" class="text-[10px] font-bold text-gray-500">Lv.--</span>
                    </div>
                </div>
            </div>

            <!-- 第 4 名以後的列表 -->
            <div id="rank-list" class="space-y-4">
                <!-- 動態渲染 -->
            </div>

            <!-- 底部統計區 -->
            <div id="stats-container" class="grid grid-cols-2 gap-4">
                <div class="neo-card bg-white p-5">
                    <h4 class="text-xs font-black text-gray-500 mb-1">我的排名</h4>
                    <div class="flex items-baseline gap-1">
                        <span id="my-rank" class="text-2xl font-black">#--</span>
                    </div>
                </div>
                <div class="neo-card bg-white p-5">
                    <h4 id="my-count-label" class="text-xs font-black text-gray-500 mb-1">今日答題</h4>
                    <div class="flex items-baseline gap-1">
                        <span id="my-count" class="text-2xl font-black">0</span>
                        <span class="text-sm font-bold text-gray-500">題</span>
                    </div>
                </div>
            </div>
        </main>

        <script>
            // 預設頭像
            const DEFAULT_AVATAR = 'https://lh3.googleusercontent.com/aida-public/AB6AXuCFkz4f23tCsJx2XoWDwRbqOuT7ykrttxTJpEBUBj7buLZ29cFWTodfR05lCnqUVLh3ryGm95QIuMgz8Ut0bpEEuzJ9f89UpWhesieG9w93R2Fsh_3QgrvRu7hyTQXRdBvHIThU-UpRjQwE236gxRaLPmkIISJuouE3wQsycoWG8cb1CJHPoxt4pux1BXWyJhcntBJqar-6xrur66Khwxp5zPrB3dZ-SoKwcDubog8SekixtpZtWO9F63OMvpmxSGtOl6uykNrf0si3';

            let currentPeriod = 'daily';
            let currentUserId = null;

            document.addEventListener('DOMContentLoaded', async () => {
                try {
                    await apiService.initialize();
                    currentUserId = apiService.currentUser?.id;
                    await loadLeaderboard('daily');
                } catch (error) {
                    console.error('初始化錯誤:', error);
                    document.getElementById('loading-overlay').classList.add('hidden');
                }
            });

            async function switchPeriod(period) {
                if (period === currentPeriod) return;

                currentPeriod = period;

                // 更新 Tab 樣式
                document.getElementById('tab-daily').className =
                    `flex-1 neo-border py-3 px-4 font-black text-center transition-all ${period === 'daily' ? 'tab-active' : 'tab-inactive'}`;
                document.getElementById('tab-weekly').className =
                    `flex-1 neo-border py-3 px-4 font-black text-center transition-all ${period === 'weekly' ? 'tab-active' : 'tab-inactive'}`;

                // 顯示 loading
                document.getElementById('loading-overlay').classList.remove('hidden');

                await loadLeaderboard(period);
            }

            async function loadLeaderboard(period) {
                const loadingOverlay = document.getElementById('loading-overlay');
                const podiumContainer = document.getElementById('podium-container');
                const rankList = document.getElementById('rank-list');

                try {
                    const result = await apiService.getAnswerCountLeaderboard(currentUserId, period);

                    if (!result.success) {
                        throw new Error(result.error?.message || '載入失敗');
                    }

                    const { data: users, totalParticipants, currentUserRank, currentUserData, periodLabel } = result;

                    // 更新統計標籤
                    document.getElementById('my-count-label').textContent = `${periodLabel}答題`;

                    // 更新總人數與時間
                    document.getElementById('total-users').textContent = `共 ${totalParticipants.toLocaleString()} 位學習者參與`;
                    document.getElementById('last-update').textContent = `最後更新：${new Date().toLocaleString('zh-TW')}`;

                    // 重置頒獎台顯示
                    resetPodium();

                    // 渲染邏輯
                    if (totalParticipants === 0) {
                        podiumContainer.innerHTML = `<p class="text-center text-gray-500 py-8">${periodLabel}還沒有人答題</p>`;
                    } else if (users.length === 1) {
                        document.getElementById('rank-2-container')?.classList.add('hidden');
                        document.getElementById('rank-3-container')?.classList.add('hidden');
                        document.getElementById('rank-1-container')?.classList.remove('flex-1');
                        document.getElementById('rank-1-container')?.classList.add('w-48');
                        renderPodiumUser(1, users[0], currentUserId);
                    } else if (users.length === 2) {
                        document.getElementById('rank-3-container')?.classList.add('hidden');
                        renderPodiumUser(1, users[0], currentUserId);
                        renderPodiumUser(2, users[1], currentUserId);
                    } else {
                        renderPodiumUser(1, users[0], currentUserId);
                        renderPodiumUser(2, users[1], currentUserId);
                        renderPodiumUser(3, users[2], currentUserId);
                    }

                    // 渲染第 4 名以後
                    const listUsers = users.slice(3, 10);
                    let listHTML = '';

                    listUsers.forEach((user, index) => {
                        const rank = index + 4;
                        const isCurrentUser = user.id === currentUserId;
                        listHTML += renderListItem(rank, user, isCurrentUser);
                    });

                    // 如果當前用戶不在前 10 名，額外顯示
                    if (currentUserRank > 10 && currentUserData) {
                        listHTML += renderListItem(currentUserRank, currentUserData, true);
                    }

                    rankList.innerHTML = listHTML;

                    // 更新底部統計
                    if (currentUserRank > 0) {
                        document.getElementById('my-rank').textContent = `#${currentUserRank}`;
                    } else {
                        document.getElementById('my-rank').textContent = '--';
                    }

                    // 我的答題次數
                    document.getElementById('my-count').textContent = currentUserData?.answer_count || 0;

                } catch (error) {
                    console.error('排行榜載入錯誤:', error);
                    rankList.innerHTML = `<p class="text-center text-red-500 py-8">載入失敗：${error.message}</p>`;
                } finally {
                    loadingOverlay.classList.add('hidden');
                }
            }

            function resetPodium() {
                // 重置所有容器
                ['rank-1-container', 'rank-2-container', 'rank-3-container'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.classList.remove('hidden', 'w-48');
                        if (id === 'rank-1-container') {
                            el.classList.add('flex-1');
                        }
                    }
                });
            }

            function renderPodiumUser(rank, user, currentUserId) {
                const isCurrentUser = user.id === currentUserId;
                const avatar = user.avatar_url || DEFAULT_AVATAR;

                document.getElementById(`rank-${rank}-avatar`).querySelector('img').src = avatar;
                document.getElementById(`rank-${rank}-name`).textContent = user.username || '無名氏';
                document.getElementById(`rank-${rank}-count`).textContent = user.answer_count;
                document.getElementById(`rank-${rank}-level`).textContent = `Lv.${user.actualLevel}`;

                if (isCurrentUser) {
                    const shimmerClass = (rank === 1) ? 'black-shimmer' : 'capped-shimmer';

                    document.getElementById(`rank-${rank}-name`).classList.add(shimmerClass);
                    document.getElementById(`rank-${rank}-level`).classList.add(shimmerClass);
                    document.getElementById(`rank-${rank}-card`).classList.add('ring-4', 'ring-primary');

                    const otherClass = (rank === 1) ? 'capped-shimmer' : 'black-shimmer';
                    document.getElementById(`rank-${rank}-name`).classList.remove(otherClass);
                    document.getElementById(`rank-${rank}-level`).classList.remove(otherClass);
                } else {
                    document.getElementById(`rank-${rank}-name`).classList.remove('capped-shimmer', 'black-shimmer');
                    document.getElementById(`rank-${rank}-level`).classList.remove('capped-shimmer', 'black-shimmer');
                    document.getElementById(`rank-${rank}-card`).classList.remove('ring-4', 'ring-primary');
                }
            }

            function renderListItem(rank, user, isCurrentUser) {
                const avatar = user.avatar_url || DEFAULT_AVATAR;
                const name = isCurrentUser ? '你 (You)' : user.username;
                const cardClass = isCurrentUser
                    ? 'neo-card-user bg-yellow-50 ring-2 ring-primary ring-inset'
                    : 'neo-card bg-white';

                const shimmerClass = isCurrentUser ? 'capped-shimmer' : '';
                const levelColorClass = isCurrentUser ? '' : 'text-gray-500';

                return `
                <div class="${cardClass} p-4 flex items-center gap-4">
                    <span class="font-black text-xl w-8 text-center">${isCurrentUser ? '#' + rank : rank}</span>
                    <div class="w-12 h-12 neo-border rounded-full overflow-hidden bg-zinc-100">
                        <img alt="avatar" src="${avatar}" class="w-full h-full object-cover" />
                    </div>
                    <div class="flex-1">
                        <h3 class="font-black text-lg leading-none mb-1 ${shimmerClass}">${name}</h3>
                        <p class="text-xs font-bold ${levelColorClass} ${shimmerClass}">Lv.${user.actualLevel}</p>
                    </div>
                    <div class="flex items-center gap-2 relative z-10">
                        <div class="text-4xl font-black italic pr-2 tracking-tighter">${user.answer_count}</div>
                        <span class="text-[10px] font-black italic uppercase -rotate-90 origin-left translate-x-3 translate-y-3 opacity-80">QUIZ</span>
                    </div>
                </div>
            `;
            }
        </script>
        <!-- Service Worker Registration -->
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("/sw.js").catch(() => { });
                });
            }
        </script>
    </div> <!-- /vibe-app-shell -->
</body>

</html>
