<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd400",
                        "background-light": "#f2f2f2",
                        "background-dark": "#1a1a1a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderWidth: {
                        '3': '3px',
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'neo-lg': '10px 10px 0px 0px rgba(0,0,0,1)',
                        'neo-sm': '3px 3px 0px 0px rgba(0,0,0,1)',
                        'neo-dark': '4px 4px 0px 0px rgba(255,255,255,0.2)',
                        'neo-lg-dark': '10px 10px 0px 0px rgba(255,255,255,0.15)',
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
    <style>
        /* Prevent elastic scrolling on iOS */
        body {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#1d1a0c] dark:text-white h-screen w-screen flex flex-col items-center overflow-hidden supports-[height:100dvh]:h-[100dvh]">
    <header
        class="w-full bg-background-light dark:bg-background-dark border-b-3 border-black dark:border-white/20 p-2 sm:p-4 shrink-0 z-50 flex flex-col items-center">
        <div class="w-full max-w-md">
            <div class="flex items-center justify-between relative h-10 sm:h-12">
                <a href="index.html"
                    class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center active:opacity-50 transition-opacity z-10 text-black dark:text-white">
                    <span class="material-symbols-outlined text-xl sm:text-2xl font-bold">arrow_back_ios_new</span>
                </a>
                <h1
                    class="text-lg sm:text-xl font-bold tracking-tight absolute left-1/2 -translate-x-1/2 whitespace-nowrap">
                    VibeCoding</h1>
                <button
                    class="w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center active:opacity-50 transition-opacity z-10">
                    <span class="material-symbols-outlined text-xl sm:text-2xl">more_horiz</span>
                </button>
            </div>
            <div class="flex items-center gap-3 sm:gap-4 mt-2 sm:mt-6">
                <div class="flex-1 flex flex-col gap-1 sm:gap-2">
                    <div class="flex justify-between items-end px-1">
                        <p class="text-[8px] sm:text-[10px] font-bold uppercase tracking-wider">XP Points</p>
                        <p class="text-[8px] sm:text-[10px] font-bold">750 / 1000</p>
                    </div>
                    <div
                        class="rounded-full border-3 border-black dark:border-white/40 bg-white dark:bg-black overflow-hidden h-3 sm:h-4">
                        <div class="h-full bg-primary" style="width: 75%;"></div>
                    </div>
                </div>
                <div class="relative flex items-center justify-center w-10 h-10 sm:w-14 sm:h-14 shrink-0">
                    <svg class="absolute w-full h-full">
                        <circle class="text-black/10 dark:text-white/10 stroke-current" cx="50%" cy="50%"
                            fill="transparent" r="45%" stroke-width="3"></circle>
                        <circle class="text-primary stroke-current progress-ring-circle" cx="50%" cy="50%"
                            fill="transparent" r="45%" stroke-dasharray="150.8" stroke-dashoffset="37.7"
                            stroke-linecap="round" stroke-width="3"></circle>
                    </svg>
                    <div
                        class="w-8 h-8 sm:w-10 sm:h-10 rounded-full border-3 border-black overflow-hidden bg-white z-10">
                        <img alt="User Avatar" class="w-full h-full object-cover"
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuYYRJr1ZfyP7HfvdNlHcImyuVZ353z2mW-gWOdI73IPvXbRubwg-JI7n-rK31HQXFiJj4lRGsKtXXnd-R81BZJLdOqmcOHS9jAAIdxA9yXOwVD6eNl91MCrzPq2L0xkcmGZEDmp80ek1_LOpAgHIJfS3ziy_XFiTbkwTSZcHZkY5zQtawnWq3yE12FLFPO_ddAmwIcyqMDN0hYJqVaDbIsZ_sHT1vXdv8N6cemW5uq6iiKDqjfO-yo7MKd-WY--4tUxLeYMgvfHY3" />
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="flex-1 flex flex-col items-center justify-center p-4 w-full min-h-0">
        <div
            class="w-full max-w-sm aspect-[4/5] max-h-full bg-white dark:bg-[#2a2a2a] border-3 border-black dark:border-white shadow-neo-lg dark:shadow-neo-lg-dark rounded-xl flex flex-col relative overflow-hidden mx-auto shrink">
            <div class="p-4 sm:p-6 flex justify-between items-start w-full shrink-0">
                <div class="bg-primary border-3 border-black px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow-neo-sm">
                    <span
                        class="text-[10px] sm:text-[11px] font-bold uppercase tracking-tight text-black">BACKEND</span>
                </div>
                <div onclick="window.location.href='test.html'"
                    class="bg-white dark:bg-black border-3 border-black dark:border-white px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg shadow-neo-sm cursor-pointer hover:bg-gray-50 dark:hover:bg-zinc-900 transition-colors">
                    <span class="text-[10px] sm:text-[11px] font-bold uppercase tracking-tight">測驗</span>
                </div>
            </div>
            <div
                class="flex-1 flex flex-col items-center justify-center text-center px-6 pb-8 sm:px-8 sm:pb-12 min-h-0">
                <h2 class="text-5xl sm:text-7xl font-bold tracking-tighter leading-none break-all">API</h2>
            </div>
        </div>
    </main>
    <footer class="pb-6 sm:pb-12 pt-2 flex flex-col justify-center items-center gap-4 w-full shrink-0">
        <div class="flex flex-col items-center gap-2">
            <a href="cardi.html"
                class="w-16 h-16 sm:w-20 sm:h-20 bg-primary border-3 border-black dark:border-white shadow-neo active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all rounded-full flex items-center justify-center text-black">
                <span class="material-symbols-outlined !text-3xl sm:!text-4xl font-bold">visibility</span>
            </a>
            <span
                class="text-[10px] sm:text-[11px] font-bold uppercase tracking-[0.2em] text-black dark:text-white/80">Reveal</span>
        </div>
    </footer>
    <div class="fixed top-20 left-0 w-32 h-32 bg-primary/20 rounded-full blur-3xl pointer-events-none -z-10 -ml-10">
    </div>
    <div class="fixed bottom-40 right-0 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none -z-10 -mr-10">
    </div>

</body>

</html>
