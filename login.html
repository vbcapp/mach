<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>iPas AI應用規劃師考證班 - 數據收集說明頁面</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans+TC:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9f506",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23220f",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "Noto Sans TC", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: "Space Grotesk", "Noto Sans TC", sans-serif;
            min-height: 100dvh;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0 0 rgba(0, 0, 0, 1);
        }
        .neo-shadow-sm {
            box-shadow: 2px 2px 0 0 rgba(0, 0, 0, 1);
        }
        .neo-shadow-active:active {
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 1);
            transform: translate(4px, 4px);
        }
    </style>
    <style>
        body {
            min-height: max(700px, 100dvh);
        }

        /* Collapsible transition */
        .collapsible-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        .collapsible-content.open {
            max-height: 500px;
            opacity: 1;
        }

        .arrow-icon {
            transition: transform 0.3s ease;
        }

        .arrow-icon.open {
            transform: rotate(180deg);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start p-6">
    <header class="w-full max-w-md flex flex-col items-center mb-6 pt-4">
        <div
            class="flex items-center justify-center bg-white dark:bg-black border-[3px] border-black p-4 neo-shadow w-20 h-20 mb-4 rounded-xl">
            <span class="material-symbols-outlined text-4xl font-bold text-black dark:text-white">code_blocks</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tighter text-black dark:text-white uppercase mb-4">iPas AI應用規劃師考證班</h1>
        <p class="text-center text-black dark:text-zinc-200 font-bold leading-relaxed px-2">
            👋 歡迎使用 專有名詞、專業術語 學習卡！輸入你的暱稱並選擇想學的主題，讓體驗更個人化
        </p>
    </header>

    <main class="w-full max-w-md space-y-4 pb-12">
        <section>
            <input
                class="w-full bg-white text-black border-[3px] border-black p-4 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl"
                id="nickname" placeholder="請輸入你的姓名或暱稱：" type="text" />
        </section>
        <section>
            <input
                class="w-full bg-white text-black border-[3px] border-black p-4 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl"
                id="email" placeholder="請輸入電子郵件" type="email" />
        </section>
        <section>
            <input
                class="w-full bg-white text-black border-[3px] border-black p-4 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl"
                id="password" placeholder="請輸入密碼" type="password" />
        </section>

        <!-- Separator -->
        <div class="flex items-center gap-4 py-2">
            <div class="flex-1 h-[3px] bg-black/20"></div>
            <span class="text-black/50 font-bold text-sm">或</span>
            <div class="flex-1 h-[3px] bg-black/20"></div>
        </div>

        <!-- Google Sign-In Button -->
        <section>
            <button onclick="handleGoogleSignIn()" id="google-btn"
                class="w-full bg-white text-black border-[3px] border-black py-4 px-8 text-lg font-bold neo-shadow neo-shadow-active rounded-xl flex items-center justify-center gap-3 hover:bg-gray-50 transition-colors">
                <svg class="w-6 h-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                <span>使用 Google 帳號登入</span>
            </button>
        </section>

        <section class="bg-white dark:bg-zinc-900 border-[3px] border-black p-6 neo-shadow rounded-xl !mt-6">
            <div class="flex items-center justify-between mb-6" onclick="toggleDetails()">
                <div class="flex items-center gap-2">
                    <!-- Icon added for better look matching previous design if needed, or just text -->
                    <span class="text-2xl">📊</span>
                    <h2 class="text-xl font-bold text-black dark:text-white">學習數據收集說明</h2>
                </div>
                <span id="details-arrow"
                    class="material-symbols-outlined text-black dark:text-white font-bold cursor-pointer arrow-icon">keyboard_arrow_down</span>
            </div>

            <!-- Collapsible Details -->
            <div id="data-details" class="collapsible-content space-y-4 mb-4">
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">person</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">暱稱和更新時間</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">devices</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">裝置類型和瀏覽器資訊</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">fullscreen</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">螢幕解析度</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">location_on</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">地區資訊</p>
                </div>

                <div
                    class="bg-primary/10 border-2 border-dashed border-black/30 dark:border-white/30 p-4 rounded-lg mt-4">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-black dark:text-white text-sm">lock</span>
                        <p class="text-xs font-bold text-black dark:text-white">
                            所有資料僅用於改善服務，不會用於商業用途
                        </p>
                    </div>
                </div>
            </div>

            <label class="flex items-start gap-4 cursor-pointer group border-t-[3px] border-black pt-4">
                <div class="relative flex-shrink-0 mt-1">
                    <input id="consent"
                        class="h-7 w-7 appearance-none border-[3px] border-black bg-white checked:bg-primary transition-colors cursor-pointer rounded-lg peer"
                        type="checkbox" />
                    <div
                        class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 peer-checked:opacity-100 text-black">
                        <span class="material-symbols-outlined font-black text-xl">check</span>
                    </div>
                </div>
                <span class="text-black dark:text-white font-bold leading-snug">
                    我同意收集上述資料以改善學習體驗
                </span>
            </label>
        </section>

        <div class="pt-4 flex flex-col items-center">
            <button onclick="handleStart()"
                class="w-full bg-primary text-black border-[3px] border-black py-4 px-8 text-xl font-bold uppercase neo-shadow neo-shadow-active rounded-xl flex items-center justify-center gap-2">
                <span>開始使用</span>
                <span class="material-symbols-outlined font-black">arrow_forward</span>
            </button>
            <p class="mt-6 text-xs text-zinc-500 dark:text-zinc-400 font-bold">
                iPas AI應用規劃師考證班 Flashcard App v1.2.0
            </p>
        </div>
    </main>

    <div class="fixed top-10 left-10 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="w-32 h-32 border-4 border-black dark:border-white rotate-12"></div>
    </div>
    <div class="fixed bottom-10 right-10 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="w-24 h-24 bg-primary border-4 border-black -rotate-12 neo-shadow"></div>
    </div>

    <!-- ==================== Supabase 整合 ==================== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/init.js"></script>
    <script src="js/modal-system.js"></script>

    <script>
        // Toggle Details Function
        function toggleDetails() {
            const content = document.getElementById('data-details');
            const arrow = document.getElementById('details-arrow');

            content.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        /**
         * Google OAuth 登入
         */
        async function handleGoogleSignIn() {
            const consent = document.getElementById('consent').checked;
            const googleBtn = document.getElementById('google-btn');

            if (!consent) {
                ModalSystem.alert('需同意條款', '請先勾選同意收集資料以繼續使用！');
                return;
            }

            // 更新按鈕狀態
            googleBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span>連接 Google 中...</span>';
            googleBtn.disabled = true;

            try {
                // 初始化 API
                await apiService.initialize();

                // 儲存同意狀態 (OAuth 回調後需要)
                localStorage.setItem('userConsent', 'true');

                // 使用 Supabase OAuth 登入 Google
                const { data, error } = await apiService.supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/index.html'
                    }
                });

                if (error) {
                    throw error;
                }

                // OAuth 會自動跳轉，不需要額外處理
                console.log('Google OAuth 啟動成功，等待跳轉...');

            } catch (error) {
                console.error('Google 登入錯誤:', error);
                ModalSystem.alert('登入失敗', 'Google 登入失敗：' + error.message);

                // 恢復按鈕
                googleBtn.innerHTML = `
                    <svg class="w-6 h-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>使用 Google 帳號登入</span>
                `;
                googleBtn.disabled = false;
            }
        }

        /**
         * Email/Password 登入 (原始邏輯)
         */
        async function handleStart() {
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const consent = document.getElementById('consent').checked;
            const btn = document.querySelector('button[onclick="handleStart()"]');

            if (!nickname) {
                ModalSystem.alert('缺漏資料', '請輸入你的姓名或暱稱！');
                return;
            }

            if (!consent) {
                ModalSystem.alert('需同意條款', '請勾選同意收集資料以繼續使用！');
                return;
            }

            // 更新按鈕狀態
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span>處理中...</span>';
            btn.disabled = true;

            try {
                // 初始化 API
                await apiService.initialize();
                let result;

                // 判斷使用哪種登入方式
                if (email && password) {
                    // 使用 Email/密碼 登入/註冊
                    console.log('使用 Email 登入/註冊:', email);
                    result = await apiService.authWithEmailPassword(email, password, nickname);
                } else {
                    // 如果沒有輸入 Email/密碼，仍然使用快速登入 (匿名/自動產生)
                    // 為了方便體驗，如果欄位留空則使用舊邏輯
                    console.log('使用快速登入 (未提供 Email/密碼)');
                    result = await apiService.quickLogin(nickname);
                }

                if (result.success) {
                    // 儲存本地狀態
                    localStorage.setItem('userNickname', nickname);
                    localStorage.setItem('userConsent', 'true');
                    localStorage.setItem('loginTime', new Date().toISOString());

                    console.log('登入成功:', result.user);

                    // 導向首頁
                    window.location.href = 'index.html';
                } else {
                    throw new Error(result.error.message || '登入失敗');
                }
            } catch (error) {
                console.error('登入錯誤:', error);

                // 更友善的錯誤訊息
                let msg = error.message;
                if (msg.includes('Password should be')) msg = '密碼長度至少需要 6 個字元';
                if (msg.includes('Invalid email')) msg = 'Email 格式不正確';

                ModalSystem.alert('登入失敗', msg);

                // 恢復按鈕
                btn.innerHTML = '<span>開始使用</span> <span class="material-symbols-outlined font-black">arrow_forward</span>';
                btn.disabled = false;
            }
        }

        // 檢查是否已經登入過
        window.addEventListener('DOMContentLoaded', function () {
            const nickname = localStorage.getItem('userNickname');
            const consent = localStorage.getItem('userConsent');

            // 預填暱稱如果不為空
            if (nickname) {
                document.getElementById('nickname').value = nickname;
            }
            if (consent === 'true') {
                document.getElementById('consent').checked = true;
            }
        });
    </script>
</body>

</html>
