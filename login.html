<!DOCTYPE html>
<html class="light" lang="zh-TW">

<head>
    <link rel="stylesheet" href="design-tokens.css">
    <link rel="stylesheet" href="css/vibe-style.css">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="考試神器" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="智慧考試練習平台，隨時隨地刷題備考" />
    <meta property="og:title" content="考試神器" />
    <meta property="og:description" content="智慧考試練習平台，隨時隨地刷題備考" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="考試神器" />
    <meta name="twitter:description" content="智慧考試練習平台，隨時隨地刷題備考" />
    <!-- manifest 由 config.js 動態產生 -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>考試神器 - 登入</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="js/theme-config.js"></script>
    <script src="js/components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-start p-6">
    <header class="w-full max-w-md flex flex-col items-center mb-6 pt-4">
        <div
            class="flex items-center justify-center bg-white dark:bg-black border-[3px] border-black p-4 neo-shadow w-20 h-20 mb-4 rounded-xl">
            <span class="material-symbols-outlined text-4xl font-bold text-black dark:text-white">quiz</span>
        </div>
        <h1 class="text-3xl font-bold tracking-tighter text-black dark:text-white uppercase mb-4" data-brand="org-name">考試神器</h1>
        <p class="text-center text-black dark:text-zinc-200 font-bold leading-relaxed px-2" data-brand="description">
            智慧考試練習平台，隨時隨地刷題備考
        </p>
    </header>

    <main class="w-full max-w-md space-y-4 pb-12">
        <div class="flex justify-center mb-6">
            <h2 class="text-xl font-bold border-b-[3px] border-black pb-1 px-2">註冊帳號</h2>
        </div>

        <section id="nickname-section">
            <input
                class="w-full bg-white text-black border-[3px] border-black p-4 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl transition-all"
                id="nickname" placeholder="請輸入你的姓名或暱稱" type="text" />
        </section>
        <section>
            <input
                class="w-full bg-white text-black border-[3px] border-black p-4 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl transition-all"
                id="email" placeholder="請輸入電子郵件" type="email" />
        </section>
        <section>
            <div class="relative">
                <input
                    class="w-full bg-white text-black border-[3px] border-black p-4 pr-14 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl transition-all"
                    id="password" placeholder="請輸入密碼" type="password" />
                <button type="button" onclick="togglePasswordVisibility('password', this)"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-black transition-colors"
                    aria-label="顯示密碼">
                    <span class="material-symbols-outlined text-2xl">visibility_off</span>
                </button>
            </div>
            <p id="password-hint" class="text-sm text-zinc-500 font-bold mt-2 ml-1">密碼至少需要 6 個字元</p>
        </section>
        <section id="confirm-password-section">
            <div class="relative">
                <input
                    class="w-full bg-white text-black border-[3px] border-black p-4 pr-14 text-lg font-bold neo-shadow focus:ring-0 focus:outline-none placeholder:text-zinc-500 rounded-xl transition-all"
                    id="confirm-password" placeholder="請再次輸入密碼" type="password" />
                <button type="button" onclick="togglePasswordVisibility('confirm-password', this)"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-black transition-colors"
                    aria-label="顯示密碼">
                    <span class="material-symbols-outlined text-2xl">visibility_off</span>
                </button>
            </div>
        </section>



        <section class="bg-white dark:bg-zinc-900 border-[3px] border-black p-6 neo-shadow rounded-xl !mt-6">
            <div class="flex items-center justify-between mb-6" onclick="toggleDetails()">
                <div class="flex items-center gap-2">
                    <!-- Icon added for better look matching previous design if needed, or just text -->
                    <span class="text-2xl">📊</span>
                    <h2 class="text-xl font-bold text-black dark:text-white">學習數據收集說明</h2>
                </div>
                <span id="details-arrow"
                    class="material-symbols-outlined text-black dark:text-white font-bold cursor-pointer arrow-icon">keyboard_arrow_down</span>
            </div>

            <!-- Collapsible Details -->
            <div id="data-details" class="collapsible-content space-y-4 mb-4">
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">person</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">暱稱和更新時間</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">devices</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">裝置類型和瀏覽器資訊</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">fullscreen</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">螢幕解析度</p>
                </div>
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-black dark:text-white font-bold">location_on</span>
                    <p class="text-zinc-700 dark:text-zinc-300 font-bold">地區資訊</p>
                </div>

                <div
                    class="bg-primary/10 border-2 border-dashed border-black/30 dark:border-white/30 p-4 rounded-lg mt-4">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-black dark:text-white text-sm">lock</span>
                        <p class="text-xs font-bold text-black dark:text-white">
                            所有資料僅用於改善服務，不會用於商業用途
                        </p>
                    </div>
                </div>
            </div>

            <label class="flex items-start gap-4 cursor-pointer group border-t-[3px] border-black pt-4">
                <div class="relative flex-shrink-0 mt-1">
                    <input id="consent"
                        class="h-7 w-7 appearance-none border-[3px] border-black bg-white checked:bg-primary transition-colors cursor-pointer rounded-lg peer"
                        type="checkbox" />
                    <div
                        class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 peer-checked:opacity-100 text-black">
                        <span class="material-symbols-outlined font-black text-xl">check</span>
                    </div>
                </div>
                <span class="text-black dark:text-white font-bold leading-snug">
                    我同意收集上述資料以改善學習體驗
                </span>
            </label>
        </section>

        <div class="pt-4 flex flex-col items-center">
            <button onclick="handleStart()" id="submit-btn"
                class="w-full bg-primary text-black border-[3px] border-black py-4 px-8 text-xl font-bold uppercase neo-shadow neo-shadow-active rounded-xl flex items-center justify-center gap-2">
                <span id="submit-btn-text">註冊並開始使用</span>
                <span class="material-symbols-outlined font-black">arrow_forward</span>
            </button>
            <p class="mt-4 text-sm text-zinc-600 dark:text-zinc-400 font-bold">
                已經有帳號了？<a href="login-page.html" class="text-primary underline underline-offset-4 hover:text-black dark:hover:text-white transition-colors">前往登入</a>
            </p>
            <p class="mt-4 text-xs text-zinc-500 dark:text-zinc-400 font-bold" data-brand="footer">
                考試神器
            </p>
        </div>
    </main>

    <div class="fixed top-10 left-10 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="w-32 h-32 border-4 border-black dark:border-white rotate-12"></div>
    </div>
    <div class="fixed bottom-10 right-10 -z-10 opacity-10 dark:opacity-5 pointer-events-none">
        <div class="w-24 h-24 bg-primary border-4 border-black -rotate-12 neo-shadow"></div>
    </div>

    <!-- ==================== Supabase 整合 ==================== -->
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 專案配置與 API Service -->
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/init.js"></script>
    <script src="js/modal-system.js"></script>

    <script>
        // 切換密碼顯示/隱藏
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        // Toggle Details Function
        function toggleDetails() {
            const content = document.getElementById('data-details');
            const arrow = document.getElementById('details-arrow');

            content.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        /**
         * 純註冊邏輯
         */
        async function handleStart() {
            const nickname = document.getElementById('nickname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();
            const consent = document.getElementById('consent').checked;
            const btn = document.getElementById('submit-btn');

            if (!nickname) {
                ModalSystem.alert('缺漏資料', '請輸入你的姓名或暱稱！');
                return;
            }
            if (!email) {
                ModalSystem.alert('缺漏資料', '請輸入電子郵件！');
                return;
            }
            if (!password) {
                ModalSystem.alert('缺漏資料', '請輸入密碼！');
                return;
            }
            if (password !== confirmPassword) {
                ModalSystem.alert('密碼不一致', '兩次輸入的密碼不相同，請重新確認！');
                return;
            }
            if (!consent) {
                ModalSystem.alert('需同意條款', '請勾選同意收集資料以繼續使用！');
                return;
            }

            // 更新按鈕狀態
            document.getElementById('submit-btn-text').innerHTML = '處理中...';
            btn.disabled = true;

            try {
                // 初始化 API
                await apiService.initialize();

                // 白名單檢查
                if (typeof STUDENT_EMAILS !== 'undefined' && Array.isArray(STUDENT_EMAILS)) {
                    const isWhitelisted = STUDENT_EMAILS.includes(email);
                    if (!isWhitelisted) {
                        ModalSystem.alert('存取被拒', '抱歉，你不是本課程的學員，無法註冊。');
                        document.getElementById('submit-btn-text').innerHTML = '註冊並開始使用';
                        btn.disabled = false;
                        return;
                    }
                }

                // 純註冊（不做登入嘗試）
                const result = await apiService.registerWithEmailPassword(email, password, nickname);

                if (result.success) {
                    // 儲存本地狀態
                    localStorage.setItem('userNickname', nickname);
                    localStorage.setItem('userConsent', 'true');
                    localStorage.setItem('loginTime', new Date().toISOString());

                    console.log('註冊成功:', result.user);
                    window.location.href = 'index.html';
                } else {
                    throw new Error(result.error?.message || '註冊失敗');
                }
            } catch (error) {
                console.error('註冊錯誤:', error);

                let msg = error.message;
                if (msg.includes('Password should be')) msg = '密碼長度至少需要 6 個字元';
                if (msg.includes('Invalid email')) msg = 'Email 格式不正確';
                if (msg.includes('already registered') || msg.includes('already been registered')) msg = '此 Email 已經註冊過了，請直接到登入頁面登入。';
                if (msg.includes('Invalid login credentials')) msg = '此 Email 已經註冊過了，請直接到登入頁面登入。';

                const alertTitle = msg.includes('驗證') || msg.includes('信箱') ? '請完成 Email 驗證' : '註冊失敗';
                ModalSystem.alert(alertTitle, msg);

                // 恢復按鈕
                document.getElementById('submit-btn-text').innerHTML = '註冊並開始使用';
                btn.disabled = false;
            }
        }



        // 檢查是否已經登入過，以及是否有錯誤訊息
        window.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === 'unauthorized') {
                ModalSystem.alert('存取被拒', '抱歉，你不是本課程的學員，無法注冊或登入。若有問題，可聯係 ceceloveye@gmail.com');
                // 清除 URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const nickname = localStorage.getItem('userNickname');
            const consent = localStorage.getItem('userConsent');

            // 預填暱稱如果不為空
            if (nickname) {
                document.getElementById('nickname').value = nickname;
            }
            if (consent === 'true') {
                document.getElementById('consent').checked = true;
            }
        });
    </script>
    <!-- Service Worker Registration -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>

</html>
